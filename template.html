const DienstplanView = ({ ma, onChange, onTausch, toast, allowedGroups, currentUser }) => {
  const [view,         setView]        = useState('list');   // 'list' | 'detail'
  const [modal,        setModal]       = useState(null);     // 'create'|'assign'|'wish'|'share'|'addslot'|'tausch'
  const [selSchichtId, setSelSchichtId]= useState(null);
  const [selSlot,      setSelSlot]     = useState(null);     // slot obj + isSecond
  const [wishPid,      setWishPid]     = useState('');
  const [wishForm,     setWishForm]    = useState({});
  const [shareText,    setShareText]   = useState('');
  const [shareScope,   setShareScope]  = useState('single'); // 'single'|'all'
  const [createForm,   setCreateForm]  = useState({ datum:today(), titel:'', vorlageId:'' });
  const [tauschSlot,   setTauschSlot]  = useState(null);
  const [tauschNote,   setTauschNote]  = useState('');
  const [selPlanId,    setSelPlanId]   = useState('all');
  const [planModal,    setPlanModal]   = useState(null);
  const [planForm,     setPlanForm]    = useState({ name:'' });
  const [filterPerson, setFilterPerson]= useState('');
  const [listView,     setListView]    = useState('list'); // 'list'|'calendar'
  const [calYM,        setCalYM]       = useState(() => { const n=new Date(); return {y:n.getFullYear(),m:n.getMonth()}; });
  const [dupModal,     setDupModal]    = useState(null); // schicht to duplicate
  const [dupDate,      setDupDate]     = useState('');
  const dupDateRef = useRef(null);
  const [recur,        setRecur]       = useState({ enabled:false, type:'weekly', until:'' });
  const [showConflicts, setShowConflicts] = useState(false);
  const [exportModal, setExportModal] = useState(false);
  const conflicts = useMemo(() => computeConflicts(ma), [ma]);

  // Auto-open date picker when dup modal appears
  useEffect(() => {
    if (dupModal && dupDateRef.current) {
      dupDateRef.current.focus();
      try { dupDateRef.current.showPicker(); } catch {}
    }
  }, [dupModal]);

  const selSchicht = useMemo(() => ma.schichten.find(s=>s.id===selSchichtId)||null, [ma.schichten, selSchichtId]);
  const sorted     = useMemo(() => {
    let list = selPlanId==='all' ? ma.schichten : ma.schichten.filter(s=>s.planId===selPlanId);
    if (filterPerson) list = list.filter(s=>s.slots.some(sl=>sl.personId===filterPerson||sl.personId2===filterPerson));
    return [...list].sort((a,b)=>b.datum.localeCompare(a.datum));
  }, [ma.schichten, selPlanId, filterPerson]);
  const myPerson   = useMemo(() => currentUser ? ma.personen.find(p=>p.name===currentUser.name)||null : null, [ma.personen, currentUser]);
  const myGroupIds = useMemo(() => myPerson ? (myPerson.gruppenIds||(myPerson.gruppeId?[myPerson.gruppeId]:[])) : [], [myPerson]);

  // ── Offene Abfragen für eingeloggten User ──
  const [abfrageModal, setAbfrageModal] = useState(null); // schicht
  const [abfrageResp,  setAbfrageResp]  = useState({});   // {slotId: art}
  const openAbfragen = useMemo(() => {
    if (!myPerson) return [];
    return ma.schichten.filter(s=>s.abfrageToken && !(s.wuensche||[]).some(w=>w.personId===myPerson.id));
  }, [ma.schichten, myPerson]);

  const submitAbfrageResp = () => {
    if (!myPerson || !abfrageModal || !onChange) return;
    const wishes = Object.entries(abfrageResp).filter(([,v])=>v&&v!=='neutral').map(([slotId,art])=>({personId:myPerson.id,slotId,art}));
    const hasYes = wishes.some(w=>w.art==='wunschdienst');
    const hasNo  = wishes.some(w=>w.art==='wunschfrei');
    onChange(m=>{
      const newSchichten = m.schichten.map(s=>{
        if(s.id!==abfrageModal.id) return s;
        return {...s,wuensche:[...(s.wuensche||[]).filter(w=>w.personId!==myPerson.id),...wishes]};
      });
      let updates = {...m, schichten:newSchichten};
      if(hasNo && !hasYes && abfrageModal.datum) {
        const existingAbw=(m.abwesenheiten||[]).filter(a=>!(a.personId===myPerson.id&&a.from===abfrageModal.datum&&(a.reason||'').startsWith('Abfrage')));
        updates.abwesenheiten=[...existingAbw,{id:genId(),personId:myPerson.id,from:abfrageModal.datum,to:abfrageModal.datum,reason:'Abfrage: '+(abfrageModal.titel||abfrageModal.datum)}];
      } else if(hasYes) {
        updates.abwesenheiten=(m.abwesenheiten||[]).filter(a=>!(a.personId===myPerson.id&&a.from===abfrageModal.datum&&(a.reason||'').startsWith('Abfrage')));
      }
      return updates;
    });
    setAbfrageModal(null); setAbfrageResp({});
    toast('Antwort gespeichert ✓');
  };

  const createPlan = () => {
    if (!planForm.name.trim()) return;
    const neu = {id:genId(), name:planForm.name.trim(), erstelltAm:today()};
    onChange(m=>({...m, plaene:[...(m.plaene||[]),neu]}));
    setSelPlanId(neu.id); setPlanModal(null); toast('Plan erstellt');
  };
  const deletePlan = id => {
    if (!confirm('Plan löschen? Die Schichten bleiben erhalten (werden zu "Alle" verschoben).')) return;
    onChange(m=>({...m, plaene:(m.plaene||[]).filter(p=>p.id!==id), schichten:m.schichten.map(s=>s.planId===id?{...s,planId:''}:s)}));
    if (selPlanId===id) setSelPlanId('all');
  };

  const publishAll = () => {
    if (!confirm('Alle Schichten veröffentlichen?')) return;
    onChange(m=>({...m, schichten:m.schichten.map(s=>({...s,veroeffentlicht:true}))}));
    toast('Alle Schichten veröffentlicht ✓');
  };

  // ── Tausch helpers ──
  const submitTausch = () => {
    if (!myPerson||!tauschSlot||!selSchicht) return;
    const req = { id:genId(), schichtId:selSchicht.id, slotId:tauschSlot.slotId, isSecond:tauschSlot.isSecond, personId:myPerson.id, note:tauschNote.trim(), createdAt:new Date().toISOString() };
    onTausch(m=>({ ...m, tauschAnfragen:[...(m.tauschAnfragen||[]),req] }));
    setTauschSlot(null); setTauschNote(''); setModal('detail_view');
    toast('Tausch-Anfrage gestellt 🔄');
  };
  const acceptTausch = req => {
    if (!myPerson||req.personId===myPerson.id) return;
    onTausch(m=>({
      ...m,
      schichten:m.schichten.map(s=>s.id===req.schichtId?{...s,slots:s.slots.map(sl=>sl.id===req.slotId?{...sl,[req.isSecond?'personId2':'personId']:myPerson.id}:sl)}:s),
      tauschAnfragen:(m.tauschAnfragen||[]).filter(r=>r.id!==req.id)
    }));
    toast('Tausch angenommen ✓');
  };
  const cancelTausch = req => {
    if (!myPerson||req.personId!==myPerson.id) return;
    onTausch(m=>({ ...m, tauschAnfragen:(m.tauschAnfragen||[]).filter(r=>r.id!==req.id) }));
    toast('Tausch-Anfrage zurückgezogen');
  };

  // ── helpers ──
  const updateSchicht = (id, updater) => {
    onChange(m => ({ ...m, schichten: m.schichten.map(s => s.id===id ? (typeof updater==='function'?updater(s):{...s,...updater}) : s) }));
  };

  const generateRecurring = (baseSchicht) => {
    const { type, until } = recur;
    if (!until || !baseSchicht.datum) return 0;
    const stepDays = type==='weekly' ? 7 : type==='biweekly' ? 14 : null;
    const dates = [];
    const start = new Date(baseSchicht.datum+'T00:00:00');
    const untilDate = new Date(until+'T00:00:00');
    if (stepDays) {
      let cur = new Date(start); cur.setDate(cur.getDate() + stepDays);
      while (cur <= untilDate) {
        dates.push(cur.toISOString().slice(0,10));
        cur.setDate(cur.getDate() + stepDays);
      }
    } else {
      // monthly
      let y = start.getFullYear(), m = start.getMonth(), day = start.getDate();
      while (true) {
        m++; if (m>11){m=0;y++;}
        const candidate = new Date(y, m, day);
        if (candidate > untilDate) break;
        dates.push(candidate.toISOString().slice(0,10));
      }
    }
    if (!dates.length) return 0;
    const copies = dates.map(datum => ({
      id: genId(),
      datum,
      titel: baseSchicht.titel,
      slots: baseSchicht.slots.map(sl=>({...sl, id:genId(), personId:'', personId2:''})),
      wuensche: [],
      veroeffentlicht: false,
      planId: baseSchicht.planId||'',
      recurring: { type, until },
    }));
    onChange(m=>({...m, schichten:[...m.schichten,...copies]}));
    return copies.length;
  };

  const createSchicht = () => {
    if (!createForm.datum) return;
    const vorlage = ma.vorlagen.find(v=>v.id===createForm.vorlageId);
    if (vorlage?.art==='zeitraum' && (vorlage.tage||[]).length>0) {
      const newSchichten = vorlage.tage.map((tag,i)=>{
        const d = new Date(createForm.datum+'T00:00:00'); d.setDate(d.getDate()+i);
        const datum = d.toISOString().slice(0,10);
        const titel = [createForm.titel.trim(), tag.label].filter(Boolean).join(' – ');
        const slots = (tag.slots||[]).flatMap(s=>{
          const cnt = s.count || 1;
          return Array.from({length:cnt},()=>({id:genId(),gruppeId:s.gruppeId,dienstId:s.dienstId,doppelt:false,personId:'',personId2:''}));
        });
        return {id:genId(),datum,titel,slots,wuensche:[],veroeffentlicht:false,planId:selPlanId==='all'?'':selPlanId};
      });
      onChange(m=>({...m,schichten:[...m.schichten,...newSchichten]}));
      if(newSchichten[0]){setSelSchichtId(newSchichten[0].id);setView('detail');}
      setModal(null); setRecur({enabled:false,type:'weekly',until:''}); toast(`${newSchichten.length} Schichten erstellt ✓`);
      return;
    }
    const slots = vorlage ? (vorlage.slots||[]).flatMap(s=>{
      const cnt = s.count || 1;
      return Array.from({length:cnt},()=>({ id:genId(), gruppeId:s.gruppeId, dienstId:s.dienstId, doppelt:false, personId:'', personId2:'' }));
    }) : [];
    const recurringMeta = recur.enabled && recur.until ? { type:recur.type, until:recur.until } : undefined;
    const neu = { id:genId(), datum:createForm.datum, titel:createForm.titel.trim(), slots, wuensche:[], veroeffentlicht:false, planId:selPlanId==='all'?'':selPlanId, ...(recurringMeta?{recurring:recurringMeta}:{}) };
    onChange(m => ({ ...m, schichten:[...m.schichten, neu] }));
    setSelSchichtId(neu.id); setView('detail'); setModal(null);
    if (recur.enabled && recur.until) {
      const count = generateRecurring(neu);
      toast(count>0 ? `${count+1} Schichten generiert ✓` : 'Schicht erstellt');
    } else {
      toast('Schicht erstellt');
    }
    setRecur({ enabled:false, type:'weekly', until:'' });
  };

  const dupSchicht = () => {
    if (!dupModal||!dupDate) return;
    const s = dupModal;
    const copy = { ...s, id:genId(), datum:dupDate, wuensche:[], abfrageToken:'', veroeffentlicht:false,
      slots:s.slots.map(sl=>({...sl,id:genId(),personId:'',personId2:''})) };
    onChange(m=>({...m,schichten:[...m.schichten,copy]}));
    setDupModal(null); setDupDate(''); toast('Schicht dupliziert ✓');
  };

  const saveAsVorlage = () => {
    if (!selSchicht||!onChange) return;
    const name = selSchicht.titel || fmtDe(selSchicht.datum);
    const v = { id:genId(), name, art:'einzel',
      slots:selSchicht.slots.map(sl=>({id:genId(),gruppeId:sl.gruppeId,dienstId:sl.dienstId,doppelt:sl.doppelt||false})) };
    onChange(m=>({...m,vorlagen:[...m.vorlagen,v]}));
    toast('Vorlage "'+name+'" erstellt ✓');
  };

  const deleteSchicht = id => {
    onChange(m => ({
      ...m,
      schichten: m.schichten.filter(s=>s.id!==id),
      tauschAnfragen: (m.tauschAnfragen||[]).filter(r=>r.schichtId!==id),
    }));
    setView('list'); setSelSchichtId(null);
    toast('Schicht gelöscht','warn');
  };

  const togglePublish = () => {
    if (!selSchicht) return;
    updateSchicht(selSchicht.id, s=>({ ...s, veroeffentlicht:!s.veroeffentlicht }));
    toast(selSchicht.veroeffentlicht?'Unveröffentlicht':'Veröffentlicht ✓');
  };

  const assignPerson = (slotId, personId, isSecond) => {
    if (!selSchicht) return;
    const field = isSecond ? 'personId2' : 'personId';
    updateSchicht(selSchicht.id, s => {
      const newSlots = s.slots.map(sl => sl.id===slotId ? { ...sl, [field]: sl[field]===personId?'':personId } : sl);
      // Recompute doppelt: a slot is doppelt if that person has another slot on the same day
      const finalSlots = newSlots.map(sl => {
        const pid = sl.personId;
        if (!pid) return { ...sl, doppelt: false };
        const otherSlotSameDay = newSlots.some(other => other.id !== sl.id && (other.personId === pid || other.personId2 === pid));
        return { ...sl, doppelt: otherSlotSameDay };
      });
      return { ...s, slots: finalSlots };
    });
    setModal('detail_view');
  };

  const toggleBestaetigung = (personId, val) => {
    if (!selSchicht) return;
    updateSchicht(selSchicht.id, s => {
      const current = (s.bestaetigt||{})[personId];
      const newVal = current===val ? null : val;
      const nb = {...(s.bestaetigt||{})};
      if(newVal===null) delete nb[personId]; else nb[personId]=newVal;
      return {...s, bestaetigt:nb};
    });
  };

  const addSchSlot = () => {
    if (!selSchicht) return;
    const g = ma.gruppen[0]; if (!g) return;
    const d = (g.dienste||[])[0];
    updateSchicht(selSchicht.id, s => ({ ...s, slots:[...s.slots, { id:genId(), gruppeId:g.id, dienstId:d?.id||'', doppelt:false, personId:'', personId2:'' }] }));
    toast('Slot hinzugefügt');
  };

  const remSchSlot = slotId => {
    if (!selSchicht) return;
    updateSchicht(selSchicht.id, s=>({ ...s, slots:s.slots.filter(sl=>sl.id!==slotId) }));
  };

  const saveWishes = () => {
    if (!selSchicht) return;
    const other = (selSchicht.wuensche||[]).filter(w=>w.personId!==wishPid);
    const mine  = Object.entries(wishForm).filter(([,v])=>v).map(([slotId,art])=>({ personId:wishPid, slotId, art }));
    updateSchicht(selSchicht.id, s=>({ ...s, wuensche:[...other,...mine] }));
    toast('Wünsche gespeichert'); setModal('detail_view');
  };

  const runAuto = () => {
    if (!selSchicht) return;
    const counts = {};
    ma.personen.forEach(p=>{ counts[p.id]=0; });
    ma.schichten.forEach(s => s.slots.forEach(sl => {
      if(sl.personId)  counts[sl.personId]  = (counts[sl.personId]||0)+1;
      if(sl.personId2) counts[sl.personId2] = (counts[sl.personId2]||0)+1;
    }));

    const konflikte = ma.konflikte || [];
    // Returns true if pid conflicts with anyone already in the shift
    const conflictsWith = (pid, alreadyInShift) =>
      konflikte.some(k =>
        (k.p1===pid && alreadyInShift.has(k.p2)) ||
        (k.p2===pid && alreadyInShift.has(k.p1))
      );

    const lastServed = {};
    ma.schichten.filter(s=>s.datum<selSchicht.datum).forEach(s2=>s2.slots.forEach(sl2=>{
      [sl2.personId,sl2.personId2].filter(Boolean).forEach(pid=>{
        if(!lastServed[pid]||s2.datum>lastServed[pid]) lastServed[pid]=s2.datum;
      });
    }));

    const usedNow = new Set();
    const newSlots = selSchicht.slots.map(sl => {
      // Skip slots whose group the user has no access to
      if (allowedGroups && !allowedGroups.includes(sl.gruppeId)) return {...sl};
      const eligible = ma.personen.filter(p => {
        if (!(p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).includes(sl.gruppeId)) return false;
        if ((p.dienste||[]).length>0 && !(p.dienste||[]).includes(sl.dienstId)) return false;
        const isAbsent = (ma.abwesenheiten||[]).some(a=>a.personId===p.id&&selSchicht.datum>=a.from&&selSchicht.datum<=(a.to||a.from));
        if (isAbsent) return false;
        const w = (selSchicht.wuensche||[]).find(x=>x.personId===p.id&&x.slotId===sl.id);
        return w?.art !== 'wunschfrei';
      });
      const pick = (excl) => {
        const ok = p => !excl.has(p.id) && !conflictsWith(p.id, usedNow);
        const praefs = ma.praeferenzen||[];
        const wunsch    = eligible.filter(p=>{ const w=(selSchicht.wuensche||[]).find(x=>x.personId===p.id&&x.slotId===sl.id); return w?.art==='wunschdienst'&&ok(p); });
        const bevorzugt = eligible.filter(p=>ok(p)&&!wunsch.find(x=>x.id===p.id)&&praefs.some(pf=>pf.personId===p.id&&pf.dienstId===sl.dienstId&&pf.prio==='bevorzugt'));
        const neutral   = eligible.filter(p=>ok(p)&&!wunsch.find(x=>x.id===p.id)&&!bevorzugt.find(x=>x.id===p.id)&&!praefs.some(pf=>pf.personId===p.id&&pf.dienstId===sl.dienstId&&pf.prio==='vermeidet'));
        const vermeidet = eligible.filter(p=>ok(p)&&!wunsch.find(x=>x.id===p.id)&&!bevorzugt.find(x=>x.id===p.id)&&!neutral.find(x=>x.id===p.id));
        const byCount = (a,b) => {
          const ca=counts[a.id]||0, cb=counts[b.id]||0;
          if(ca!==cb) return ca-cb;
          const la=lastServed[a.id]||'2000-01-01', lb=lastServed[b.id]||'2000-01-01';
          return la.localeCompare(lb);
        };
        const pool = [...wunsch,...bevorzugt.sort(byCount),...neutral.sort(byCount),...vermeidet.sort(byCount)];
        if (!pool.length) return '';
        const p = pool[0]; counts[p.id]=(counts[p.id]||0)+1; excl.add(p.id); return p.id;
      };
      const p1 = pick(new Set(usedNow)); if(p1&&!sl.doppelt) usedNow.add(p1);
      return { ...sl, personId:p1, personId2:'' };
    });
    updateSchicht(selSchicht.id, s=>({ ...s, slots:newSlots }));
    toast('Auto-Einteilung abgeschlossen ⚡');
  };

  const runAutoAll = () => {
    if (!onChange) return;
    if (!confirm('Alle Schichten automatisch einteilen?\nBestehende Einteilungen werden überschrieben.')) return;
    const counts = {};
    ma.personen.forEach(p=>{ counts[p.id]=0; });
    const konflikte = ma.konflikte||[];
    const conflictsWith = (pid, set) => konflikte.some(k=>(k.p1===pid&&set.has(k.p2))||(k.p2===pid&&set.has(k.p1)));
    const sortedForAuto = [...ma.schichten].sort((a,b)=>a.datum.localeCompare(b.datum));
    const lastServedAll = {};
    const newSchichten = sortedForAuto.map((s, sIdx)=>{
      // Build lastServed from schichten processed before this one
      sortedForAuto.slice(0, sIdx).forEach(s2=>s2.slots.forEach(sl2=>{
        [sl2.personId,sl2.personId2].filter(Boolean).forEach(pid=>{
          if(!lastServedAll[pid]||s2.datum>lastServedAll[pid]) lastServedAll[pid]=s2.datum;
        });
      }));
      const usedNow = new Set();
      const newSlots = s.slots.map(sl=>{
        if(allowedGroups&&!allowedGroups.includes(sl.gruppeId)) return {...sl};
        const eligible = ma.personen.filter(p=>{
          if(!(p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).includes(sl.gruppeId)) return false;
          if((p.dienste||[]).length>0&&!(p.dienste||[]).includes(sl.dienstId)) return false;
          const isAbsent=(ma.abwesenheiten||[]).some(a=>a.personId===p.id&&s.datum>=a.from&&s.datum<=(a.to||a.from));
          if(isAbsent) return false;
          const w=(s.wuensche||[]).find(x=>x.personId===p.id&&x.slotId===sl.id);
          return w?.art!=='wunschfrei';
        });
        const pick = excl=>{
          const ok=p=>!excl.has(p.id)&&!conflictsWith(p.id,usedNow);
          const praefs=ma.praeferenzen||[];
          const wunsch=eligible.filter(p=>{const w=(s.wuensche||[]).find(x=>x.personId===p.id&&x.slotId===sl.id);return w?.art==='wunschdienst'&&ok(p);});
          const bevorzugt=eligible.filter(p=>ok(p)&&!wunsch.find(x=>x.id===p.id)&&praefs.some(pf=>pf.personId===p.id&&pf.dienstId===sl.dienstId&&pf.prio==='bevorzugt'));
          const neutral=eligible.filter(p=>ok(p)&&!wunsch.find(x=>x.id===p.id)&&!bevorzugt.find(x=>x.id===p.id)&&!praefs.some(pf=>pf.personId===p.id&&pf.dienstId===sl.dienstId&&pf.prio==='vermeidet'));
          const vermeidet=eligible.filter(p=>ok(p)&&!wunsch.find(x=>x.id===p.id)&&!bevorzugt.find(x=>x.id===p.id)&&!neutral.find(x=>x.id===p.id));
          const byCount=(a,b)=>{
            const ca=counts[a.id]||0, cb=counts[b.id]||0;
            if(ca!==cb) return ca-cb;
            const la=lastServedAll[a.id]||'2000-01-01', lb=lastServedAll[b.id]||'2000-01-01';
            return la.localeCompare(lb);
          };
          const pool=[...wunsch,...bevorzugt.sort(byCount),...neutral.sort(byCount),...vermeidet.sort(byCount)];
          if(!pool.length) return '';
          const p=pool[0]; counts[p.id]=(counts[p.id]||0)+1; excl.add(p.id); return p.id;
        };
        const p1=pick(new Set(usedNow)); if(p1&&!sl.doppelt) usedNow.add(p1);
        return {...sl,personId:p1,personId2:''};
      });
      return {...s,slots:newSlots};
    });
    onChange(m=>({...m,schichten:newSchichten}));
    toast(`${ma.schichten.length} Schichten auto-eingeteilt ⚡`);
  };

  const buildShareText = s => {
    const lines = [`📅 *${s.titel||fmtDe(s.datum)}* — ${fmtDe(s.datum)}\n`];
    s.slots.forEach(sl => {
      const g  = ma.gruppen.find(x=>x.id===sl.gruppeId);
      const d  = (g?.dienste||[]).find(x=>x.id===sl.dienstId);
      const p1 = ma.personen.find(x=>x.id===sl.personId);
      const names = p1?.name || '—';
      lines.push(`• ${d?.name||'?'}: ${names}${sl.doppelt?' (Doppeldienst)':''}`);
    });
    return lines.join('\n');
  };

  // ── Calendar View ──
  if (view==='list' && listView==='calendar') {
    const DAYS = ['Mo','Di','Mi','Do','Fr','Sa','So'];
    const firstDay = new Date(calYM.y, calYM.m, 1);
    const lastDay  = new Date(calYM.y, calYM.m+1, 0);
    const startDow = (firstDay.getDay()+6)%7; // 0=Mon
    const cells = [];
    for (let i=0;i<startDow;i++) cells.push(null);
    for (let d=1;d<=lastDay.getDate();d++) cells.push(d);
    while (cells.length%7!==0) cells.push(null);
    const pad = n => String(n).padStart(2,'0');
    const monthNames=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
    return (
      <div className="space-y-4 up">
        <div className="flex items-center justify-between">
          <div>
            <h1 className="text-xl font-bold grad">Dienstplan</h1>
            <p className="text-slate-500 text-sm mt-0.5">{monthNames[calYM.m]} {calYM.y}</p>
          </div>
          <div className="flex gap-2 items-center">
            <button onClick={()=>setListView('list')} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold bg-black/5 text-slate-600 hover:bg-black/8 transition-all">Liste</button>
            <button onClick={()=>setCalYM(p=>{const d=new Date(p.y,p.m-1,1);return{y:d.getFullYear(),m:d.getMonth()};})} className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 text-slate-500 hover:bg-black/8 transition-all"><SI p={IC.chevLeft} size={13}/></button>
            <button onClick={()=>setCalYM(p=>{const d=new Date(p.y,p.m+1,1);return{y:d.getFullYear(),m:d.getMonth()};})} className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 text-slate-500 hover:bg-black/8 transition-all"><SI p={IC.chevronRight} size={13}/></button>
          </div>
        </div>
        <div className="glass rounded-2xl overflow-hidden">
          <div className="grid grid-cols-7" style={{borderBottom:'1px solid rgba(0,0,0,0.08)'}}>
            {DAYS.map(d=><div key={d} className="py-2 text-center text-xs font-semibold text-slate-400">{d}</div>)}
          </div>
          <div className="grid grid-cols-7">
            {cells.map((day,i)=>{
              if (!day) return <div key={i} className="min-h-[56px] p-1" style={{borderRight:'1px solid rgba(0,0,0,0.05)',borderBottom:'1px solid rgba(0,0,0,0.05)'}}/>;
              const dateStr = `${calYM.y}-${pad(calYM.m+1)}-${pad(day)}`;
              const daySchichten = sorted.filter(s=>s.datum===dateStr);
              const isToday = dateStr===today();
              return (
                <div key={i} className="min-h-[56px] p-1 space-y-0.5" style={{borderRight:'1px solid rgba(0,0,0,0.05)',borderBottom:'1px solid rgba(0,0,0,0.05)'}}>
                  <div className={`text-xs font-semibold mb-1 w-5 h-5 flex items-center justify-center rounded-full ${isToday?'bg-slate-900 text-white':'text-slate-500'}`}>{day}</div>
                  {daySchichten.map(s=>{
                    const filled=s.slots.filter(sl=>sl.personId).length;
                    const full=filled===s.slots.length&&s.slots.length>0;
                    return (
                      <div key={s.id} onClick={()=>{setSelSchichtId(s.id);setView('detail');}} className="cursor-pointer rounded px-1 py-0.5 text-xs truncate font-medium transition-all hover:opacity-80"
                        style={{background:full?'rgba(16,185,129,0.15)':'rgba(99,102,241,0.12)',color:full?'#10b981':'#818cf8'}}>
                        {s.titel||'Schicht'} {filled}/{s.slots.length}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ── List View ──
  if (view==='list') return (
    <div className="space-y-5 up">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-xl font-bold grad">Dienstplan</h1>
          <p className="text-slate-500 text-sm mt-0.5">{ma.schichten.length} Schichten</p>
        </div>
        <div className="flex gap-2">
          {onChange && !allowedGroups && <button onClick={runAutoAll} disabled={ma.schichten.length===0}
            className="flex items-center gap-1.5 bg-white hover:bg-gray-100 disabled:opacity-40 text-black text-xs font-bold px-3.5 py-2 transition-all" style={{borderRadius:30}}>
            <SI p={IC.zap} size={13}/> Auto-Plan
          </button>}
          {onChange && conflicts.length>0 && (
            <button onClick={()=>setShowConflicts(p=>!p)}
              className="flex items-center gap-1.5 text-xs font-bold px-3.5 py-2 transition-all"
              style={{borderRadius:30, background:showConflicts?'rgba(239,68,68,0.15)':'rgba(239,68,68,0.08)', color:'#ef4444', border:'1px solid rgba(239,68,68,0.25)'}}>
              ⚡ {conflicts.length} Konflikt{conflicts.length!==1?'e':''}
            </button>
          )}
          <button onClick={()=>setListView('calendar')} className="flex items-center gap-1.5 bg-white hover:bg-gray-100 text-black text-xs font-bold px-3.5 py-2 transition-all" style={{borderRadius:30}}>
            📅 Kalender
          </button>
          {ma.schichten.length>0 && <button onClick={()=>{ setShareScope('all'); setShareText(buildPlanText(ma)); setModal('share'); }}
            className="flex items-center gap-1.5 bg-white hover:bg-gray-100 text-black text-xs font-bold px-3.5 py-2 transition-all" style={{borderRadius:30}}>
            <SI p={IC.send} size={13}/> Teilen
          </button>}
          {onChange && !allowedGroups && ma.schichten.some(s=>!s.veroeffentlicht) && (
            <button onClick={publishAll}
              className="flex items-center gap-1.5 bg-white hover:bg-gray-100 text-black text-xs font-bold px-3.5 py-2 transition-all" style={{borderRadius:30}}>
              ✓ Alle veröff.
            </button>
          )}
          {onChange && !allowedGroups && <button onClick={() => { setCreateForm({ datum:today(), titel:'', vorlageId:ma.vorlagen[0]?.id||'' }); setModal('create'); }}
            className="flex items-center gap-1.5 bg-white hover:bg-gray-100 text-black text-xs font-bold px-3.5 py-2 transition-all" style={{borderRadius:30}}>
            <SI p={IC.plus} size={13}/> Schicht
          </button>}
        </div>
      </div>

      {/* Person-Filter */}
      {ma.personen.length>0 && (
        <select value={filterPerson} onChange={e=>setFilterPerson(e.target.value)}
          className="w-full bg-black/5 border border-black/10 rounded-2xl px-4 py-2.5 text-sm text-slate-700 outline-none">
          <option value="">Alle Personen</option>
          {ma.personen.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      )}

      {/* Globale Tausch-Anfragen */}
      {onChange && (ma.tauschAnfragen||[]).length>0 && (
        <div className="glass rounded-2xl p-4 space-y-2.5" style={{borderLeft:'3px solid rgba(251,146,60,0.6)'}}>
          <div className="text-xs font-semibold uppercase tracking-wider" style={{color:'#f97316'}}>🔄 {(ma.tauschAnfragen||[]).length} offene Tausch-Anfrage{(ma.tauschAnfragen||[]).length!==1?'n':''}</div>
          {(ma.tauschAnfragen||[]).slice(0,4).map(r=>{
            const person=ma.personen.find(p=>p.id===r.personId);
            const schicht=ma.schichten.find(s=>s.id===r.schichtId);
            const slot=schicht?.slots.find(sl=>sl.id===r.slotId);
            const g=ma.gruppen.find(x=>x.id===slot?.gruppeId);
            const d=(g?.dienste||[]).find(x=>x.id===slot?.dienstId);
            const isOrphan = !schicht;
            return (
              <div key={r.id} className="flex items-center gap-2">
                <div className={`flex items-center gap-2 flex-1 min-w-0 ${!isOrphan?'cursor-pointer hover:opacity-80':''} transition-all`}
                  onClick={()=>{ if(!isOrphan){setSelSchichtId(r.schichtId);setView('detail');} }}>
                  <Avatar name={person?.name||'?'} farbe={person?.farbe||'#f97316'} size={24}/>
                  <div className="flex-1 min-w-0 text-xs">
                    <span className="font-semibold text-slate-700">{person?.name||'?'}</span>
                    <span className="text-slate-500"> · {d?.name||'?'} · {schicht?fmtDe(schicht.datum):isOrphan?<span className="text-red-400">Schicht gelöscht</span>:''}</span>
                  </div>
                  {!isOrphan && <SI p={IC.chevronRight} size={12} className="text-slate-400 flex-shrink-0"/>}
                </div>
                <button onClick={e=>{e.stopPropagation();onChange(m=>({...m,tauschAnfragen:(m.tauschAnfragen||[]).filter(x=>x.id!==r.id)}));}}
                  className="w-6 h-6 flex items-center justify-center rounded-lg hover:bg-red-900/25 text-slate-400 hover:text-red-400 transition-all flex-shrink-0" title="Anfrage löschen">
                  <SI p={IC.trash} size={11}/>
                </button>
              </div>
            );
          })}
        </div>
      )}

      {/* Konflikt-Panel */}
      {showConflicts && conflicts.length>0 && (
        <div className="glass rounded-2xl p-4 space-y-2.5 up" style={{borderLeft:'3px solid rgba(239,68,68,0.6)'}}>
          <div className="flex items-center gap-2">
            <div className="text-xs font-semibold uppercase tracking-wider" style={{color:'#ef4444'}}>⚡ Planungs-Konflikte</div>
            <button onClick={()=>setShowConflicts(false)} className="ml-auto text-slate-400 hover:text-slate-700 transition-all"><SI p={IC.x} size={12}/></button>
          </div>
          {conflicts.map((c,i) => {
            const schicht = ma.schichten.find(s=>s.id===c.schichtId);
            const person  = ma.personen.find(p=>p.id===c.personId);
            const typeIcon = c.type==='abwesend'?'🏖':c.type==='praeferenz'?'⚠️':c.type==='personenkonflikt'?'🚫':'📅';
            return (
              <div key={i} onClick={()=>{setSelSchichtId(c.schichtId);setView('detail');setShowConflicts(false);}}
                className="flex items-start gap-2.5 cursor-pointer hover:opacity-80 transition-all p-2 rounded-xl"
                style={{background:'rgba(239,68,68,0.05)'}}>
                <span className="text-base flex-shrink-0 mt-0.5">{typeIcon}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-xs font-semibold text-slate-700">{c.msg}</div>
                  <div className="text-xs text-slate-400 mt-0.5">{schicht?`${fmtDe(schicht.datum)}${schicht.titel?' · '+schicht.titel:''}`:fmtDe(c.datum)}</div>
                </div>
                <SI p={IC.chevronRight} size={12} className="text-slate-400 flex-shrink-0 mt-1"/>
              </div>
            );
          })}
        </div>
      )}

      {/* Plan switcher */}
      {(onChange || (ma.plaene||[]).length>0) && (
        <div className="flex gap-1.5 flex-wrap items-center">
          <button onClick={()=>setSelPlanId('all')} style={{borderRadius:30,background:selPlanId==='all'?'#000000':'rgba(0,0,0,0.05)',color:selPlanId==='all'?'#ffffff':'#64748b'}}
            className="px-3 py-1.5 text-xs font-semibold transition-all">Alle</button>
          {(ma.plaene||[]).map(p=>(
            <div key={p.id} className="flex items-center gap-0.5">
              <button onClick={()=>setSelPlanId(p.id)} style={{borderRadius:30,background:selPlanId===p.id?'#000000':'rgba(0,0,0,0.05)',color:selPlanId===p.id?'#ffffff':'#64748b'}}
                className="px-3 py-1.5 text-xs font-semibold transition-all">{p.name}</button>
              {onChange && !allowedGroups && selPlanId===p.id && (

              <button onClick={()=>setPlanModal(null)} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm transition-all" style={{borderRadius:30}}>Abbrechen</button>
            </div>
          </div>
        </Modal>

      {exportModal && (
        <Modal title="Dienstplan exportieren" onClose={()=>setExportModal(false)}>
          <div className="space-y-3">
            <p className="text-slate-500 text-xs">{sorted.length} Schichten exportieren</p>

              </button>

                <div className="space-y-2">

                      <button key={v} type="button" onClick={()=>setRecur(r=>({...r,type:v}))}
                        className={`flex-1 py-1.5 rounded-lg text-xs font-semibold transition-all ${recur.type===v?'bg-slate-900 text-white':'bg-black/5 text-slate-600 hover:bg-black/8'}`}>{l}</button>
                    ))}
                  </div>
                  <div>
                    <label className="text-slate-400 text-xs block mb-1">Bis Datum</label>
                    <input type="date" value={recur.until} onChange={e=>setRecur(r=>({...r,until:e.target.value}))}
                      className={"w-full "+INP} min={createForm.datum}/>
                  </div>
                  {recur.until && <p className="text-indigo-400 text-xs">Erstellt Schichten bis {fmtDe(recur.until)}</p>}
                </div>
              )}
            </div>
            <div className="flex gap-2 pt-1">
              <button onClick={createSchicht} className="flex-1 bg-white hover:bg-gray-100 text-black font-bold py-2.5 text-sm" style={{borderRadius:30}}>
                {recur.enabled&&recur.until?'Erstellen & Generieren':'Erstellen'}
              </button>
              <button onClick={() => { setModal(null); setRecur({enabled:false,type:'weekly',until:''}); }} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm" style={{borderRadius:30}}>Abbrechen</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );

  // ── Detail View ──
  if (!selSchicht) { setView('list'); return null; }

  return (
    <div className="space-y-4 up">
      {/* Header */}
      <div className="flex items-center gap-3">
        <button onClick={() => setView('list')} className="w-8 h-8 flex items-center justify-center rounded-xl bg-black/5 hover:bg-black/5 text-slate-400 transition-all">
          <SI p={IC.chevLeft} size={16}/>
        </button>
        <div className="flex-1 min-w-0">
          <h1 className="text-lg font-bold text-slate-900 leading-none">{fmtDe(selSchicht.datum)}{selSchicht.titel?' — '+selSchicht.titel:''}</h1>
          <div className="text-slate-500 text-xs mt-0.5">{selSchicht.slots.filter(sl=>sl.personId).length}/{selSchicht.slots.length} Slots besetzt</div>
          {onChange ? (
            <input value={selSchicht.notiz||''} onChange={e=>updateSchicht(selSchicht.id,s=>({...s,notiz:e.target.value}))}
              placeholder="📝 Interne Notiz zur Schicht…"
              className="mt-1.5 w-full bg-black/5 border border-black/10 rounded-xl px-3 py-1.5 text-xs text-slate-700 placeholder-slate-400 outline-none transition-all"/>
          ) : selSchicht.notiz ? (
            <div className="mt-1.5 px-3 py-1.5 rounded-xl text-xs text-slate-600" style={{background:'rgba(0,0,0,0.04)',border:'1px solid rgba(0,0,0,0.08)'}}>📝 {selSchicht.notiz}</div>
          ) : null}
        </div>

        {onChange && !allowedGroups && <>

            {selSchicht.veroeffentlicht?'✓ Veröffentlicht':'Veröffentlichen'}
          </button>
          <button onClick={runAuto} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold bg-amber-600/20 text-amber-400 hover:bg-amber-600/30 transition-all">
            <SI p={IC.zap} size={12}/> Auto-Einteilung
          </button>
        </>}
        <button onClick={()=>{ setShareScope('single'); setShareText(buildPlanText(ma,selSchicht)); setModal('share'); }}
          className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold bg-black/5 text-slate-700 hover:bg-black/8 transition-all">
          <SI p={IC.send} size={12}/> Teilen
        </button>
        {onChange && !allowedGroups && (
          <button onClick={()=>{
            if (!selSchicht.abfrageToken) { const t=genId().slice(0,8); updateSchicht(selSchicht.id,{abfrageToken:t}); toast('Abfrage-Link generiert'); }
            setModal('abfrage_link');
          }} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all"
            style={{background:'rgba(99,102,241,0.15)',color:'#818cf8'}}>
            📋 Abfrage
          </button>
        )}
        {onChange && !allowedGroups && <>
          <button onClick={saveAsVorlage}
            className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all"
            style={{background:'rgba(16,185,129,0.12)',color:'#10b981'}}>
            <SI p={IC.copy} size={12}/> Als Vorlage
          </button>
          <button onClick={()=>{setDupDate(selSchicht.datum);setDupModal(selSchicht);}}
            className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold bg-black/5 text-slate-700 hover:bg-black/8 transition-all">
            <SI p={IC.copy} size={12}/> Duplizieren
          </button>
          <button onClick={addSchSlot} disabled={ma.gruppen.length===0}
            className="ml-auto flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold bg-black/8 text-slate-800 hover:bg-black/12 disabled:opacity-40 transition-all">
            <SI p={IC.plus} size={12}/> Slot
          </button>
        </>}

      <div className="space-y-2">
        {selSchicht.slots.length===0 && (
          <div className="glass rounded-2xl py-10 text-center text-slate-600 text-sm">

          </div>

          const g  = ma.gruppen.find(x=>x.id===sl.gruppeId);

          const p2 = sl.doppelt ? ma.personen.find(x=>x.id===sl.personId2) : null;
          const col = g?.farbe||'#8b5cf6';
          const slotWishes = (selSchicht.wuensche||[]).filter(w=>w.slotId===sl.id);

          const wJa  = slotWishes.filter(w=>w.art==='wunschdienst').length;
          const wNein= slotWishes.filter(w=>w.art==='wunschfrei').length;

          const dienstCount = d?.count || 1;
          const filledCount = selSchicht.slots.filter(other => other.dienstId===sl.dienstId && other.gruppeId===sl.gruppeId && other.personId).length;

          return (
            <div key={sl.id} className="glass rounded-2xl p-3">
              <div className="flex items-center gap-2 mb-2">
                <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:col}}/>
                <span className="text-xs font-semibold text-slate-500">{g?.name||'?'}</span>
                <span className="text-slate-700 text-xs">›</span>
                <span className="text-xs font-semibold text-slate-700">{d?.name||'?'}</span>
                {(()=>{ const g2=ma.gruppen.find(x=>x.id===sl.gruppeId); const d2=(g2?.dienste||[]).find(x=>x.id===sl.dienstId); return (d2?.extra||sl.doppelt) && <span className="pill text-xs" style={{background:'rgba(245,158,11,0.15)',color:'#f59e0b'}}>Extra</span>; })()}

                {wNein>0 && <span className="pill text-xs" style={{background:'rgba(239,68,68,0.08)',color:'#ef4444'}}>👎 {wNein}</span>}
                {wCount>0&&wJa===0&&wNein===0 && <span className="pill text-xs" style={{background:'rgba(245,158,11,0.1)',color:'#f59e0b'}}>{wCount} Wünsche</span>}
                {sl.personId && (()=>{ const b=(selSchicht.bestaetigt||{})[sl.personId]; return b ? <span className="pill text-xs" style={{background:b==='ja'?'rgba(16,185,129,0.12)':'rgba(239,68,68,0.1)',color:b==='ja'?'#10b981':'#ef4444'}}>{b==='ja'?'✓':'✕'}</span> : null; })()}
                {onChange && <button onClick={() => remSchSlot(sl.id)} className="ml-auto text-slate-700 hover:text-red-400 transition-all"><SI p={IC.x} size={12}/></button>}
              </div>
              <div className="flex gap-2 flex-wrap items-center">
                {/* Assign P1 — clickable for admin/allowed group, read-only otherwise */}
                {(onChange && (!allowedGroups || allowedGroups.includes(sl.gruppeId)))
                  ? <button onClick={() => { setSelSlot({...sl,isSecond:false}); setModal('assign'); }}
                      className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-medium transition-all"
                      style={p1?{background:p1.farbe+'25',color:p1.farbe,border:`1px solid ${p1.farbe}44`}:{background:'rgba(0,0,0,0.04)',color:'#64748b',border:'1px solid rgba(0,0,0,0.08)'}}>
                      {p1?<><Avatar name={p1.name} farbe={p1.farbe} size={16}/><span>{p1.name}</span></>:'+ Zuweisen'}
                    </button>
                  : p1 && <span className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-medium" style={{background:p1.farbe+'25',color:p1.farbe,border:`1px solid ${p1.farbe}44`}}><Avatar name={p1.name} farbe={p1.farbe} size={16}/>{p1.name}</span>
                }
                {p1 && onChange && (()=>{
                  const b=(selSchicht.bestaetigt||{})[p1.id];
                  return <div className="flex gap-1">
                    <button onClick={()=>toggleBestaetigung(p1.id,'ja')} title="Bestätigt"
                      className={`w-6 h-6 flex items-center justify-center rounded-lg text-xs font-bold transition-all ${b==='ja'?'bg-emerald-500/20 text-emerald-400':'bg-black/5 text-slate-500 hover:bg-black/8'}`}>✓</button>
                    <button onClick={()=>toggleBestaetigung(p1.id,'nein')} title="Abgelehnt"
                      className={`w-6 h-6 flex items-center justify-center rounded-lg text-xs font-bold transition-all ${b==='nein'?'bg-red-500/20 text-red-400':'bg-black/5 text-slate-500 hover:bg-black/8'}`}>✕</button>
                  </div>;
                })()}
                {/* Tausch buttons — shown when myPerson is assigned to this slot */}
                {onTausch && myPerson && sl.personId===myPerson.id && !(ma.tauschAnfragen||[]).some(r=>r.slotId===sl.id&&!r.isSecond) && (
                  <button onClick={()=>{setTauschSlot({slotId:sl.id,isSecond:false});setTauschNote('');setModal('tausch');}}
                    className="flex items-center gap-1 px-2 py-1 rounded-lg text-xs font-medium transition-all"
                    style={{background:'rgba(251,146,60,0.12)',color:'#f97316',border:'1px solid rgba(251,146,60,0.25)'}}>
                    🔄 Tauschen
                  </button>
                )}
              </div>
            </div>
          );
        })}
      </div>


      {/* Tausch-Anfragen Section */}
      {onTausch && (() => {
        const schichtReqs = (ma.tauschAnfragen||[]).filter(r=>r.schichtId===selSchicht.id);
        const visReqs = schichtReqs.filter(r=>{
          const requester=ma.personen.find(p=>p.id===r.personId);
          if(!requester) return false;
          const rGrps=requester.gruppenIds||(requester.gruppeId?[requester.gruppeId]:[]);
          // Owner/admin see all; others see requests from their own groups
          if(!myPerson) return true;
          return rGrps.some(g=>myGroupIds.includes(g))||r.personId===myPerson.id;
        });
        if(visReqs.length===0) return null;
        return (
          <div className="glass rounded-2xl p-4 space-y-2">
            <div className="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2">🔄 Tausch-Anfragen</div>
            {visReqs.map(r=>{
              const requester=ma.personen.find(p=>p.id===r.personId);
              const schicht2=ma.schichten.find(s=>s.id===r.schichtId);
              const slot2=schicht2?.slots.find(sl=>sl.id===r.slotId);
              const g=ma.gruppen.find(x=>x.id===slot2?.gruppeId);
              const d=(g?.dienste||[]).find(x=>x.id===slot2?.dienstId);
              const isOwn=myPerson?.id===r.personId;
              const canAccept=myPerson&&!isOwn&&(myPerson.gruppenIds||(myPerson.gruppeId?[myPerson.gruppeId]:[])).includes(slot2?.gruppeId||'');
              return (
                <div key={r.id} className="flex items-center gap-3 p-2.5 rounded-xl" style={{background:'rgba(251,146,60,0.06)',border:'1px solid rgba(251,146,60,0.15)'}}>
                  <Avatar name={requester?.name||'?'} farbe={requester?.farbe||'#f97316'} size={28}/>
                  <div className="flex-1 min-w-0">
                    <div className="text-xs font-semibold text-slate-700">{requester?.name||'?'} · <span style={{color:g?.farbe}}>{d?.name||'?'}</span></div>
                    {r.note && <div className="text-slate-500 text-xs truncate">„{r.note}"</div>}
                  </div>
                  {canAccept && <button onClick={()=>acceptTausch(r)}
                    className="px-3 py-1.5 rounded-lg text-xs font-bold transition-all"
                    style={{background:'rgba(16,185,129,0.15)',color:'#10b981'}}>Annehmen</button>}
                  {isOwn && <button onClick={()=>cancelTausch(r)}
                    className="px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-slate-500 hover:text-red-400">Zurückziehen</button>}
                  {!isOwn && onChange && <button onClick={()=>cancelTausch(r)} title="Anfrage löschen (Admin)"
                    className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 hover:bg-red-50 text-slate-400 hover:text-red-500 transition-all"><SI p={IC.trash} size={11}/></button>}
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* Tausch Modal */}
      {modal==='tausch' && tauschSlot && selSchicht && (() => {
        const slot2=selSchicht.slots.find(sl=>sl.id===tauschSlot.slotId);
        const g=ma.gruppen.find(x=>x.id===slot2?.gruppeId);
        const d=(g?.dienste||[]).find(x=>x.id===slot2?.dienstId);
        return (
          <Modal title="Tausch-Anfrage stellen" onClose={()=>setModal('detail_view')}>
            <div className="space-y-4">
              <p className="text-slate-500 text-sm">Dein Dienst <strong style={{color:g?.farbe}}>{d?.name||'?'}</strong> wird für alle in deiner Gruppe sichtbar. Wer annimmt, übernimmt den Dienst.</p>
              <div>
                <label className="text-slate-400 text-xs block mb-1.5">Nachricht (optional)</label>
                <input value={tauschNote} onChange={e=>setTauschNote(e.target.value)}
                  placeholder="z. B. bin krank, bitte jemand übernehmen"
                  className={"w-full "+INP} autoFocus onKeyDown={e=>e.key==='Enter'&&submitTausch()}/>
              </div>
              <div className="flex gap-2 pt-1">
                <button onClick={submitTausch} className="flex-1 bg-white hover:bg-gray-100 text-black font-bold py-2.5 text-sm" style={{borderRadius:30}}>Anfrage stellen</button>
                <button onClick={()=>setModal('detail_view')} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm" style={{borderRadius:30}}>Abbrechen</button>
              </div>
            </div>
          </Modal>
        );
      })()}

      {/* Assign Modal */}
      {modal==='assign' && selSlot && (() => {
        const g = ma.gruppen.find(x=>x.id===selSlot.gruppeId);
        const d = (g?.dienste||[]).find(x=>x.id===selSlot.dienstId);
        const eligible = ma.personen.filter(p=>(p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).includes(selSlot.gruppeId));
        const cur = selSlot.isSecond ? selSlot.personId2 : selSlot.personId;
        const schichtDatum = selSchicht.datum;
        // Workload: count slots this month per person (for admins/editors with canEdit)
        const canShowWorkload = !!onChange;
        const monthStr = schichtDatum ? schichtDatum.slice(0,7) : '';
        const monthCounts = {};
        if (canShowWorkload && monthStr) {
          ma.schichten.filter(s=>s.datum.startsWith(monthStr)).forEach(s => s.slots.forEach(sl => {
            if (sl.personId) monthCounts[sl.personId] = (monthCounts[sl.personId]||0)+1;
            if (sl.personId2) monthCounts[sl.personId2] = (monthCounts[sl.personId2]||0)+1;
          }));
        }
        return (
          <Modal title={`Zuweisen: ${d?.name||'?'}`} onClose={() => setModal(null)}>
            <div className="space-y-1.5">
              {eligible.length===0&&<div className="text-slate-500 text-sm py-4 text-center">Keine Personen in dieser Gruppe.</div>}
              {eligible.map(p => {
                const sel = cur===p.id;
                const wish = (selSchicht.wuensche||[]).find(w=>w.personId===p.id&&w.slotId===selSlot.id);
                const isAbsent = (ma.abwesenheiten||[]).some(a => a.personId===p.id && schichtDatum>=a.from && schichtDatum<=(a.to||a.from));
                const alreadyAssigned = selSchicht.slots.some(other => other.id!==selSlot.id && (other.personId===p.id||other.personId2===p.id));
                const alreadyOtherShift = ma.schichten.some(s2 => s2.id!==selSchicht.id && s2.datum===schichtDatum && s2.slots.some(sl2=>sl2.personId===p.id||sl2.personId2===p.id));
                const vermeidetDienst = (ma.praeferenzen||[]).some(pf=>pf.personId===p.id&&pf.dienstId===selSlot.dienstId&&pf.prio==='vermeidet');
                const hasPersonenkonflikt = selSchicht.slots.some(other=>{
                  const others=[other.personId,other.personId2].filter(Boolean);
                  return others.some(oid=>(ma.konflikte||[]).some(k=>(k.p1===p.id&&k.p2===oid)||(k.p2===p.id&&k.p1===oid)));
                });
                const wl = canShowWorkload ? (monthCounts[p.id]||0) : 0;
                const wlDot = canShowWorkload && wl>=5 ? { color:'#ef4444', label:`${wl} Dienste – hohe Auslastung` }
                            : canShowWorkload && wl>=3 ? { color:'#f97316', label:`${wl} Dienste diesen Monat` }
                            : null;
                return (
                  <button key={p.id} onClick={() => assignPerson(selSlot.id,p.id,selSlot.isSecond)}
                    className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all"
                    style={sel?{background:p.farbe+'30',border:`1px solid ${p.farbe}55`}:{background:'rgba(0,0,0,0.03)',border:'1px solid rgba(0,0,0,0.08)'}}>
                    <Avatar name={p.name} farbe={p.farbe} size={34}/>
                    <div className="flex-1 text-left">
                      <div className="flex items-center gap-1.5">
                        <span className="font-semibold text-sm" style={{color:sel?p.farbe:'#e2e8f0'}}>{p.name}</span>
                        {isAbsent && <span title="Abwesenheit eingetragen" className="text-xs font-bold text-amber-400">🏖 abwesend</span>}
                        {alreadyAssigned && !isAbsent && <span className="text-xs font-bold text-orange-400">↩ Doppeldienst</span>}
                        {alreadyOtherShift && !isAbsent && !alreadyAssigned && <span className="text-xs font-bold text-orange-400">📅 and. Schicht</span>}
                        {vermeidetDienst && <span className="text-xs font-bold" style={{color:'#f97316'}}>⚠ vermeidet</span>}
                        {hasPersonenkonflikt && <span className="text-xs font-bold text-red-400">🚫 Konflikt</span>}
                        {wlDot && <span title={wlDot.label} className="dot flex-shrink-0" style={{background:wlDot.color,width:8,height:8}}/>}
                      </div>
                      {wish&&<div className="text-xs" style={{color:wish.art==='wunschdienst'?'#10b981':'#ef4444'}}>{wish.art==='wunschdienst'?'✓ Wunschdienst':'✕ Wunschfrei'}</div>}
                      {wlDot && <div className="text-xs" style={{color:wlDot.color}}>{wlDot.label}</div>}
                    </div>
                    {sel&&<SI p={IC.check} size={14} stroke={3}/>}
                  </button>
                );
              })}
            </div>
          </Modal>
        );
      })()}

      {/* Wish Modal */}
      {modal==='wish' && wishPid && (() => {
        const person = ma.personen.find(p=>p.id===wishPid);
        const personGrpIds=person?.gruppenIds||(person?.gruppeId?[person.gruppeId]:[]);
        const relSlots = selSchicht.slots.filter(sl=>personGrpIds.includes(sl.gruppeId));
        return (
          <Modal title={`Wünsche: ${person?.name||'?'}`} onClose={() => setModal(null)}>
            <div className="space-y-3">
              {relSlots.length===0&&<div className="text-slate-500 text-sm">Keine relevanten Slots.</div>}
              {relSlots.map(sl => {
                const g = ma.gruppen.find(x=>x.id===sl.gruppeId);
                const d = (g?.dienste||[]).find(x=>x.id===sl.dienstId);
                const art = wishForm[sl.id]||'';
                return (
                  <div key={sl.id} className="flex items-center gap-2">
                    <span className="flex-1 text-sm text-slate-700 truncate">{d?.name||'?'}</span>
                    {['','wunschdienst','wunschfrei'].map(v=>(
                      <button key={v} onClick={() => setWishForm(p=>({...p,[sl.id]:v}))}
                        className={`px-2.5 py-1 rounded-lg text-xs font-medium transition-all whitespace-nowrap ${art===v?v==='wunschdienst'?'bg-emerald-900/40 text-emerald-400':v==='wunschfrei'?'bg-red-900/30 text-red-400':'bg-black/10 text-slate-800':'bg-black/5 text-slate-600 hover:bg-black/5'}`}>
                        {v===''?'Egal':v==='wunschdienst'?'✓ Wunsch':'✕ Frei'}
                      </button>
                    ))}
                  </div>
                );
              })}
              <div className="flex gap-2 pt-2">
                <button onClick={saveWishes} className="flex-1 bg-white hover:bg-gray-100 text-black font-bold py-2.5 text-sm" style={{borderRadius:30}}>Speichern</button>
                <button onClick={() => setModal(null)} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm" style={{borderRadius:30}}>Abbrechen</button>
              </div>
            </div>
          </Modal>
        );
      })()}

      {/* Share Modal */}
      {modal==='share' && (
        <Modal title={shareScope==='all'?'Gesamtplan teilen':'Schicht teilen'} onClose={() => setModal(null)}>
          <div className="space-y-4">
            {/* Preview */}
            <div className="rounded-2xl overflow-auto max-h-48" style={{background:'rgba(0,0,0,0.03)',border:'1px solid rgba(0,0,0,0.06)'}}>
              <pre className="text-xs text-slate-700 font-mono whitespace-pre-wrap leading-relaxed p-4">{shareText}</pre>
            </div>
            {/* Action buttons */}
            <div className="grid grid-cols-2 gap-2">
              <button onClick={()=>{ exportExcelPlan(ma, selSchicht?.datum||today(), shareScope==='single'?selSchicht:null); toast('Excel exportiert ✓'); }}
                className="flex flex-col items-center gap-2 py-4 rounded-2xl transition-all border"
                style={{background:'rgba(16,185,129,0.06)',borderColor:'rgba(16,185,129,0.2)',color:'#059669'}}>
                <SI p={IC.download} size={18} stroke={1.8}/>
                <span className="text-xs font-bold">Excel</span>
              </button>
              <button onClick={async()=>{ try{await navigator.clipboard.writeText(shareText);toast('Kopiert! 📋');}catch{if(navigator.share)await navigator.share({text:shareText}).catch(()=>{});else alert(shareText);} }}
                className="flex flex-col items-center gap-2 py-4 rounded-2xl transition-all border"
                style={{background:'rgba(59,130,246,0.06)',borderColor:'rgba(59,130,246,0.2)',color:'#2563eb'}}>
                <SI p={IC.copy} size={18} stroke={1.8}/>
                <span className="text-xs font-bold">Kopieren</span>
              </button>
              <button onClick={()=>{ exportIcal(ma, shareScope==='single'?selSchicht:null); toast('iCal exportiert ✓'); }}
                className="flex flex-col items-center gap-2 py-4 rounded-2xl transition-all border"
                style={{background:'rgba(99,102,241,0.06)',borderColor:'rgba(99,102,241,0.2)',color:'#6366f1'}}>
                <SI p={IC.calendar} size={18} stroke={1.8}/>
                <span className="text-xs font-bold">iCal</span>
              </button>
              <button onClick={()=>{
                const rows = shareScope==='single'&&selSchicht
                  ? selSchicht.slots.map(sl=>{const g=ma.gruppen.find(x=>x.id===sl.gruppeId);const d=(g?.dienste||[]).find(x=>x.id===sl.dienstId);const p1=ma.personen.find(x=>x.id===sl.personId);const p2=sl.doppelt?ma.personen.find(x=>x.id===sl.personId2):null;return `<tr><td>${g?.name||''}</td><td>${d?.name||''}</td><td>${p1?.name||'—'}</td><td>${p2?.name||''}</td></tr>`;}).join('')
                  : [...ma.schichten].sort((a,b)=>a.datum.localeCompare(b.datum)).map(s=>`<tr><td colspan="4" style="background:#f1f5f9;font-weight:700;padding:10px 12px">${fmtDe(s.datum)}${s.titel?' — '+s.titel:''}</td></tr>`+s.slots.map(sl=>{const g=ma.gruppen.find(x=>x.id===sl.gruppeId);const d=(g?.dienste||[]).find(x=>x.id===sl.dienstId);const p1=ma.personen.find(x=>x.id===sl.personId);const p2=sl.doppelt?ma.personen.find(x=>x.id===sl.personId2):null;return `<tr><td>${g?.name||''}</td><td>${d?.name||''}</td><td>${p1?.name||'—'}</td><td>${p2?.name||''}</td></tr>`;}).join('')).join('');
                const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Dienstplan</title><style>body{font-family:system-ui,sans-serif;margin:32px;color:#000000}h2{font-size:1.2rem;font-weight:800;margin-bottom:16px}table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;padding:8px 12px;background:#000000;color:#fff;font-weight:600}td{padding:8px 12px;border-bottom:1px solid #e2e8f0}tr:hover td{background:#f8fafc}@media print{button{display:none}}</style></head><body><h2>${shareScope==='single'&&selSchicht?(fmtDe(selSchicht.datum)+(selSchicht.titel?' — '+selSchicht.titel:'')):'Dienstplan'}</h2><table><thead><tr><th>Gruppe</th><th>Dienst</th><th>Person 1</th><th>Person 2</th></tr></thead><tbody>${rows}</tbody></table><br/><button onclick="window.print()" style="padding:10px 24px;background:#000;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700">Drucken / Als PDF speichern</button></body></html>`;
                const w = window.open('','_blank','width=800,height=600');
                if (w) { w.document.write(html); w.document.close(); }
                else {
                  // Popup blocked → use Blob download fallback
                  const blob = new Blob([html], {type:'text/html'});
                  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                  a.download = 'dienstplan.html'; a.click();
                }
              }}
                className="flex flex-col items-center gap-2 py-4 rounded-2xl transition-all border"
                style={{background:'rgba(100,116,139,0.06)',borderColor:'rgba(100,116,139,0.2)',color:'#475569'}}>
                <SI p={IC.printer} size={18} stroke={1.8}/>
                <span className="text-xs font-bold">PDF</span>
              </button>
            </div>
          </div>
        </Modal>
      )}

      {modal==='abfrage_link' && selSchicht && (
        <Modal title="Abfrage-Link" onClose={()=>setModal('detail_view')}>
          <div className="space-y-4">
            <p className="text-slate-500 text-xs">Teile diesen Link mit deinen Team-Mitgliedern. Sie können ohne Login ihre Verfügbarkeit eintragen.</p>
            <div className="bg-black/5 rounded-xl p-3 text-xs font-mono text-slate-700 break-all select-all">
              {window.location.origin + window.location.pathname + '?abfrage=' + (selSchicht.abfrageToken||'…')}
            </div>
            <button onClick={()=>navigator.clipboard?.writeText(window.location.origin+window.location.pathname+'?abfrage='+(selSchicht.abfrageToken||'')).then(()=>toast('Link kopiert 📋'))}
              className="w-full bg-white hover:bg-gray-100 text-black font-bold py-2.5 text-sm transition-all" style={{borderRadius:30}}>
              Link kopieren
            </button>
            {selSchicht.abfrageToken && (
              <button onClick={()=>{updateSchicht(selSchicht.id,{abfrageToken:''});setModal('detail_view');toast('Abfrage deaktiviert');}}
                className="w-full text-red-400 text-xs py-1 hover:text-red-500 transition-all">
                Abfrage deaktivieren
              </button>
            )}
          </div>
        </Modal>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════════════════
// STATISTIK VIEW
// ═══════════════════════════════════════════════════════════════════════════════
const StatistikView = ({ ma, canEdit }) => {
  const [tab,        setTab]        = useState('personen');
  const [filterFrom, setFilterFrom] = useState('');
  const [filterTo,   setFilterTo]   = useState('');
  const [filterGrp,  setFilterGrp]  = useState('all');
  const [sortMode,   setSortMode]   = useState('desc');

  const filtSchichten = useMemo(() => ma.schichten.filter(s =>
    (!filterFrom || s.datum >= filterFrom) && (!filterTo || s.datum <= filterTo)
  ), [ma.schichten, filterFrom, filterTo]);

  const stats = useMemo(() => {
    return ma.personen
      .filter(p => filterGrp==='all' || (p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).includes(filterGrp))
      .map(p => {
        let total = 0, lastDate = '';
        const byDienst = {};
        filtSchichten.forEach(s => s.slots.forEach(sl => {
          if (sl.personId!==p.id) return;
          total++;
          if (!lastDate || s.datum > lastDate) lastDate = s.datum;
          const g = ma.gruppen.find(x=>x.id===sl.gruppeId);
          const d = (g?.dienste||[]).find(x=>x.id===sl.dienstId);
          byDienst[d?.name||'?'] = (byDienst[d?.name||'?']||0)+1;
        }));
        return { p, total, byDienst, lastDate };
      }).sort((a,b) => sortMode==='alpha' ? a.p.name.localeCompare(b.p.name) : sortMode==='asc' ? a.total-b.total : b.total-a.total);
  }, [ma, filtSchichten, filterGrp, sortMode]);

  const teamStats = useMemo(() => {
    return ma.gruppen
      .filter(g => filterGrp==='all' || g.id===filterGrp)
      .map(g => {
      let totalSlots = 0, filledSlots = 0;
      const byDienst = {};
      filtSchichten.forEach(s => s.slots.forEach(sl => {
        if (sl.gruppeId !== g.id) return;
        totalSlots++;
        if (sl.personId) filledSlots++;
        const d = (g.dienste||[]).find(x=>x.id===sl.dienstId);
        const key = d?.name||'?';
        if (!byDienst[key]) byDienst[key] = { total:0, filled:0 };
        byDienst[key].total++;
        if (sl.personId) byDienst[key].filled++;
      }));
      const members = ma.personen.filter(p => (p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).includes(g.id));
      return { g, totalSlots, filledSlots, byDienst, members };
    }).filter(x => x.totalSlots > 0 || x.members.length > 0);
  }, [ma]);

  const maxVal = stats.length ? Math.max(...stats.map(s=>s.total), 1) : 1;
  const avgVal = stats.length ? stats.reduce((s,x)=>s+x.total,0)/stats.length : 0;

  const nowStr = today();
  const weekStart = (() => { const d=new Date(nowStr); d.setDate(d.getDate()-d.getDay()+1); return d.toISOString().slice(0,10); })();
  const weekEnd   = (() => { const d=new Date(nowStr); d.setDate(d.getDate()-d.getDay()+7); return d.toISOString().slice(0,10); })();
  const monthStr  = nowStr.slice(0,7);

  const workloadStats = useMemo(() => {
    return ma.personen.map(p => {
      let week=0, month=0, gesamt=0;
      ma.schichten.forEach(s => s.slots.forEach(sl => {
        if (sl.personId!==p.id && sl.personId2!==p.id) return;
        const hits = (sl.personId===p.id?1:0)+(sl.personId2===p.id?1:0);
        gesamt+=hits;
        if (s.datum>=weekStart&&s.datum<=weekEnd) week+=hits;
        if (s.datum.startsWith(monthStr)) month+=hits;
      }));
      return { p, week, month, gesamt };
    }).sort((a,b)=>b.month-a.month);
  }, [ma, weekStart, weekEnd, monthStr]);

  return (
    <div className="space-y-5 up">
      <div>
        <h1 className="text-xl font-bold grad">Statistik</h1>
        <p className="text-slate-500 text-sm mt-0.5">Einsätze & Team-Auslastung</p>
      </div>

      <div className="glass rounded-2xl p-3 space-y-2">
        <div className="flex gap-2 flex-wrap items-center">
          <div className="flex items-center gap-1.5">
            <span className="text-slate-500 text-xs">Von</span>
            <input type="date" value={filterFrom} onChange={e=>setFilterFrom(e.target.value)} className="bg-black/5 border border-black/10 rounded-lg px-2 py-1 text-xs text-slate-800"/>
          </div>
          <div className="flex items-center gap-1.5">
            <span className="text-slate-500 text-xs">Bis</span>
            <input type="date" value={filterTo} onChange={e=>setFilterTo(e.target.value)} className="bg-black/5 border border-black/10 rounded-lg px-2 py-1 text-xs text-slate-800"/>
          </div>
          <select value={filterGrp} onChange={e=>setFilterGrp(e.target.value)} className="bg-black/5 border border-black/10 rounded-lg px-2 py-1.5 text-xs text-slate-700">
            <option value="all">Alle Teams</option>
            {ma.gruppen.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
          </select>
          <div className="flex gap-1 ml-auto">
            {[['desc','Meiste'],['asc','Wenigste'],['alpha','A–Z']].map(([m,l])=>(
              <button key={m} onClick={()=>setSortMode(m)}
                className={`px-2.5 py-1 rounded-lg text-xs font-semibold transition-all ${sortMode===m?'bg-slate-900 text-white':'bg-black/5 text-slate-500 hover:bg-black/8'}`}>{l}</button>
            ))}
          </div>
          {(filterFrom||filterTo||filterGrp!=='all') && (
            <button onClick={()=>{setFilterFrom('');setFilterTo('');setFilterGrp('all');}} className="text-slate-400 text-xs hover:text-slate-600 transition-all">✕ Zurücksetzen</button>
          )}
        </div>
      </div>

      <div className="flex gap-2">
        {[['personen','Mitarbeiter'],['teams','Teams']].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)}
            className={`px-4 py-1.5 rounded-full text-sm font-semibold transition-all ${tab===id?'bg-slate-900 text-white':'bg-black/5 text-slate-600 hover:bg-black/8'}`}>
            {label}
          </button>
        ))}
      </div>

      {tab==='personen' && (
        stats.length===0 ? (
          <div className="glass rounded-2xl py-16 text-center text-slate-600">Noch keine Daten</div>
        ) : (
          <div className="space-y-3">
            {stats.map(({ p, total, byDienst, lastDate }) => {
              const gruppen2 = (p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).map(gid=>ma.gruppen.find(g=>g.id===gid)).filter(Boolean);
              const pct = Math.round((total/maxVal)*100);
              return (
                <div key={p.id} className="glass rounded-2xl p-4 glow">
                  <div className="flex items-center gap-3 mb-2">
                    <Avatar name={p.name} farbe={p.farbe} size={36}/>
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-slate-800 text-sm">{p.name}</div>
                      {gruppen2.length>0&&<div className="flex gap-1.5 flex-wrap">{gruppen2.map(g=><span key={g.id} className="text-xs" style={{color:g.farbe}}>{g.name}</span>)}</div>}
                      {lastDate&&<div className="text-slate-400 text-xs mt-0.5">Letzter Einsatz: {fmtDe(lastDate)}</div>}
                    </div>
                    <div className="flex flex-col items-end gap-1">
                      <div className="text-2xl font-black" style={{color:p.farbe}}>{total}</div>
                      {avgVal>0 && total>avgVal*1.5 && <span className="pill text-xs" style={{background:'rgba(249,115,22,0.12)',color:'#f97316'}}>Viel</span>}
                      {avgVal>0 && total<avgVal*0.5 && <span className="pill text-xs" style={{background:'rgba(245,158,11,0.12)',color:'#f59e0b'}}>Wenig</span>}
                    </div>
                  </div>
                  <div className="h-1.5 rounded-full bg-black/5 overflow-hidden mb-2">
                    <div className="h-full rounded-full transition-all" style={{width:`${pct}%`,background:p.farbe}}/>
                  </div>
                  {Object.keys(byDienst).length>0 && (
                    <div className="flex flex-wrap gap-1">
                      {Object.entries(byDienst).map(([k,v])=>(
                        <span key={k} className="pill" style={{background:'rgba(0,0,0,0.06)',color:'#94a3b8'}}>{k}: {v}</span>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )
      )}

      {tab==='teams' && (
        teamStats.length===0 ? (
          <div className="glass rounded-2xl py-16 text-center text-slate-600">Noch keine Daten</div>
        ) : (
          <div className="space-y-3">
            {teamStats.map(({ g, totalSlots, filledSlots, byDienst, members }) => {
              const pct = totalSlots > 0 ? Math.round((filledSlots/totalSlots)*100) : 0;
              const fillColor = pct>=80 ? '#10b981' : pct>=50 ? '#f59e0b' : '#ef4444';
              return (
                <div key={g.id} className="glass rounded-2xl p-4 glow">
                  <div className="flex items-center gap-3 mb-3">
                    <div className="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style={{background:g.farbe+'22'}}>
                      <span className="font-black text-sm" style={{color:g.farbe}}>{g.name.slice(0,2)}</span>
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-slate-800 text-sm">{g.name}</div>
                      <div className="text-slate-500 text-xs">{members.length} Mitglieder</div>
                    </div>
                    <div className="text-right">
                      <div className="text-lg font-black" style={{color:fillColor}}>{pct}%</div>
                      <div className="text-slate-400 text-xs">{filledSlots}/{totalSlots} Slots</div>
                    </div>
                  </div>
                  {totalSlots > 0 && (
                    <div className="h-1.5 rounded-full bg-black/5 overflow-hidden mb-2">
                      <div className="h-full rounded-full transition-all" style={{width:`${pct}%`,background:fillColor}}/>
                    </div>
                  )}
                  {members.length>0 && (
                    <div className="flex flex-wrap gap-1 mb-2">
                      {members.map(p=>(
                        <div key={p.id} className="flex items-center gap-1 px-2 py-0.5 rounded-full text-xs" style={{background:p.farbe+'18',color:p.farbe}}>
                          <Avatar name={p.name} farbe={p.farbe} size={14}/>
                          {p.name.split(' ')[0]}
                        </div>
                      ))}
                    </div>
                  )}
                  {Object.keys(byDienst).length>0 && (
                    <div className="flex flex-wrap gap-1">
                      {Object.entries(byDienst).map(([k,v])=>(
                        <span key={k} className="pill" style={{background:'rgba(0,0,0,0.06)',color:'#94a3b8'}}>{k}: {v.filled}/{v.total}</span>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )
      )}

      {/* Workload overview — nur für Admins/Editoren */}
      {canEdit && workloadStats.some(w=>w.gesamt>0) && (
        <div className="glass rounded-2xl glow overflow-x-auto">
          <div className="px-5 py-3" style={{borderBottom:'1px solid rgba(0,0,0,0.06)'}}>
            <h3 className="font-semibold text-slate-800 text-sm">Auslastungs-Übersicht (aktuell)</h3>
          </div>
          <table className="w-full text-sm">
            <thead>
              <tr style={{borderBottom:'1px solid rgba(0,0,0,0.06)'}}>
                <th className="text-left px-5 py-2.5 text-slate-500 text-xs font-medium">Person</th>
                <th className="text-right px-3 py-2.5 text-slate-500 text-xs font-medium">Diese Woche</th>
                <th className="text-right px-3 py-2.5 text-slate-500 text-xs font-medium">Diesen Monat</th>
                <th className="text-right px-5 py-2.5 text-slate-500 text-xs font-medium">Gesamt</th>
              </tr>
            </thead>
            <tbody>
              {workloadStats.filter(w=>w.gesamt>0).map((w,i)=>{
                const monthWl = w.month>=5?'#ef4444':w.month>=3?'#f97316':undefined;
                return (
                  <tr key={w.p.id} style={{borderTop:'1px solid rgba(0,0,0,0.05)',background:i%2===0?'transparent':'rgba(0,0,0,0.015)'}}>
                    <td className="px-5 py-2.5">
                      <div className="flex items-center gap-2">
                        <Avatar name={w.p.name} farbe={w.p.farbe} size={22}/>
                        <span className="font-semibold text-slate-800 text-sm">{w.p.name}</span>
                      </div>
                    </td>
                    <td className="px-3 py-2.5 text-right font-semibold text-sm text-slate-700">{w.week}</td>
                    <td className="px-3 py-2.5 text-right font-bold text-sm" style={{color:monthWl||'#64748b'}}>
                      {w.month}
                      {monthWl && <span className="dot ml-1.5 inline-block" style={{background:monthWl,width:7,height:7,verticalAlign:'middle'}}/>}
                    </td>
                    <td className="px-5 py-2.5 text-right text-slate-600 text-sm">{w.gesamt}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
};

// GESAMT VIEW — combined read-only overview of all profiles' Dienstplan
// ═══════════════════════════════════════════════════════════════════════════════
const GesamtDienstplanView = ({ profiles }) => {
  const [allSchichten, setAllSchichten] = useState([]);
  const [loading, setLoading] = useState(true);
  const [gFrom, setGFrom] = useState(() => new Date().toISOString().slice(0,10));
  const [gTo,   setGTo]   = useState(() => { const d=new Date(); d.setDate(d.getDate()+28); return d.toISOString().slice(0,10); });
  const [gProfs, setGProfs] = useState([]);

  const toggleGProf = id => setGProfs(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  useEffect(() => {
    setLoading(true);
    const merged = [];
    let done = 0;
    profiles.forEach(p => {
      db.collection(p.id).doc('ma').get()
        .then(snap => {
          const data = snap.data()?.data;
          const schichten = data?.schichten || [];
          schichten.forEach(s => merged.push({ ...s, profileId: p.id, profileLabel: p.label, profileColor: p.color }));
          setAllSchichten([...merged]);
          done++;
          if (done === profiles.length) setLoading(false);
        })
        .catch(() => { done++; if (done === profiles.length) setLoading(false); });
    });
  }, [profiles.map(p=>p.id).join(',')]);

  const upcoming = useMemo(() => {
    let list = allSchichten.filter(s=>s.datum>=gFrom&&s.datum<=gTo);
    if(gProfs.length>0) list=list.filter(s=>gProfs.includes(s.profileId));
    return list.sort((a,b)=>a.datum.localeCompare(b.datum));
  }, [allSchichten,gFrom,gTo,gProfs]);

  if (loading) return (
    <div className="up space-y-5">
      <div><h1 className="text-xl font-bold" style={{color:'#000000'}}>Gesamt</h1><p className="text-slate-500 text-sm mt-0.5">Lade Dienstpläne aus allen Bereichen…</p></div>
      <div className="glass rounded-2xl py-16 text-center"><p className="text-slate-400">Verbinde…</p></div>
    </div>
  );

  // Group upcoming by date
  const byDate = {};
  upcoming.forEach(s => {
    if (!byDate[s.datum]) byDate[s.datum] = [];
    byDate[s.datum].push(s);
  });

  return (
    <div className="space-y-5 up">
      <div>
        <h1 className="text-xl font-bold" style={{color:'#000000'}}>Gesamt</h1>
        <p className="text-slate-500 text-sm mt-0.5">{upcoming.length} Schichten · alle Bereiche</p>
      </div>

      {/* Legend */}
      <div className="flex gap-2 flex-wrap">
        {profiles.map(pp => (
          <span key={pp.id} className="pill" style={{background:pp.color+'22',color:pp.color,border:`1px solid ${pp.color}44`}}>
            <span className="dot mr-1" style={{background:pp.color,display:'inline-block',width:7,height:7,borderRadius:'50%'}}/>
            {pp.label}
          </span>
        ))}
      </div>

      {/* Filter row */}
      <div className="flex flex-wrap gap-2 items-center">
        <input type="date" value={gFrom} onChange={e=>setGFrom(e.target.value)} className="bg-black/5 border border-black/10 rounded-lg px-2.5 py-1.5 text-xs text-slate-700 outline-none"/>
        <span className="text-slate-400 text-xs">–</span>
        <input type="date" value={gTo} onChange={e=>setGTo(e.target.value)} className="bg-black/5 border border-black/10 rounded-lg px-2.5 py-1.5 text-xs text-slate-700 outline-none"/>
        <div className="flex gap-1.5 flex-wrap">
          {profiles.map(pp=>(
            <button key={pp.id} onClick={()=>toggleGProf(pp.id)}
              className="px-2.5 py-1 rounded-full text-xs font-semibold transition-all"
              style={{background:gProfs.includes(pp.id)?pp.color+'25':'rgba(0,0,0,0.05)',border:`1px solid ${gProfs.includes(pp.id)?pp.color+'60':'rgba(0,0,0,0.08)'}`,color:gProfs.includes(pp.id)?pp.color:'#64748b'}}>
              {pp.label}
            </button>
          ))}
        </div>
      </div>

      {Object.keys(byDate).length === 0 ? (
        <div className="glass rounded-2xl py-16 text-center">
          <div className="text-slate-400 font-medium">Keine Schichten in den nächsten 4 Wochen</div>
        </div>
      ) : (
        <div className="space-y-3">
          {Object.entries(byDate).map(([datum, schichten]) => (
            <div key={datum} className="glass rounded-2xl overflow-hidden glow">
              <div className="px-4 py-2.5 flex items-center gap-2" style={{borderBottom:'1px solid rgba(0,0,0,0.06)',background:'rgba(0,0,0,0.02)'}}>
                <span className="font-semibold text-slate-800 text-sm">{fmtDe(datum)}</span>
                <span className="text-slate-500 text-xs">{new Date(datum+'T00:00:00').toLocaleDateString('de-DE',{weekday:'long'})}</span>
              </div>
              <div className="divide-y divide-black/5">
                {schichten.map(s => (
                  <div key={s.id||s.datum+s.titel} className="px-4 py-2.5 flex items-center gap-3">
                    <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:s.profileColor}}/>
                    <span className="text-xs font-semibold" style={{color:s.profileColor,minWidth:72}}>{s.profileLabel}</span>
                    <span className="text-slate-800 text-sm font-medium flex-1">{s.titel || '—'}</span>
                    <span className="text-slate-500 text-xs">{(s.slots||[]).length} Slots</span>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="glass rounded-2xl px-4 py-3 flex items-center gap-2">
        <span className="text-slate-400 text-xs">Dies ist eine schreibgeschützte Gesamtansicht. Zum Bearbeiten bitte einen Bereich oben auswählen.</span>
      </div>
    </div>
  );
};
