const DienstplanView = ({ ma, onChange, onTausch, toast, allowedGroups, currentUser }) => {
  const [view,         setView]        = useState('list');   // 'list' | 'detail'
  const [modal,        setModal]       = useState(null);     // 'create'|'assign'|'wish'|'share'|'addslot'|'tausch'
  const [selSchichtId, setSelSchichtId]= useState(null);
  const [selSlot,      setSelSlot]     = useState(null);     // slot obj + isSecond
  const [wishPid,      setWishPid]     = useState('');
  const [wishForm,     setWishForm]    = useState({});
  const [shareText,    setShareText]   = useState('');
  const [shareScope,   setShareScope]  = useState('single'); // 'single'|'all'
  const [createForm,   setCreateForm]  = useState({ datum:today(), titel:'', vorlageId:'' });
  const [tauschSlot,   setTauschSlot]  = useState(null);
  const [tauschNote,   setTauschNote]  = useState('');
  const [selPlanId,    setSelPlanId]   = useState('all');
  const [planModal,    setPlanModal]   = useState(null);
  const [planForm,     setPlanForm]    = useState({ name:'' });
  const [filterPerson, setFilterPerson]= useState('');
  const [listView,     setListView]    = useState('list'); // 'list'|'calendar'
  const [calYM,        setCalYM]       = useState(() => { const n=new Date(); return {y:n.getFullYear(),m:n.getMonth()}; });
  const [dupModal,     setDupModal]    = useState(null); // schicht to duplicate
  const [dupDate,      setDupDate]     = useState('');

  const selSchicht = useMemo(() => ma.schichten.find(s=>s.id===selSchichtId)||null, [ma.schichten, selSchichtId]);
  const sorted     = useMemo(() => {
    let list = selPlanId==='all' ? ma.schichten : ma.schichten.filter(s=>s.planId===selPlanId);
    if (filterPerson) list = list.filter(s=>s.slots.some(sl=>sl.personId===filterPerson||sl.personId2===filterPerson));
    return [...list].sort((a,b)=>b.datum.localeCompare(a.datum));
  }, [ma.schichten, selPlanId, filterPerson]);
  const myPerson   = useMemo(() => currentUser ? ma.personen.find(p=>p.name===currentUser.name)||null : null, [ma.personen, currentUser]);
  const myGroupIds = useMemo(() => myPerson ? (myPerson.gruppenIds||(myPerson.gruppeId?[myPerson.gruppeId]:[])) : [], [myPerson]);

  const createPlan = () => {
    if (!planForm.name.trim()) return;
    const neu = {id:genId(), name:planForm.name.trim(), erstelltAm:today()};
    onChange(m=>({...m, plaene:[...(m.plaene||[]),neu]}));
    setSelPlanId(neu.id); setPlanModal(null); toast('Plan erstellt');
  };
  const deletePlan = id => {
    if (!confirm('Plan löschen? Die Schichten bleiben erhalten (werden zu "Alle" verschoben).')) return;
    onChange(m=>({...m, plaene:(m.plaene||[]).filter(p=>p.id!==id), schichten:m.schichten.map(s=>s.planId===id?{...s,planId:''}:s)}));
    if (selPlanId===id) setSelPlanId('all');
  };

  // ── Tausch helpers ──
  const submitTausch = () => {
    if (!myPerson||!tauschSlot||!selSchicht) return;
    const req = { id:genId(), schichtId:selSchicht.id, slotId:tauschSlot.slotId, isSecond:tauschSlot.isSecond, personId:myPerson.id, note:tauschNote.trim(), createdAt:new Date().toISOString() };
    onTausch(m=>({ ...m, tauschAnfragen:[...(m.tauschAnfragen||[]),req] }));
    setTauschSlot(null); setTauschNote(''); setModal('detail_view');
    toast('Tausch-Anfrage gestellt 🔄');
  };
  const acceptTausch = req => {
    if (!myPerson||req.personId===myPerson.id) return;
    onTausch(m=>({
      ...m,
      schichten:m.schichten.map(s=>s.id===req.schichtId?{...s,slots:s.slots.map(sl=>sl.id===req.slotId?{...sl,[req.isSecond?'personId2':'personId']:myPerson.id}:sl)}:s),
      tauschAnfragen:(m.tauschAnfragen||[]).filter(r=>r.id!==req.id)
    }));
    toast('Tausch angenommen ✓');
  };
  const cancelTausch = req => {
    if (!myPerson||req.personId!==myPerson.id) return;
    onTausch(m=>({ ...m, tauschAnfragen:(m.tauschAnfragen||[]).filter(r=>r.id!==req.id) }));
    toast('Tausch-Anfrage zurückgezogen');
  };

  // ── helpers ──
  const updateSchicht = (id, updater) => {
    onChange(m => ({ ...m, schichten: m.schichten.map(s => s.id===id ? (typeof updater==='function'?updater(s):{...s,...updater}) : s) }));
  };

  const createSchicht = () => {
    if (!createForm.datum) return;
    const vorlage = ma.vorlagen.find(v=>v.id===createForm.vorlageId);
    if (vorlage?.art==='zeitraum' && (vorlage.tage||[]).length>0) {
      const newSchichten = vorlage.tage.map((tag,i)=>{
        const d = new Date(createForm.datum+'T00:00:00'); d.setDate(d.getDate()+i);
        const datum = d.toISOString().slice(0,10);
        const titel = [createForm.titel.trim(), tag.label].filter(Boolean).join(' – ');
        const slots = (tag.slots||[]).map(s=>({id:genId(),gruppeId:s.gruppeId,dienstId:s.dienstId,doppelt:s.doppelt||false,personId:'',personId2:''}));
        return {id:genId(),datum,titel,slots,wuensche:[],veroeffentlicht:false,planId:selPlanId==='all'?'':selPlanId};
      });
      onChange(m=>({...m,schichten:[...m.schichten,...newSchichten]}));
      if(newSchichten[0]){setSelSchichtId(newSchichten[0].id);setView('detail');}
      setModal(null); toast(`${newSchichten.length} Schichten erstellt ✓`);
      return;
    }
    const slots = vorlage ? (vorlage.slots||[]).map(s=>({ id:genId(), gruppeId:s.gruppeId, dienstId:s.dienstId, doppelt:s.doppelt||false, personId:'', personId2:'' })) : [];
    const neu = { id:genId(), datum:createForm.datum, titel:createForm.titel.trim(), slots, wuensche:[], veroeffentlicht:false, planId:selPlanId==='all'?'':selPlanId };
    onChange(m => ({ ...m, schichten:[...m.schichten, neu] }));
    setSelSchichtId(neu.id); setView('detail'); setModal(null);
    toast('Schicht erstellt');
  };

  const dupSchicht = () => {
    if (!dupModal||!dupDate) return;
    const s = dupModal;
    const copy = { ...s, id:genId(), datum:dupDate, wuensche:[], abfrageToken:'', veroeffentlicht:false,
      slots:s.slots.map(sl=>({...sl,id:genId(),personId:'',personId2:''})) };
    onChange(m=>({...m,schichten:[...m.schichten,copy]}));
    setDupModal(null); setDupDate(''); toast('Schicht dupliziert ✓');
  };

  const saveAsVorlage = () => {
    if (!selSchicht||!onChange) return;
    const name = selSchicht.titel || fmtDe(selSchicht.datum);
    const v = { id:genId(), name, art:'einzel',
      slots:selSchicht.slots.map(sl=>({id:genId(),gruppeId:sl.gruppeId,dienstId:sl.dienstId,doppelt:sl.doppelt||false})) };
    onChange(m=>({...m,vorlagen:[...m.vorlagen,v]}));
    toast('Vorlage "'+name+'" erstellt ✓');
  };

  const deleteSchicht = id => {
    onChange(m => ({ ...m, schichten:m.schichten.filter(s=>s.id!==id) }));
    setView('list'); setSelSchichtId(null);
    toast('Schicht gelöscht','warn');
  };

  const togglePublish = () => {
    if (!selSchicht) return;
    updateSchicht(selSchicht.id, s=>({ ...s, veroeffentlicht:!s.veroeffentlicht }));
    toast(selSchicht.veroeffentlicht?'Unveröffentlicht':'Veröffentlicht ✓');
  };

  const assignPerson = (slotId, personId, isSecond) => {
    if (!selSchicht) return;
    const field = isSecond ? 'personId2' : 'personId';
    updateSchicht(selSchicht.id, s => ({
      ...s, slots: s.slots.map(sl => sl.id===slotId ? { ...sl, [field]: sl[field]===personId?'':personId } : sl)
    }));
    setModal('detail_view');
  };

  const addSchSlot = () => {
    if (!selSchicht) return;
    const g = ma.gruppen[0]; if (!g) return;
    const d = (g.dienste||[])[0];
    updateSchicht(selSchicht.id, s => ({ ...s, slots:[...s.slots, { id:genId(), gruppeId:g.id, dienstId:d?.id||'', doppelt:false, personId:'', personId2:'' }] }));
    toast('Slot hinzugefügt');
  };

  const remSchSlot = slotId => {
    if (!selSchicht) return;
    updateSchicht(selSchicht.id, s=>({ ...s, slots:s.slots.filter(sl=>sl.id!==slotId) }));
  };

  const saveWishes = () => {
    if (!selSchicht) return;
    const other = (selSchicht.wuensche||[]).filter(w=>w.personId!==wishPid);
    const mine  = Object.entries(wishForm).filter(([,v])=>v).map(([slotId,art])=>({ personId:wishPid, slotId, art }));
    updateSchicht(selSchicht.id, s=>({ ...s, wuensche:[...other,...mine] }));
    toast('Wünsche gespeichert'); setModal('detail_view');
  };

  const runAuto = () => {
    if (!selSchicht) return;
    const counts = {};
    ma.personen.forEach(p=>{ counts[p.id]=0; });
    ma.schichten.forEach(s => s.slots.forEach(sl => {
      if(sl.personId)  counts[sl.personId]  = (counts[sl.personId]||0)+1;
      if(sl.personId2) counts[sl.personId2] = (counts[sl.personId2]||0)+1;
    }));

    const konflikte = ma.konflikte || [];
    // Returns true if pid conflicts with anyone already in the shift
    const conflictsWith = (pid, alreadyInShift) =>
      konflikte.some(k =>
        (k.p1===pid && alreadyInShift.has(k.p2)) ||
        (k.p2===pid && alreadyInShift.has(k.p1))
      );

    const usedNow = new Set();
    const newSlots = selSchicht.slots.map(sl => {
      // Skip slots whose group the user has no access to
      if (allowedGroups && !allowedGroups.includes(sl.gruppeId)) return {...sl};
      const eligible = ma.personen.filter(p => {
        if (!(p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).includes(sl.gruppeId)) return false;
        if ((p.dienste||[]).length>0 && !(p.dienste||[]).includes(sl.dienstId)) return false;
        const w = (selSchicht.wuensche||[]).find(x=>x.personId===p.id&&x.slotId===sl.id);
        return w?.art !== 'wunschfrei';
      });
      const pick = (excl) => {
        const ok = p => !excl.has(p.id) && !conflictsWith(p.id, usedNow);
        const praefs = ma.praeferenzen||[];
        const wunsch    = eligible.filter(p=>{ const w=(selSchicht.wuensche||[]).find(x=>x.personId===p.id&&x.slotId===sl.id); return w?.art==='wunschdienst'&&ok(p); });
        const bevorzugt = eligible.filter(p=>ok(p)&&!wunsch.find(x=>x.id===p.id)&&praefs.some(pf=>pf.personId===p.id&&pf.dienstId===sl.dienstId&&pf.prio==='bevorzugt'));
        const neutral   = eligible.filter(p=>ok(p)&&!wunsch.find(x=>x.id===p.id)&&!bevorzugt.find(x=>x.id===p.id)&&!praefs.some(pf=>pf.personId===p.id&&pf.dienstId===sl.dienstId&&pf.prio==='vermeidet'));
        const vermeidet = eligible.filter(p=>ok(p)&&!wunsch.find(x=>x.id===p.id)&&!bevorzugt.find(x=>x.id===p.id)&&!neutral.find(x=>x.id===p.id));
        const byCount = (a,b)=>(counts[a.id]||0)-(counts[b.id]||0);
        const pool = [...wunsch,...bevorzugt.sort(byCount),...neutral.sort(byCount),...vermeidet.sort(byCount)];
        if (!pool.length) return '';
        const p = pool[0]; counts[p.id]=(counts[p.id]||0)+1; excl.add(p.id); return p.id;
      };
      const p1 = pick(new Set(usedNow)); if(p1&&!sl.doppelt) usedNow.add(p1);
      return { ...sl, personId:p1, personId2:'' };
    });
    updateSchicht(selSchicht.id, s=>({ ...s, slots:newSlots }));
    toast('Auto-Einteilung abgeschlossen ⚡');
  };

  const runAutoAll = () => {
    if (!onChange) return;
    if (!confirm('Alle Schichten automatisch einteilen?\nBestehende Einteilungen werden überschrieben.')) return;
    const counts = {};
    ma.personen.forEach(p=>{ counts[p.id]=0; });
    const konflikte = ma.konflikte||[];
    const conflictsWith = (pid, set) => konflikte.some(k=>(k.p1===pid&&set.has(k.p2))||(k.p2===pid&&set.has(k.p1)));
    const newSchichten = [...ma.schichten].sort((a,b)=>a.datum.localeCompare(b.datum)).map(s=>{
      const usedNow = new Set();
      const newSlots = s.slots.map(sl=>{
        if(allowedGroups&&!allowedGroups.includes(sl.gruppeId)) return {...sl};
        const eligible = ma.personen.filter(p=>{
          if(!(p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).includes(sl.gruppeId)) return false;
          if((p.dienste||[]).length>0&&!(p.dienste||[]).includes(sl.dienstId)) return false;
          const w=(s.wuensche||[]).find(x=>x.personId===p.id&&x.slotId===sl.id);
          return w?.art!=='wunschfrei';
        });
        const pick = excl=>{
          const ok=p=>!excl.has(p.id)&&!conflictsWith(p.id,usedNow);
          const praefs=ma.praeferenzen||[];
          const wunsch=eligible.filter(p=>{const w=(s.wuensche||[]).find(x=>x.personId===p.id&&x.slotId===sl.id);return w?.art==='wunschdienst'&&ok(p);});
          const bevorzugt=eligible.filter(p=>ok(p)&&!wunsch.find(x=>x.id===p.id)&&praefs.some(pf=>pf.personId===p.id&&pf.dienstId===sl.dienstId&&pf.prio==='bevorzugt'));
          const neutral=eligible.filter(p=>ok(p)&&!wunsch.find(x=>x.id===p.id)&&!bevorzugt.find(x=>x.id===p.id)&&!praefs.some(pf=>pf.personId===p.id&&pf.dienstId===sl.dienstId&&pf.prio==='vermeidet'));
          const vermeidet=eligible.filter(p=>ok(p)&&!wunsch.find(x=>x.id===p.id)&&!bevorzugt.find(x=>x.id===p.id)&&!neutral.find(x=>x.id===p.id));
          const byCount=(a,b)=>(counts[a.id]||0)-(counts[b.id]||0);
          const pool=[...wunsch,...bevorzugt.sort(byCount),...neutral.sort(byCount),...vermeidet.sort(byCount)];
          if(!pool.length) return '';
          const p=pool[0]; counts[p.id]=(counts[p.id]||0)+1; excl.add(p.id); return p.id;
        };
        const p1=pick(new Set(usedNow)); if(p1&&!sl.doppelt) usedNow.add(p1);
        return {...sl,personId:p1,personId2:''};
      });
      return {...s,slots:newSlots};
    });
    onChange(m=>({...m,schichten:newSchichten}));
    toast(`${ma.schichten.length} Schichten auto-eingeteilt ⚡`);
  };

  const buildShareText = s => {
    const lines = [`📅 *${s.titel||fmtDe(s.datum)}* — ${fmtDe(s.datum)}\n`];
    s.slots.forEach(sl => {
      const g  = ma.gruppen.find(x=>x.id===sl.gruppeId);
      const d  = (g?.dienste||[]).find(x=>x.id===sl.dienstId);
      const p1 = ma.personen.find(x=>x.id===sl.personId);
      const names = p1?.name || '—';
      lines.push(`• ${d?.name||'?'}: ${names}${sl.doppelt?' (Doppeldienst)':''}`);
    });
    return lines.join('\n');
  };

  // ── Calendar View ──
  if (view==='list' && listView==='calendar') {
    const DAYS = ['Mo','Di','Mi','Do','Fr','Sa','So'];
    const firstDay = new Date(calYM.y, calYM.m, 1);
    const lastDay  = new Date(calYM.y, calYM.m+1, 0);
    const startDow = (firstDay.getDay()+6)%7; // 0=Mon
    const cells = [];
    for (let i=0;i<startDow;i++) cells.push(null);
    for (let d=1;d<=lastDay.getDate();d++) cells.push(d);
    while (cells.length%7!==0) cells.push(null);
    const pad = n => String(n).padStart(2,'0');
    const monthNames=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
    return (
      <div className="space-y-4 up">
        <div className="flex items-center justify-between">
          <div>
            <h1 className="text-xl font-bold grad">Dienstplan</h1>
            <p className="text-slate-500 text-sm mt-0.5">{monthNames[calYM.m]} {calYM.y}</p>
          </div>
          <div className="flex gap-2 items-center">
            <button onClick={()=>setListView('list')} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold bg-black/5 text-slate-600 hover:bg-black/10 transition-all">Liste</button>
            <button onClick={()=>setCalYM(p=>{const d=new Date(p.y,p.m-1,1);return{y:d.getFullYear(),m:d.getMonth()};})} className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 text-slate-500 hover:bg-black/10 transition-all"><SI p={IC.chevLeft} size={13}/></button>
            <button onClick={()=>setCalYM(p=>{const d=new Date(p.y,p.m+1,1);return{y:d.getFullYear(),m:d.getMonth()};})} className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 text-slate-500 hover:bg-black/10 transition-all"><SI p={IC.chevronRight} size={13}/></button>
          </div>
        </div>
        <div className="glass rounded-2xl overflow-hidden">
          <div className="grid grid-cols-7" style={{borderBottom:'1px solid rgba(0,0,0,0.08)'}}>
            {DAYS.map(d=><div key={d} className="py-2 text-center text-xs font-semibold text-slate-400">{d}</div>)}
          </div>
          <div className="grid grid-cols-7">
            {cells.map((day,i)=>{
              if (!day) return <div key={i} className="min-h-[56px] p-1" style={{borderRight:'1px solid rgba(0,0,0,0.05)',borderBottom:'1px solid rgba(0,0,0,0.05)'}}/>;
              const dateStr = `${calYM.y}-${pad(calYM.m+1)}-${pad(day)}`;
              const daySchichten = sorted.filter(s=>s.datum===dateStr);
              const isToday = dateStr===today();
              return (
                <div key={i} className="min-h-[56px] p-1 space-y-0.5" style={{borderRight:'1px solid rgba(0,0,0,0.05)',borderBottom:'1px solid rgba(0,0,0,0.05)'}}>
                  <div className={`text-xs font-semibold mb-1 w-5 h-5 flex items-center justify-center rounded-full ${isToday?'bg-slate-900 text-white':'text-slate-500'}`}>{day}</div>
                  {daySchichten.map(s=>{
                    const filled=s.slots.filter(sl=>sl.personId).length;
                    const full=filled===s.slots.length&&s.slots.length>0;
                    return (
                      <div key={s.id} onClick={()=>{setSelSchichtId(s.id);setView('detail');}} className="cursor-pointer rounded px-1 py-0.5 text-xs truncate font-medium transition-all hover:opacity-80"
                        style={{background:full?'rgba(16,185,129,0.15)':'rgba(99,102,241,0.12)',color:full?'#10b981':'#818cf8'}}>
                        {s.titel||'Schicht'} {filled}/{s.slots.length}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ── List View ──
  if (view==='list') return (
    <div className="space-y-5 up">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-xl font-bold grad">Dienstplan</h1>
          <p className="text-slate-500 text-sm mt-0.5">{ma.schichten.length} Schichten</p>
        </div>
        <div className="flex gap-2">
          {onChange && !allowedGroups && <button onClick={runAutoAll} disabled={ma.schichten.length===0}
            className="flex items-center gap-1.5 bg-white hover:bg-gray-100 disabled:opacity-40 text-black text-xs font-bold px-3.5 py-2 transition-all rounded-full">
            <SI p={IC.zap} size={13}/> Auto-Plan
          </button>}
          <button onClick={()=>setListView('calendar')} className="flex items-center gap-1.5 bg-white hover:bg-gray-100 text-black text-xs font-bold px-3.5 py-2 transition-all rounded-full">
            📅 Kalender
          </button>
          {ma.schichten.length>0 && <button onClick={()=>{ setShareScope('all'); setShareText(buildPlanText(ma)); setModal('share'); }}
            className="flex items-center gap-1.5 bg-white hover:bg-gray-100 text-black text-xs font-bold px-3.5 py-2 transition-all rounded-full">
            <SI p={IC.send} size={13}/> Teilen
          </button>}
          {onChange && !allowedGroups && <button onClick={() => { setCreateForm({ datum:today(), titel:'', vorlageId:ma.vorlagen[0]?.id||'' }); setModal('create'); }}
            className="flex items-center gap-1.5 bg-white hover:bg-gray-100 text-black text-xs font-bold px-3.5 py-2 transition-all rounded-full">
            <SI p={IC.plus} size={13}/> Schicht
          </button>}
        </div>
      </div>

      {/* Person-Filter */}
      {ma.personen.length>0 && (
        <select value={filterPerson} onChange={e=>setFilterPerson(e.target.value)}
          className={"w-full "+INP}>
          <option value="">Alle Personen</option>
          {ma.personen.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      )}

      {/* Globale Tausch-Anfragen */}
      {onChange && (ma.tauschAnfragen||[]).length>0 && (
        <div className="glass rounded-2xl p-4 space-y-2.5 border-t-2 border-orange-400/60">
          <div className="text-xs font-semibold uppercase tracking-wider" style={{color:'#f97316'}}>🔄 {(ma.tauschAnfragen||[]).length} offene Tausch-Anfrage{(ma.tauschAnfragen||[]).length!==1?'n':''}</div>
          {(ma.tauschAnfragen||[]).slice(0,4).map(r=>{
            const person=ma.personen.find(p=>p.id===r.personId);
            const schicht=ma.schichten.find(s=>s.id===r.schichtId);
            const slot=schicht?.slots.find(sl=>sl.id===r.slotId);
            const g=ma.gruppen.find(x=>x.id===slot?.gruppeId);
            const d=(g?.dienste||[]).find(x=>x.id===slot?.dienstId);
            return (
              <div key={r.id} onClick={()=>{setSelSchichtId(r.schichtId);setView('detail');}}
                className="flex items-center gap-2 cursor-pointer hover:opacity-80 transition-all">
                <Avatar name={person?.name||'?'} farbe={person?.farbe||'#f97316'} size={24}/>
                <div className="flex-1 min-w-0 text-xs">
                  <span className="font-semibold text-slate-700">{person?.name||'?'}</span>
                  <span className="text-slate-500"> · {d?.name||'?'} · {schicht?fmtDe(schicht.datum):''}</span>
                </div>
                <SI p={IC.chevronRight} size={12} className="text-slate-400 flex-shrink-0"/>
              </div>
            );
          })}
        </div>
      )}

      {/* Plan switcher */}
      {(onChange || (ma.plaene||[]).length>0) && (
        <div className="flex gap-1.5 flex-wrap items-center">
          <button onClick={()=>setSelPlanId('all')} style={{background:selPlanId==='all'?'#0f172a':'rgba(0,0,0,0.05)',color:selPlanId==='all'?'#ffffff':'#64748b'}}
            className="px-3 py-1.5 rounded-full text-xs font-semibold transition-all">Alle</button>
          {(ma.plaene||[]).map(p=>(
            <div key={p.id} className="flex items-center gap-0.5">
              <button onClick={()=>setSelPlanId(p.id)} style={{background:selPlanId===p.id?'#0f172a':'rgba(0,0,0,0.05)',color:selPlanId===p.id?'#ffffff':'#64748b'}}
                className="px-3 py-1.5 rounded-full text-xs font-semibold transition-all">{p.name}</button>
              {onChange && !allowedGroups && selPlanId===p.id && (
                <button onClick={()=>deletePlan(p.id)} className="w-5 h-5 flex items-center justify-center text-slate-400 hover:text-red-400 transition-all"><SI p={IC.x} size={10}/></button>
              )}
            </div>
          ))}
          {onChange && !allowedGroups && (
            <button onClick={()=>{setPlanForm({name:''});setPlanModal('create');}}
              className="flex items-center gap-1 px-2.5 py-1.5 rounded-full text-xs font-semibold text-slate-500 hover:text-slate-800 transition-all"
              style={{background:'rgba(0,0,0,0.04)',border:'1px dashed rgba(0,0,0,0.15)'}}>
              <SI p={IC.plus} size={10}/> Plan
            </button>
          )}
        </div>
      )}

      {sorted.length===0 ? (
        <div className="glass rounded-2xl py-16 text-center">
          <div className="text-slate-400 font-medium mb-1">Noch keine Schichten</div>
          {onChange && <button onClick={() => { setCreateForm({ datum:today(), titel:'', vorlageId:'' }); setModal('create'); }}
            className="mt-2 text-slate-700 hover:text-slate-900 text-sm">Erste Schicht erstellen</button>}
        </div>
      ) : (
        <div className="space-y-3">
          {sorted.map(s => {
            const filled = s.slots.filter(sl=>sl.personId).length;
            const openRequests = (ma.tauschAnfragen||[]).filter(r=>r.schichtId===s.id).length;
            return (
              <div key={s.id} className="glass glass-hover rounded-2xl p-4 cursor-pointer transition-all"
                onClick={() => { setSelSchichtId(s.id); setView('detail'); }}>
                <div className="flex items-start gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap mb-1.5">
                      <span className="font-semibold text-slate-800 text-sm">{fmtDe(s.datum)}</span>
                      {s.titel && <span className="text-slate-700 text-sm">{s.titel}</span>}
                      {s.veroeffentlicht
                        ? <span className="pill" style={{background:'rgba(16,185,129,0.15)',color:'#10b981'}}>✓ Veröffentlicht</span>
                        : <span className="pill" style={{background:'rgba(100,116,139,0.15)',color:'#64748b'}}>Entwurf</span>}
                      {openRequests>0 && <span className="pill" style={{background:'rgba(251,146,60,0.18)',color:'#f97316'}}>🔄 {openRequests} Tausch</span>}
                      {s.planId && (ma.plaene||[]).find(p=>p.id===s.planId) && <span className="pill text-xs" style={{background:'rgba(99,102,241,0.12)',color:'#818cf8'}}>{(ma.plaene||[]).find(p=>p.id===s.planId)?.name}</span>}
                    </div>
                    <div className="text-slate-600 text-xs mb-2">{filled}/{s.slots.length} Slots besetzt</div>
                    <div className="flex flex-wrap gap-1">
                      {s.slots.slice(0,8).map(sl => {
                        const g = ma.gruppen.find(x=>x.id===sl.gruppeId);
                        const p = ma.personen.find(x=>x.id===sl.personId);
                        const col = g?.farbe||'#8b5cf6';
                        return <span key={sl.id} className="pill" style={{background:p?col+'22':'rgba(0,0,0,0.05)',color:p?col:'#64748b'}}>{p?p.name:'—'}</span>;
                      })}
                      {s.slots.length>8 && <span className="text-slate-600 text-xs ml-1">+{s.slots.length-8}</span>}
                    </div>
                  </div>
                  {onChange && !allowedGroups && <div className="flex gap-1 flex-shrink-0">
                    <button onClick={e=>{e.stopPropagation();setDupDate(s.datum);setDupModal(s);}}
                      className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 hover:bg-indigo-50 text-slate-500 hover:text-indigo-500 transition-all" title="Duplizieren">
                      <SI p={IC.copy} size={12}/>
                    </button>
                    <button onClick={e=>{e.stopPropagation();if(confirm('Schicht löschen?'))deleteSchicht(s.id);}}
                      className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 hover:bg-red-900/25 text-slate-600 hover:text-red-400 transition-all">
                      <SI p={IC.trash} size={12}/>
                    </button>
                  </div>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {dupModal && (
        <Modal title="Schicht duplizieren" onClose={()=>setDupModal(null)}>
          <div className="space-y-4">
            <p className="text-slate-500 text-xs">Slots werden übernommen, Einteilungen werden zurückgesetzt.</p>
            <div>
              <label className="text-slate-400 text-xs block mb-1.5">Neues Datum *</label>
              <input type="date" value={dupDate} onChange={e=>setDupDate(e.target.value)} className={"w-full "+INP} autoFocus/>
            </div>
            <div className="flex gap-2 pt-1">
              <button onClick={dupSchicht} disabled={!dupDate}
                className="flex-1 bg-white hover:bg-gray-100 disabled:opacity-40 text-black font-bold py-2.5 text-sm transition-all rounded-full">Duplizieren</button>
              <button onClick={()=>setDupModal(null)} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm transition-all rounded-full">Abbrechen</button>
            </div>
          </div>
        </Modal>
      )}

      {planModal==='create' && (
        <Modal title="Neuen Plan erstellen" onClose={()=>setPlanModal(null)}>
          <div className="space-y-4">
            <div>
              <label className="text-slate-400 text-xs block mb-1.5">Plan-Name *</label>
              <input value={planForm.name} onChange={e=>setPlanForm(f=>({...f,name:e.target.value}))}
                placeholder="z. B. Ostern 2025, Sommer-Serie…" className={"w-full "+INP} autoFocus
                onKeyDown={e=>e.key==='Enter'&&createPlan()}/>
            </div>
            <div className="flex gap-2 pt-1">
              <button onClick={createPlan} disabled={!planForm.name.trim()}
                className="flex-1 bg-white hover:bg-gray-100 disabled:opacity-40 text-black font-bold py-2.5 text-sm transition-all rounded-full">Erstellen</button>
              <button onClick={()=>setPlanModal(null)} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm transition-all rounded-full">Abbrechen</button>
            </div>
          </div>
        </Modal>
      )}

      {modal==='create' && (
        <Modal title="Neue Schicht erstellen" onClose={() => setModal(null)}>
          <div className="space-y-4">
            <div>
              <label className="text-slate-400 text-xs block mb-1.5">{ma.vorlagen.find(v=>v.id===createForm.vorlageId)?.art==='zeitraum'?'Start-Datum *':'Datum *'}</label>
              <input type="date" value={createForm.datum} onChange={e=>setCreateForm(p=>({...p,datum:e.target.value}))} className={"w-full "+INP} autoFocus/>
            </div>
            <div>
              <label className="text-slate-400 text-xs block mb-1.5">Titel</label>
              <input value={createForm.titel} onChange={e=>setCreateForm(p=>({...p,titel:e.target.value}))}
                placeholder="z. B. Sonntagsgottesdienst" className={"w-full "+INP}
                onKeyDown={e=>e.key==='Enter'&&createSchicht()}/>
            </div>
            {ma.vorlagen.length>0 && (() => {
              const selVorlage = ma.vorlagen.find(v=>v.id===createForm.vorlageId);
              const isZr = selVorlage?.art==='zeitraum';
              return (
                <div>
                  <label className="text-slate-400 text-xs block mb-1.5">Vorlage</label>
                  <select value={createForm.vorlageId} onChange={e=>setCreateForm(p=>({...p,vorlageId:e.target.value}))} className={"w-full "+INP}>
                    <option value="">— Keine Vorlage (leere Schicht) —</option>
                    {ma.vorlagen.map(v=><option key={v.id} value={v.id}>{v.art==='zeitraum'?'📅 ':''}{v.name}{v.art==='zeitraum'?` (${(v.tage||[]).length} Tage)`:`(${(v.slots||[]).length} Slots)`}</option>)}
                  </select>
                  {isZr && (
                    <p className="text-indigo-400 text-xs mt-1.5">📅 Erstellt {(selVorlage.tage||[]).length} aufeinanderfolgende Schichten ab dem Start-Datum</p>
                  )}
                </div>
              );
            })()}
            <div className="flex gap-2 pt-1">
              <button onClick={createSchicht} className="flex-1 bg-white hover:bg-gray-100 text-black font-bold py-2.5 text-sm rounded-full">Erstellen</button>
              <button onClick={() => setModal(null)} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm rounded-full">Abbrechen</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );

  // ── Detail View ──
  if (!selSchicht) { setView('list'); return null; }

  return (
    <div className="space-y-4 up">
      {/* Header */}
      <div className="flex items-center gap-3">
        <button onClick={() => setView('list')} className="w-8 h-8 flex items-center justify-center rounded-xl bg-black/5 hover:bg-black/5 text-slate-400 transition-all">
          <SI p={IC.chevLeft} size={16}/>
        </button>
        <div className="flex-1 min-w-0">
          <h1 className="text-lg font-bold text-slate-100 leading-none">{fmtDe(selSchicht.datum)}{selSchicht.titel?' — '+selSchicht.titel:''}</h1>
          <div className="text-slate-500 text-xs mt-0.5">{selSchicht.slots.filter(sl=>sl.personId).length}/{selSchicht.slots.length} Slots besetzt</div>
        </div>
      </div>

      {/* Action Bar */}
      <div className="flex gap-2 flex-wrap">
        {onChange && !allowedGroups && <>
          <button onClick={togglePublish}
            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold transition-all ${selSchicht.veroeffentlicht?'bg-emerald-900/30 text-emerald-400 hover:bg-emerald-900/40':'bg-black/5 text-slate-700 hover:bg-black/10'}`}>
            {selSchicht.veroeffentlicht?'✓ Veröffentlicht':'Veröffentlichen'}
          </button>
          <button onClick={runAuto} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold bg-amber-600/20 text-amber-400 hover:bg-amber-600/30 transition-all">
            <SI p={IC.zap} size={12}/> Auto-Einteilung
          </button>
        </>}
        <button onClick={()=>{ setShareScope('single'); setShareText(buildPlanText(ma,selSchicht)); setModal('share'); }}
          className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold bg-black/5 text-slate-700 hover:bg-black/10 transition-all">
          <SI p={IC.send} size={12}/> Teilen
        </button>
        {onChange && !allowedGroups && (
          <button onClick={()=>{
            if (!selSchicht.abfrageToken) { const t=genId().slice(0,8); updateSchicht(selSchicht.id,{abfrageToken:t}); toast('Abfrage-Link generiert'); }
            setModal('abfrage_link');
          }} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold transition-all"
            style={{background:'rgba(99,102,241,0.15)',color:'#818cf8'}}>
            📋 Abfrage
          </button>
        )}
        {onChange && !allowedGroups && <>
          <button onClick={saveAsVorlage}
            className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold transition-all"
            style={{background:'rgba(16,185,129,0.12)',color:'#10b981'}}>
            <SI p={IC.copy} size={12}/> Als Vorlage
          </button>
          <button onClick={()=>{setDupDate(selSchicht.datum);setDupModal(selSchicht);}}
            className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold bg-black/5 text-slate-700 hover:bg-black/10 transition-all">
            <SI p={IC.copy} size={12}/> Duplizieren
          </button>
          <button onClick={addSchSlot} disabled={ma.gruppen.length===0}
            className="ml-auto flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold bg-black/8 text-slate-800 hover:bg-black/15 disabled:opacity-40 transition-all">
            <SI p={IC.plus} size={12}/> Slot
          </button>
        </>}
      </div>

      {/* Slots */}
      <div className="space-y-2">
        {selSchicht.slots.length===0 && (
          <div className="glass rounded-2xl py-10 text-center text-slate-600 text-sm">
            Keine Slots. Klicke "+ Slot" oder erstelle eine Vorlage.
          </div>
        )}
        {selSchicht.slots.map(sl => {
          const g  = ma.gruppen.find(x=>x.id===sl.gruppeId);
          const d  = (g?.dienste||[]).find(x=>x.id===sl.dienstId);
          const p1 = ma.personen.find(x=>x.id===sl.personId);
          const p2 = sl.doppelt ? ma.personen.find(x=>x.id===sl.personId2) : null;
          const col = g?.farbe||'#8b5cf6';
          const slotWishes = (selSchicht.wuensche||[]).filter(w=>w.slotId===sl.id);
          const wCount = slotWishes.length;
          const wJa  = slotWishes.filter(w=>w.art==='wunschdienst').length;
          const wNein= slotWishes.filter(w=>w.art==='wunschfrei').length;

          return (
            <div key={sl.id} className="glass rounded-2xl p-3">
              <div className="flex items-center gap-2 mb-2">
                <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:col}}/>
                <span className="text-xs font-semibold text-slate-500">{g?.name||'?'}</span>
                <span className="text-slate-700 text-xs">›</span>
                <span className="text-xs font-semibold text-slate-700">{d?.name||'?'}</span>
                {sl.doppelt && <span className="pill text-xs" style={{background:'rgba(245,158,11,0.15)',color:'#f59e0b'}}>Doppeldienst</span>}
                {wJa>0  && <span className="pill text-xs" style={{background:'rgba(16,185,129,0.1)',color:'#10b981'}}>👍 {wJa}</span>}
                {wNein>0 && <span className="pill text-xs" style={{background:'rgba(239,68,68,0.08)',color:'#ef4444'}}>👎 {wNein}</span>}
                {wCount>0&&wJa===0&&wNein===0 && <span className="pill text-xs" style={{background:'rgba(245,158,11,0.1)',color:'#f59e0b'}}>{wCount} Wünsche</span>}
                {onChange && <button onClick={() => remSchSlot(sl.id)} className="ml-auto text-slate-700 hover:text-red-400 transition-all"><SI p={IC.x} size={12}/></button>}
              </div>
              <div className="flex gap-2 flex-wrap items-center">
                {/* Assign P1 — clickable for admin/allowed group, read-only otherwise */}
                {(onChange && (!allowedGroups || allowedGroups.includes(sl.gruppeId)))
                  ? <button onClick={() => { setSelSlot({...sl,isSecond:false}); setModal('assign'); }}
                      className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-medium transition-all"
                      style={p1?{background:p1.farbe+'25',color:p1.farbe,border:`1px solid ${p1.farbe}44`}:{background:'rgba(0,0,0,0.04)',color:'#64748b',border:'1px solid rgba(0,0,0,0.08)'}}>
                      {p1?<><Avatar name={p1.name} farbe={p1.farbe} size={16}/><span>{p1.name}</span></>:'+ Zuweisen'}
                    </button>
                  : p1 && <span className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-medium" style={{background:p1.farbe+'25',color:p1.farbe,border:`1px solid ${p1.farbe}44`}}><Avatar name={p1.name} farbe={p1.farbe} size={16}/>{p1.name}</span>
                }
                {/* Tausch buttons — shown when myPerson is assigned to this slot */}
                {onTausch && myPerson && sl.personId===myPerson.id && !(ma.tauschAnfragen||[]).some(r=>r.slotId===sl.id&&!r.isSecond) && (
                  <button onClick={()=>{setTauschSlot({slotId:sl.id,isSecond:false});setTauschNote('');setModal('tausch');}}
                    className="flex items-center gap-1 px-2 py-1 rounded-lg text-xs font-medium transition-all"
                    style={{background:'rgba(251,146,60,0.12)',color:'#f97316',border:'1px solid rgba(251,146,60,0.25)'}}>
                    🔄 Tauschen
                  </button>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Wünsche Section — nur für Admin */}
      {onChange && selSchicht.slots.length>0 && (
        <div className="glass rounded-2xl p-4">
          <div className="text-slate-500 text-xs font-semibold uppercase tracking-wider mb-3">Wünsche bearbeiten</div>
          <div className="flex flex-wrap gap-2">
            {ma.personen.filter(p => { const gids=p.gruppenIds||(p.gruppeId?[p.gruppeId]:[]);return ma.gruppen.some(g=>gids.includes(g.id)&&selSchicht.slots.some(sl=>sl.gruppeId===g.id)); }).map(p => {
              const myWishes = (selSchicht.wuensche||[]).filter(w=>w.personId===p.id);
              return (
                <button key={p.id} onClick={() => {
                    setWishPid(p.id);
                    const wm={};
                    myWishes.forEach(w=>wm[w.slotId]=w.art);
                    setWishForm(wm); setModal('wish');
                  }}
                  className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs transition-all"
                  style={{background:'rgba(0,0,0,0.04)',border:'1px solid rgba(0,0,0,0.08)',color:'#64748b'}}>
                  <Avatar name={p.name} farbe={p.farbe} size={18}/>
                  {p.name}
                  {myWishes.length>0&&<span style={{color:'#f59e0b',fontSize:10}}>({myWishes.length})</span>}
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* Tausch-Anfragen Section */}
      {onTausch && (() => {
        const schichtReqs = (ma.tauschAnfragen||[]).filter(r=>r.schichtId===selSchicht.id);
        const visReqs = schichtReqs.filter(r=>{
          const requester=ma.personen.find(p=>p.id===r.personId);
          if(!requester) return false;
          const rGrps=requester.gruppenIds||(requester.gruppeId?[requester.gruppeId]:[]);
          // Owner/admin see all; others see requests from their own groups
          if(!myPerson) return true;
          return rGrps.some(g=>myGroupIds.includes(g))||r.personId===myPerson.id;
        });
        if(visReqs.length===0) return null;
        return (
          <div className="glass rounded-2xl p-4 space-y-2">
            <div className="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2">🔄 Tausch-Anfragen</div>
            {visReqs.map(r=>{
              const requester=ma.personen.find(p=>p.id===r.personId);
              const schicht2=ma.schichten.find(s=>s.id===r.schichtId);
              const slot2=schicht2?.slots.find(sl=>sl.id===r.slotId);
              const g=ma.gruppen.find(x=>x.id===slot2?.gruppeId);
              const d=(g?.dienste||[]).find(x=>x.id===slot2?.dienstId);
              const isOwn=myPerson?.id===r.personId;
              const canAccept=myPerson&&!isOwn&&(myPerson.gruppenIds||(myPerson.gruppeId?[myPerson.gruppeId]:[])).includes(slot2?.gruppeId||'');
              return (
                <div key={r.id} className="flex items-center gap-3 p-2.5 rounded-xl" style={{background:'rgba(251,146,60,0.06)',border:'1px solid rgba(251,146,60,0.15)'}}>
                  <Avatar name={requester?.name||'?'} farbe={requester?.farbe||'#f97316'} size={28}/>
                  <div className="flex-1 min-w-0">
                    <div className="text-xs font-semibold text-slate-700">{requester?.name||'?'} · <span style={{color:g?.farbe}}>{d?.name||'?'}</span></div>
                    {r.note && <div className="text-slate-500 text-xs truncate">„{r.note}"</div>}
                  </div>
                  {canAccept && <button onClick={()=>acceptTausch(r)}
                    className="px-3 py-1.5 rounded-full text-xs font-bold transition-all"
                    style={{background:'rgba(16,185,129,0.15)',color:'#10b981'}}>Annehmen</button>}
                  {isOwn && <button onClick={()=>cancelTausch(r)}
                    className="px-3 py-1.5 rounded-full text-xs font-medium transition-all text-slate-500 hover:text-red-400">Zurückziehen</button>}
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* Tausch Modal */}
      {modal==='tausch' && tauschSlot && selSchicht && (() => {
        const slot2=selSchicht.slots.find(sl=>sl.id===tauschSlot.slotId);
        const g=ma.gruppen.find(x=>x.id===slot2?.gruppeId);
        const d=(g?.dienste||[]).find(x=>x.id===slot2?.dienstId);
        return (
          <Modal title="Tausch-Anfrage stellen" onClose={()=>setModal('detail_view')}>
            <div className="space-y-4">
              <p className="text-slate-500 text-sm">Dein Dienst <strong style={{color:g?.farbe}}>{d?.name||'?'}</strong> wird für alle in deiner Gruppe sichtbar. Wer annimmt, übernimmt den Dienst.</p>
              <div>
                <label className="text-slate-400 text-xs block mb-1.5">Nachricht (optional)</label>
                <input value={tauschNote} onChange={e=>setTauschNote(e.target.value)}
                  placeholder="z. B. bin krank, bitte jemand übernehmen"
                  className={"w-full "+INP} autoFocus onKeyDown={e=>e.key==='Enter'&&submitTausch()}/>
              </div>
              <div className="flex gap-2 pt-1">
                <button onClick={submitTausch} className="flex-1 bg-white hover:bg-gray-100 text-black font-bold py-2.5 text-sm rounded-full">Anfrage stellen</button>
                <button onClick={()=>setModal('detail_view')} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm rounded-full">Abbrechen</button>
              </div>
            </div>
          </Modal>
        );
      })()}

      {/* Assign Modal */}
      {modal==='assign' && selSlot && (() => {
        const g = ma.gruppen.find(x=>x.id===selSlot.gruppeId);
        const d = (g?.dienste||[]).find(x=>x.id===selSlot.dienstId);
        const eligible = ma.personen.filter(p=>(p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).includes(selSlot.gruppeId));
        const cur = selSlot.isSecond ? selSlot.personId2 : selSlot.personId;
        return (
          <Modal title={`Zuweisen: ${d?.name||'?'}`} onClose={() => setModal(null)}>
            <div className="space-y-1.5">
              {eligible.length===0&&<div className="text-slate-500 text-sm py-4 text-center">Keine Personen in dieser Gruppe.</div>}
              {eligible.map(p => {
                const sel = cur===p.id;
                const wish = (selSchicht.wuensche||[]).find(w=>w.personId===p.id&&w.slotId===selSlot.id);
                return (
                  <button key={p.id} onClick={() => assignPerson(selSlot.id,p.id,selSlot.isSecond)}
                    className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all"
                    style={sel?{background:p.farbe+'30',border:`1px solid ${p.farbe}55`}:{background:'rgba(0,0,0,0.03)',border:'1px solid rgba(0,0,0,0.08)'}}>
                    <Avatar name={p.name} farbe={p.farbe} size={34}/>
                    <div className="flex-1 text-left">
                      <div className="font-semibold text-sm" style={{color:sel?p.farbe:'#e2e8f0'}}>{p.name}</div>
                      {wish&&<div className="text-xs" style={{color:wish.art==='wunschdienst'?'#10b981':'#ef4444'}}>{wish.art==='wunschdienst'?'✓ Wunschdienst':'✕ Wunschfrei'}</div>}
                    </div>
                    {sel&&<SI p={IC.check} size={14} stroke={3}/>}
                  </button>
                );
              })}
            </div>
          </Modal>
        );
      })()}

      {/* Wish Modal */}
      {modal==='wish' && wishPid && (() => {
        const person = ma.personen.find(p=>p.id===wishPid);
        const personGrpIds=person?.gruppenIds||(person?.gruppeId?[person.gruppeId]:[]);
        const relSlots = selSchicht.slots.filter(sl=>personGrpIds.includes(sl.gruppeId));
        return (
          <Modal title={`Wünsche: ${person?.name||'?'}`} onClose={() => setModal(null)}>
            <div className="space-y-3">
              {relSlots.length===0&&<div className="text-slate-500 text-sm">Keine relevanten Slots.</div>}
              {relSlots.map(sl => {
                const g = ma.gruppen.find(x=>x.id===sl.gruppeId);
                const d = (g?.dienste||[]).find(x=>x.id===sl.dienstId);
                const art = wishForm[sl.id]||'';
                return (
                  <div key={sl.id} className="flex items-center gap-2">
                    <span className="flex-1 text-sm text-slate-700 truncate">{d?.name||'?'}</span>
                    {['','wunschdienst','wunschfrei'].map(v=>(
                      <button key={v} onClick={() => setWishForm(p=>({...p,[sl.id]:v}))}
                        className={`px-2.5 py-1 rounded-lg text-xs font-medium transition-all whitespace-nowrap ${art===v?v==='wunschdienst'?'bg-emerald-900/40 text-emerald-400':v==='wunschfrei'?'bg-red-900/30 text-red-400':'bg-black/10 text-slate-800':'bg-black/5 text-slate-600 hover:bg-black/5'}`}>
                        {v===''?'Egal':v==='wunschdienst'?'✓ Wunsch':'✕ Frei'}
                      </button>
                    ))}
                  </div>
                );
              })}
              <div className="flex gap-2 pt-2">
                <button onClick={saveWishes} className="flex-1 bg-white hover:bg-gray-100 text-black font-bold py-2.5 text-sm rounded-full">Speichern</button>
                <button onClick={() => setModal(null)} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm rounded-full">Abbrechen</button>
              </div>
            </div>
          </Modal>
        );
      })()}

      {/* Share Modal */}
      {modal==='share' && (
        <Modal title={shareScope==='all'?'Gesamtplan teilen':'Schicht teilen'} onClose={() => setModal(null)}>
          <div className="space-y-4">
            {/* Preview */}
            <div className="rounded-2xl overflow-auto max-h-48" style={{background:'rgba(0,0,0,0.03)',border:'1px solid rgba(0,0,0,0.06)'}}>
              <pre className="text-xs text-slate-700 font-mono whitespace-pre-wrap leading-relaxed p-4">{shareText}</pre>
            </div>
            {/* Action buttons */}
            <div className="grid grid-cols-3 gap-2">
              <button onClick={()=>{ exportExcelPlan(ma, selSchicht?.datum||today(), shareScope==='single'?selSchicht:null); toast('Excel exportiert ✓'); }}
                className="flex flex-col items-center gap-2 py-4 rounded-2xl transition-all border"
                style={{background:'rgba(16,185,129,0.06)',borderColor:'rgba(16,185,129,0.2)',color:'#059669'}}>
                <SI p={IC.download} size={18} stroke={1.8}/>
                <span className="text-xs font-bold">Excel</span>
              </button>
              <button onClick={()=>navigator.clipboard?.writeText(shareText).then(()=>toast('Kopiert! 📋')).catch(()=>alert(shareText))}
                className="flex flex-col items-center gap-2 py-4 rounded-2xl transition-all border"
                style={{background:'rgba(59,130,246,0.06)',borderColor:'rgba(59,130,246,0.2)',color:'#2563eb'}}>
                <SI p={IC.copy} size={18} stroke={1.8}/>
                <span className="text-xs font-bold">Kopieren</span>
              </button>
              <button onClick={()=>{
                const w=window.open('','_blank','width=800,height=600');
                const rows = shareScope==='single'&&selSchicht
                  ? selSchicht.slots.map(sl=>{const g=ma.gruppen.find(x=>x.id===sl.gruppeId);const d=(g?.dienste||[]).find(x=>x.id===sl.dienstId);const p1=ma.personen.find(x=>x.id===sl.personId);const p2=sl.doppelt?ma.personen.find(x=>x.id===sl.personId2):null;return `<tr><td>${g?.name||''}</td><td>${d?.name||''}</td><td>${p1?.name||'—'}</td><td>${p2?.name||''}</td></tr>`;}).join('')
                  : [...ma.schichten].sort((a,b)=>a.datum.localeCompare(b.datum)).map(s=>`<tr><td colspan="4" style="background:#f1f5f9;font-weight:700;padding:10px 12px">${fmtDe(s.datum)}${s.titel?' — '+s.titel:''}</td></tr>`+s.slots.map(sl=>{const g=ma.gruppen.find(x=>x.id===sl.gruppeId);const d=(g?.dienste||[]).find(x=>x.id===sl.dienstId);const p1=ma.personen.find(x=>x.id===sl.personId);const p2=sl.doppelt?ma.personen.find(x=>x.id===sl.personId2):null;return `<tr><td>${g?.name||''}</td><td>${d?.name||''}</td><td>${p1?.name||'—'}</td><td>${p2?.name||''}</td></tr>`;}).join('')).join('');
                w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Dienstplan</title><style>body{font-family:system-ui,sans-serif;margin:32px;color:#0f172a}h2{font-size:1.2rem;font-weight:800;margin-bottom:16px}table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;padding:8px 12px;background:#0f172a;color:#fff;font-weight:600}td{padding:8px 12px;border-bottom:1px solid #e2e8f0}tr:hover td{background:#f8fafc}@media print{button{display:none}}</style></head><body><h2>${shareScope==='single'&&selSchicht?(fmtDe(selSchicht.datum)+(selSchicht.titel?' — '+selSchicht.titel:'')):'Dienstplan'}</h2><table><thead><tr><th>Gruppe</th><th>Dienst</th><th>Person 1</th><th>Person 2</th></tr></thead><tbody>${rows}</tbody></table><br/><button onclick="window.print()" style="padding:10px 24px;background:#000;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700">Drucken / Als PDF speichern</button></body></html>`);
                w.document.close();
              }}
                className="flex flex-col items-center gap-2 py-4 rounded-2xl transition-all border"
                style={{background:'rgba(100,116,139,0.06)',borderColor:'rgba(100,116,139,0.2)',color:'#475569'}}>
                <SI p={IC.printer} size={18} stroke={1.8}/>
                <span className="text-xs font-bold">PDF</span>
              </button>
            </div>
          </div>
        </Modal>
      )}

      {modal==='abfrage_link' && selSchicht && (
        <Modal title="Abfrage-Link" onClose={()=>setModal('detail_view')}>
          <div className="space-y-4">
            <p className="text-slate-500 text-xs">Teile diesen Link mit deinen Team-Mitgliedern. Sie können ohne Login ihre Verfügbarkeit eintragen.</p>
            <div className="bg-black/5 rounded-xl p-3 text-xs font-mono text-slate-700 break-all select-all">
              {window.location.origin + window.location.pathname + '?abfrage=' + (selSchicht.abfrageToken||'…')}
            </div>
            <button onClick={()=>navigator.clipboard?.writeText(window.location.origin+window.location.pathname+'?abfrage='+(selSchicht.abfrageToken||'')).then(()=>toast('Link kopiert 📋'))}
              className="w-full bg-white hover:bg-gray-100 text-black font-bold py-2.5 text-sm transition-all rounded-full">
              Link kopieren
            </button>
            {selSchicht.abfrageToken && (
              <button onClick={()=>{updateSchicht(selSchicht.id,{abfrageToken:''});setModal('detail_view');toast('Abfrage deaktiviert');}}
                className="w-full text-red-400 text-xs py-1 hover:text-red-500 transition-all">
                Abfrage deaktivieren
              </button>
            )}
          </div>
        </Modal>
      )}
    </div>
  );
};

// STATISTIK VIEW
// ═══════════════════════════════════════════════════════════════════════════════
const StatistikView = ({ ma }) => {
  const [tab,        setTab]        = useState('personen');
  const [filterFrom, setFilterFrom] = useState('');
  const [filterTo,   setFilterTo]   = useState('');
  const [filterGrp,  setFilterGrp]  = useState('all');
  const [sortMode,   setSortMode]   = useState('desc');

  const filtSchichten = useMemo(() => ma.schichten.filter(s =>
    (!filterFrom || s.datum >= filterFrom) && (!filterTo || s.datum <= filterTo)
  ), [ma.schichten, filterFrom, filterTo]);

  const stats = useMemo(() => {
    return ma.personen
      .filter(p => filterGrp==='all' || (p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).includes(filterGrp))
      .map(p => {
        let total = 0, lastDate = '';
        const byDienst = {};
        filtSchichten.forEach(s => s.slots.forEach(sl => {
          if (sl.personId!==p.id) return;
          total++;
          if (!lastDate || s.datum > lastDate) lastDate = s.datum;
          const g = ma.gruppen.find(x=>x.id===sl.gruppeId);
          const d = (g?.dienste||[]).find(x=>x.id===sl.dienstId);
          byDienst[d?.name||'?'] = (byDienst[d?.name||'?']||0)+1;
        }));
        return { p, total, byDienst, lastDate };
      }).sort((a,b) => sortMode==='alpha' ? a.p.name.localeCompare(b.p.name) : sortMode==='asc' ? a.total-b.total : b.total-a.total);
  }, [ma, filtSchichten, filterGrp, sortMode]);

  const teamStats = useMemo(() => {
    return ma.gruppen
      .filter(g => filterGrp==='all' || g.id===filterGrp)
      .map(g => {
      let totalSlots = 0, filledSlots = 0;
      const byDienst = {};
      filtSchichten.forEach(s => s.slots.forEach(sl => {
        if (sl.gruppeId !== g.id) return;
        totalSlots++;
        if (sl.personId) filledSlots++;
        const d = (g.dienste||[]).find(x=>x.id===sl.dienstId);
        const key = d?.name||'?';
        if (!byDienst[key]) byDienst[key] = { total:0, filled:0 };
        byDienst[key].total++;
        if (sl.personId) byDienst[key].filled++;
      }));
      const members = ma.personen.filter(p => (p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).includes(g.id));
      return { g, totalSlots, filledSlots, byDienst, members };
    }).filter(x => x.totalSlots > 0 || x.members.length > 0);
  }, [ma]);

  const maxVal = stats.length ? Math.max(...stats.map(s=>s.total), 1) : 1;
  const avgVal = stats.length ? stats.reduce((s,x)=>s+x.total,0)/stats.length : 0;

  return (
    <div className="space-y-5 up">
      <div>
        <h1 className="text-xl font-bold grad">Statistik</h1>
        <p className="text-slate-500 text-sm mt-0.5">Einsätze & Team-Auslastung</p>
      </div>

      <div className="glass rounded-2xl p-3 space-y-2">
        <div className="flex gap-2 flex-wrap items-center">
          <div className="flex items-center gap-1.5">
            <span className="text-slate-500 text-xs">Von</span>
            <input type="date" value={filterFrom} onChange={e=>setFilterFrom(e.target.value)} className={INP_SM}/>
          </div>
          <div className="flex items-center gap-1.5">
            <span className="text-slate-500 text-xs">Bis</span>
            <input type="date" value={filterTo} onChange={e=>setFilterTo(e.target.value)} className={INP_SM}/>
          </div>
          <select value={filterGrp} onChange={e=>setFilterGrp(e.target.value)} className={INP_SM}>
            <option value="all">Alle Teams</option>
            {ma.gruppen.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
          </select>
          <div className="flex gap-1 ml-auto">
            {[['desc','Meiste'],['asc','Wenigste'],['alpha','A–Z']].map(([m,l])=>(
              <button key={m} onClick={()=>setSortMode(m)}
                className={`px-2.5 py-1 rounded-full text-xs font-semibold transition-all ${sortMode===m?'bg-slate-900 text-white':'bg-black/5 text-slate-500 hover:bg-black/10'}`}>{l}</button>
            ))}
          </div>
          {(filterFrom||filterTo||filterGrp!=='all') && (
            <button onClick={()=>{setFilterFrom('');setFilterTo('');setFilterGrp('all');}} className="text-slate-400 text-xs hover:text-slate-600 transition-all">✕ Zurücksetzen</button>
          )}
        </div>
      </div>

      <div className="flex gap-2">
        {[['personen','Mitarbeiter'],['teams','Teams']].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)}
            className={`px-4 py-1.5 rounded-full text-sm font-semibold transition-all ${tab===id?'bg-slate-900 text-white':'bg-black/5 text-slate-600 hover:bg-black/10'}`}>
            {label}
          </button>
        ))}
      </div>

      {tab==='personen' && (
        stats.length===0 ? (
          <div className="glass rounded-2xl py-16 text-center text-slate-600">Noch keine Daten</div>
        ) : (
          <div className="space-y-3">
            {stats.map(({ p, total, byDienst, lastDate }) => {
              const gruppen2 = (p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).map(gid=>ma.gruppen.find(g=>g.id===gid)).filter(Boolean);
              const pct = Math.round((total/maxVal)*100);
              return (
                <div key={p.id} className="glass rounded-2xl p-4 glow">
                  <div className="flex items-center gap-3 mb-2">
                    <Avatar name={p.name} farbe={p.farbe} size={36}/>
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-slate-800 text-sm">{p.name}</div>
                      {gruppen2.length>0&&<div className="flex gap-1.5 flex-wrap">{gruppen2.map(g=><span key={g.id} className="text-xs" style={{color:g.farbe}}>{g.name}</span>)}</div>}
                      {lastDate&&<div className="text-slate-400 text-xs mt-0.5">Letzter Einsatz: {fmtDe(lastDate)}</div>}
                    </div>
                    <div className="flex flex-col items-end gap-1">
                      <div className="text-2xl font-black" style={{color:p.farbe}}>{total}</div>
                      {avgVal>0 && total>avgVal*1.5 && <span className="pill text-xs" style={{background:'rgba(249,115,22,0.12)',color:'#f97316'}}>Viel</span>}
                      {avgVal>0 && total<avgVal*0.5 && <span className="pill text-xs" style={{background:'rgba(245,158,11,0.12)',color:'#f59e0b'}}>Wenig</span>}
                    </div>
                  </div>
                  <div className="h-1.5 rounded-full bg-black/5 overflow-hidden mb-2">
                    <div className="h-full rounded-full transition-all" style={{width:`${pct}%`,background:p.farbe}}/>
                  </div>
                  {Object.keys(byDienst).length>0 && (
                    <div className="flex flex-wrap gap-1">
                      {Object.entries(byDienst).map(([k,v])=>(
                        <span key={k} className="pill" style={{background:'rgba(0,0,0,0.06)',color:'#94a3b8'}}>{k}: {v}</span>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )
      )}

      {tab==='teams' && (
        teamStats.length===0 ? (
          <div className="glass rounded-2xl py-16 text-center text-slate-600">Noch keine Daten</div>
        ) : (
          <div className="space-y-3">
            {teamStats.map(({ g, totalSlots, filledSlots, byDienst, members }) => {
              const pct = totalSlots > 0 ? Math.round((filledSlots/totalSlots)*100) : 0;
              const fillColor = pct>=80 ? '#10b981' : pct>=50 ? '#f59e0b' : '#ef4444';
              return (
                <div key={g.id} className="glass rounded-2xl p-4 glow">
                  <div className="flex items-center gap-3 mb-3">
                    <div className="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style={{background:g.farbe+'22'}}>
                      <span className="font-black text-sm" style={{color:g.farbe}}>{g.name.slice(0,2)}</span>
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-slate-800 text-sm">{g.name}</div>
                      <div className="text-slate-500 text-xs">{members.length} Mitglieder</div>
                    </div>
                    <div className="text-right">
                      <div className="text-lg font-black" style={{color:fillColor}}>{pct}%</div>
                      <div className="text-slate-400 text-xs">{filledSlots}/{totalSlots} Slots</div>
                    </div>
                  </div>
                  {totalSlots > 0 && (
                    <div className="h-1.5 rounded-full bg-black/5 overflow-hidden mb-2">
                      <div className="h-full rounded-full transition-all" style={{width:`${pct}%`,background:fillColor}}/>
                    </div>
                  )}
                  {members.length>0 && (
                    <div className="flex flex-wrap gap-1 mb-2">
                      {members.map(p=>(
                        <div key={p.id} className="flex items-center gap-1 px-2 py-0.5 rounded-full text-xs" style={{background:p.farbe+'18',color:p.farbe}}>
                          <Avatar name={p.name} farbe={p.farbe} size={14}/>
                          {p.name.split(' ')[0]}
                        </div>
                      ))}
                    </div>
                  )}
                  {Object.keys(byDienst).length>0 && (
                    <div className="flex flex-wrap gap-1">
                      {Object.entries(byDienst).map(([k,v])=>(
                        <span key={k} className="pill" style={{background:'rgba(0,0,0,0.06)',color:'#94a3b8'}}>{k}: {v.filled}/{v.total}</span>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )
      )}
    </div>
  );
};
