<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REVIVE Mitarbeiter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

  <script>
    firebase.initializeApp("__FIREBASE_CONFIG__");
    const db = firebase.firestore();
    db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
  </script>
  <style>
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f8fafc; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    body { background: #f8fafc; color: #0f172a; font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; }
    .glass { background: #ffffff; border: 1px solid rgba(0,0,0,0.08); }
    .glass-hover:hover { background: #f1f5f9; }
    .glow { box-shadow: 0 4px 32px rgba(0,0,0,0.08); }
    .grad { color: #0f172a; -webkit-text-fill-color: #0f172a; background: none; font-weight: 900; letter-spacing: -0.03em; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.3); cursor: pointer; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: rgba(0,0,0,0.25) !important; }
    select option { background: #ffffff; color: #0f172a; }
    button { -webkit-tap-highlight-color: transparent; user-select: none; }
    button:active:not(:disabled) { transform: scale(0.97); }
    @keyframes up { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from{opacity:0}to{opacity:1} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .up { animation: up .2s ease; }
    .pill { display:inline-flex; align-items:center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
    .toggle { width: 36px; height: 20px; border-radius: 10px; position: relative; cursor: pointer; transition: background .2s; border: none; }
    .toggle::after { content:''; position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:#fff; transition:transform .2s; }
    .toggle.on::after { transform: translateX(16px); }
    .modal-overlay { animation: fadeIn .15s ease; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ─── Icons ───────────────────────────────────────────────────────────────────
const SI = ({ p, size=16, stroke=2 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">
    {[].concat(p).map((d,i) => <path key={i} d={d}/>)}
  </svg>
);
const IC = {
  plus:      "M12 5v14M5 12h14",
  edit:      ["M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5","M17.586 3.586a2 2 0 012.828 2.828L12 15l-4 1 1-4 8.586-8.586z"],
  trash:     ["M3 6h18","M19 6l-1 14H6L5 6","M8 6V4h8v2"],
  x:         "M18 6L6 18M6 6l12 12",
  check:     "M20 6L9 17l-5-5",
  chevDown:  "M6 9l6 6 6-6",
  chevLeft:  "M15 18l-6-6 6-6",
  logout:    "M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1",
  users:     ["M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2","M9 11a4 4 0 100-8 4 4 0 000 8","M23 21v-2a4 4 0 00-3-3.87","M16 3.13a4 4 0 010 7.75"],
  person:    ["M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2","M12 11a4 4 0 100-8 4 4 0 000 8"],
  layers:    ["M12 2L2 7l10 5 10-5-10-5","M2 17l10 5 10-5","M2 12l10 5 10-5"],
  calendar:  ["M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z"],
  chart:     "M3 3v18h18M7 16l4-4 4 4 4-5",
  cog:       ["M12 15a3 3 0 100-6 3 3 0 000 6","M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"],
  zap:       "M13 2L3 14h9l-1 8 10-12h-9l1-8",
  send:      ["M22 2L11 13","M22 2L15 22 11 13 2 9 22 2"],
  download:  "M3 17v3h18v-3M12 3v11m-4-4l4 4 4-4",
  upload:    "M3 17v3h18v-3M12 15V4m4 4l-4-4-4 4",
  lock:      ["M19 11H5a2 2 0 00-2 2v7a2 2 0 002 2h14a2 2 0 002-2v-7a2 2 0 00-2-2z","M17 11V7a5 5 0 00-10 0v4"],
  eye:       ["M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z","M12 9a3 3 0 100 6 3 3 0 000-6z"],
  eyeOff:    "M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22",
  warn:      ["M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z","M12 9v4M12 17h.01"],
  copy:      ["M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1","M8 5a2 2 0 002 2h4a2 2 0 002-2M8 5a2 2 0 012-2h4a2 2 0 012 2"],
  printer:   ["M6 9V2h12v7","M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2","M6 14h12v8H6z"],
};

// ─── Utilities ────────────────────────────────────────────────────────────────
const genId   = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const today   = () => new Date().toISOString().split('T')[0];
const fmtDe   = d => { if (!d) return ''; const [y,m,dd] = d.split('-'); return `${dd}.${m}.${y}`; };
const loadJSON = (key, fb) => { try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : fb; } catch { return fb; } };
const initials = n => (n||'').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';

// ─── Export helpers ───────────────────────────────────────────────────────────
const exportExcelPlan = (ma, profileLabel, single) => {
  const wb = XLSX.utils.book_new();
  const schichten = single ? [single] : [...ma.schichten].sort((a,b)=>a.datum.localeCompare(b.datum));
  const rows = [['Datum','Titel','Gruppe','Dienst','Person 1','Person 2']];
  schichten.forEach(s => {
    s.slots.forEach(sl => {
      const g  = ma.gruppen.find(x=>x.id===sl.gruppeId);
      const d  = (g?.dienste||[]).find(x=>x.id===sl.dienstId);
      const p1 = ma.personen.find(x=>x.id===sl.personId);
      const p2 = sl.doppelt ? ma.personen.find(x=>x.id===sl.personId2) : null;
      rows.push([fmtDe(s.datum), s.titel||'', g?.name||'', d?.name||'', p1?.name||'—', p2?.name||'']);
    });
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:12},{wch:22},{wch:16},{wch:18},{wch:20},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws, 'Dienstplan');
  XLSX.writeFile(wb, `dienstplan-${profileLabel}-${today()}.xlsx`);
};

const buildPlanText = (ma, single) => {
  const schichten = single ? [single] : [...ma.schichten].sort((a,b)=>a.datum.localeCompare(b.datum));
  return schichten.map(s => {
    const header = `📅 *${s.titel||fmtDe(s.datum)}* — ${fmtDe(s.datum)}`;
    const lines = s.slots.map(sl => {
      const g  = ma.gruppen.find(x=>x.id===sl.gruppeId);
      const d  = (g?.dienste||[]).find(x=>x.id===sl.dienstId);
      const p1 = ma.personen.find(x=>x.id===sl.personId);
      const p2 = sl.doppelt ? ma.personen.find(x=>x.id===sl.personId2) : null;
      const names = [p1?.name, p2?.name].filter(Boolean).join(' & ') || '—';
      return `• ${d?.name||'?'}: ${names}`;
    });
    return [header, ...lines].join('\n');
  }).join('\n\n');
};

// ─── Data Model ───────────────────────────────────────────────────────────────
const DEFAULT_MA     = () => ({ gruppen:[], vorlagen:[], schichten:[], plaene:[], tauschAnfragen:[] });
const DEFAULT_SHARED = () => ({ personen:[], konflikte:[], praeferenzen:[] });
const MA_COLORS = ['#6366f1','#8b5cf6','#a855f7','#ec4899','#ef4444','#f97316','#f59e0b','#10b981','#14b8a6','#06b6d4','#3b82f6','#84cc16'];
const SWATCH    = ['#6366f1','#8b5cf6','#a855f7','#ec4899','#ef4444','#f97316','#f59e0b','#10b981','#14b8a6','#06b6d4','#3b82f6','#84cc16'];

// ─── Church Profiles ──────────────────────────────────────────────────────────
const PROFILES = [
  { id:'wunstorf',   label:'Wunstorf',   color:'#06b6d4', grad:'linear-gradient(135deg,#0891b2,#3b82f6)' },
  { id:'schaumburg', label:'Schaumburg',  color:'#10b981', grad:'linear-gradient(135deg,#059669,#06b6d4)' },
  { id:'revive',     label:'Revive',      color:'#8b5cf6', grad:'linear-gradient(135deg,#8b5cf6,#ec4899)' },
];

// ─── Toast ────────────────────────────────────────────────────────────────────
const ToastContainer = ({ toasts }) => (
  <div style={{position:'fixed',bottom:20,right:20,zIndex:200,display:'flex',flexDirection:'column',gap:8,pointerEvents:'none'}}>
    {toasts.map(t => (
      <div key={t.id} className="up px-4 py-2.5 rounded-xl text-sm font-semibold shadow-xl"
        style={{ background: t.type==='error'?'rgba(239,68,68,0.92)':t.type==='warn'?'rgba(245,158,11,0.92)':'rgba(16,185,129,0.92)', color:'#fff', pointerEvents:'auto' }}>
        {t.msg}
      </div>
    ))}
  </div>
);

// ─── User & Permission System ─────────────────────────────────────────────────
const OWNER_NAME  = 'Admin';
const OWNER_PIN   = '0207';
const ROLE_LABELS = { owner:'Admin', admin:'Co-Admin', editor:'Bearbeiter', viewer:'Betrachter' };
const ROLE_OPTIONS = ['admin','editor','viewer'];

const perms = u => {
  if (!u) return {edit:false,del:false,settings:false,profiles:false};
  if (u.role==='owner'||u.role==='admin') return {edit:true,del:true,settings:true,profiles:true,...(u.permissions||{})};
  if (u.role==='editor') return {edit:true,del:false,settings:false,profiles:false,...(u.permissions||{})};
  return {edit:false,del:false,settings:false,profiles:false,...(u.permissions||{})};
};

// Returns 'edit' | 'view' | 'none' for a user+area combo
const getAreaAccess = (user, areaId) => {
  if (!user) return 'none';
  if (user.role==='owner'||user.role==='admin') return 'edit';
  return (user.areaAccess||{})[areaId]??'none';
};

// ─── Modal ────────────────────────────────────────────────────────────────────
const Modal = ({ title, onClose, children, wide=false }) => {
  useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);
  return (
    <div className="modal-overlay" style={{position:'fixed',inset:0,zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px',background:'rgba(0,0,0,0.75)'}}
      onClick={e => { if (e.target===e.currentTarget) onClose(); }}>
      <div className={`glass rounded-2xl glow w-full ${wide?'max-w-2xl':'max-w-md'}`}
        style={{maxHeight:'90vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:'1px solid rgba(0,0,0,0.08)',position:'sticky',top:0,background:'rgba(255,255,255,0.99)',zIndex:10}}>
          <h3 className="font-semibold text-slate-800 text-sm">{title}</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700 transition-all"><SI p={IC.x} size={15}/></button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
};

// ─── Color Picker ─────────────────────────────────────────────────────────────
const ColorPicker = ({ value, onChange }) => (
  <div className="flex flex-wrap gap-1.5">
    {SWATCH.map(c => (
      <button key={c} type="button" onClick={() => onChange(c)}
        className="w-6 h-6 rounded-full flex-shrink-0 transition-all hover:scale-110"
        style={{ background:c, outline:value===c?`2px solid ${c}`:'2px solid transparent', outlineOffset:'2px' }}/>
    ))}
    <label className="w-6 h-6 rounded-full flex-shrink-0 flex items-center justify-center bg-black/8 border border-black/15 cursor-pointer hover:bg-black/10 relative overflow-hidden" title="Eigene Farbe">
      <span className="text-slate-400 text-xs">+</span>
      <input type="color" value={value} onChange={e=>onChange(e.target.value)} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full"/>
    </label>
  </div>
);

// ─── Avatar ───────────────────────────────────────────────────────────────────
const Avatar = ({ name, farbe, size=32 }) => (
  <div style={{width:size,height:size,borderRadius:'50%',background:farbe||'#8b5cf6',display:'flex',alignItems:'center',justifyContent:'center',fontSize:Math.round(size*0.36),fontWeight:700,color:'#fff',flexShrink:0,letterSpacing:'-0.5px'}}>
    {initials(name)}
  </div>
);

// ─── SyncDot ──────────────────────────────────────────────────────────────────
const SyncDot = ({ state }) => {
  const MAP = { connecting:['#64748b','Verbinden…'], synced:['#10b981','Sync OK'], saving:['#f59e0b','Speichern…'], error:['#ef4444','Offline'] };
  const [col, label] = MAP[state] || MAP.connecting;
  return (
    <div title={label} style={{width:9,height:9,borderRadius:'50%',background:col,flexShrink:0,
      boxShadow:state==='synced'?`0 0 5px ${col}99`:'none',
      animation:state==='saving'?'pulse 1s infinite':'none'}}/>
  );
};

// ─── inp helper ──────────────────────────────────────────────────────────────
const INP = "bg-black/5 border border-black/10 rounded-xl px-3 py-2.5 text-sm text-slate-800 placeholder-slate-400 outline-none transition-all";
const INP_SM = "bg-black/5 border border-black/10 rounded-lg px-2.5 py-1.5 text-xs text-slate-800 placeholder-slate-400 outline-none transition-all";

// ═══════════════════════════════════════════════════════════════════════════════
// PERSONEN VIEW  (unified with login profiles + permissions)
// ═══════════════════════════════════════════════════════════════════════════════
const PersonenView = ({ ma, onChange, toast, profile, allowedGroups }) => {
  const [modal,      setModal]      = useState(null);
  const [saved,      setSaved]      = useState(false); // unused, kept for compat
  const [form,       setForm]       = useState({ name:'', farbe:'#8b5cf6', gruppenIds:[], dienste:[], pin:'', role:'viewer', areaAccess:{}, areaGroups:{}, notiz:'' });
  const [showPin,    setShowPin]    = useState(false);
  const [loginUsers, setLoginUsers] = useState([]);
  const [konModal,   setKonModal]   = useState(false);
  const [konForm,    setKonForm]    = useState({ p1:'', p2:'', note:'' });
  const [prefModal,  setPrefModal]  = useState(false);
  const [prefForm,   setPrefForm]   = useState({ personId:'', dienstId:'', prio:'bevorzugt' });
  const [search,     setSearch]     = useState('');
  const set = (k,v) => setForm(p=>({...p,[k]:v}));

  useEffect(() => {
    const unsub = db.collection('k21-users').onSnapshot(
      snap => setLoginUsers(snap.docs.map(d=>({id:d.id,...d.data()}))),
      () => {}
    );
    return () => unsub();
  }, []);

  const findLogin = name => loginUsers.find(u => u.name.toLowerCase()===name.trim().toLowerCase());

  // Migrate old areas[] → areaAccess{}
  const migrateAA = u => {
    if (!u) return {};
    if (u.areaAccess && Object.keys(u.areaAccess).length) return u.areaAccess;
    const old = u.areas||[], def = u.role==='editor'?'edit':'view';
    if (!old.length) return Object.fromEntries(PROFILES.map(p=>[p.id,def]));
    return Object.fromEntries(PROFILES.map(p=>[p.id,old.includes(p.id)?def:'none']));
  };

  const openAdd = () => {
    setForm({ name:'', farbe:MA_COLORS[ma.personen.length%MA_COLORS.length], gruppenIds:[], dienste:[], pin:'', role:'viewer', areaAccess:{}, areaGroups:{}, notiz:'' });
    setShowPin(false); setSaved(false); setModal('add');
  };

  const openEdit = p => {
    const u = findLogin(p.name);
    setForm({ name:p.name, farbe:p.farbe, gruppenIds:p.gruppenIds||(p.gruppeId?[p.gruppeId]:[]), dienste:p.dienste||[], pin:u?.pin||'', role:u?.role||'viewer', areaAccess:migrateAA(u), areaGroups:u?.areaGroups||{}, notiz:p.notiz||'' });
    setShowPin(false); setSaved(false);
    setModal({ mode:'edit', id:p.id, oldName:p.name });
  };

  const save = async () => {
    const name = form.name.trim();
    if (!name) return;

    // 1. Save / update person in ma data
    if (modal === 'add') {
      onChange(m => ({ ...m, personen: [...m.personen, { id:genId(), name, farbe:form.farbe, gruppenIds:form.gruppenIds||[], dienste:form.dienste||[], notiz:form.notiz.trim() }] }));
    } else {
      onChange(m => ({ ...m, personen: m.personen.map(p =>
        p.id===modal.id ? { ...p, name, farbe:form.farbe, gruppenIds:form.gruppenIds||[], dienste:form.dienste||[], notiz:form.notiz.trim() } : p
      )}));
      if (modal.oldName !== name) {
        const oldLogin = findLogin(modal.oldName);
        if (oldLogin) await db.collection('k21-users').doc(oldLogin.id).update({ name }).catch(()=>{});
      }
    }

    // 2. Sync login profile to k21-users if PIN provided
    const pinVal = form.pin.trim();
    if (pinVal) {
      const loginData = { pin:pinVal, role:form.role, areaAccess:form.areaAccess||{}, areaGroups:form.areaGroups||{}, permissions:{} };
      try {
        const existing = findLogin(name);
        if (existing) {
          await db.collection('k21-users').doc(existing.id).update({ name, ...loginData });
        } else {
          await db.collection('k21-users').add({ name, ...loginData, createdAt:new Date().toISOString() });
        }
      } catch(e) {
        toast('Login-Sync fehlgeschlagen – bitte nochmal speichern', 'error');
        return;
      }
    }

    toast('Gespeichert ✓');
    setModal(null);
  };

  const del = async p => {
    onChange(m => ({ ...m, personen: m.personen.filter(x => x.id!==p.id) }));
    const u = findLogin(p.name);
    if (u) {
      if (confirm(`Auch den Login-Zugang von "${p.name}" löschen?`)) {
        await db.collection('k21-users').doc(u.id).delete();
        toast('Person & Login entfernt', 'warn');
      } else {
        toast('Person entfernt (Login bleibt)', 'warn');
      }
    } else {
      toast('Person entfernt', 'warn');
    }
  };

  return (
    <div className="space-y-5 up">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-xl font-bold grad">Personen</h1>
          <p className="text-slate-500 text-sm mt-0.5">{(allowedGroups ? ma.personen.filter(p=>(p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).some(g=>allowedGroups.includes(g))) : ma.personen).length} Mitarbeiter</p>
        </div>
        {onChange && (
          <button onClick={openAdd} className="flex items-center gap-1.5 bg-white hover:bg-gray-100 text-black text-xs font-bold px-3.5 py-2 transition-all rounded-full">
            <SI p={IC.plus} size={13}/> Person
          </button>
        )}
      </div>

      <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Personen suchen…"
        className={"w-full "+INP}/>

      {(() => {
        const q = search.trim().toLowerCase();
        const visPersonen = (allowedGroups ? ma.personen.filter(p=>(p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).some(g=>allowedGroups.includes(g))) : ma.personen)
          .filter(p => !q || p.name.toLowerCase().includes(q));
        return visPersonen.length === 0 ? (
          <div className="glass rounded-2xl py-16 text-center">
            <div className="text-slate-400 font-medium mb-1">Noch keine Personen</div>
            {onChange && !allowedGroups && <button onClick={openAdd} className="mt-2 text-slate-700 hover:text-slate-900 text-sm">Person hinzufügen</button>}
          </div>
        ) : (
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            {visPersonen.map(p => {
            const gruppen = (p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).map(gid=>ma.gruppen.find(g=>g.id===gid)).filter(Boolean);
            const hasLogin = !!findLogin(p.name);
            return (
              {(() => {
                const praefs = (ma.praeferenzen||[]).filter(pf=>pf.personId===p.id);
                const allDiensteMap = {};
                ma.gruppen.forEach(g=>(g.dienste||[]).forEach(d=>{allDiensteMap[d.id]=d;}));
                return (
                <div key={p.id} className="glass glass-hover rounded-2xl p-4">
                  <div className="flex items-center gap-3">
                    <Avatar name={p.name} farbe={p.farbe}/>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-1.5">
                        <span className="font-semibold text-slate-800 text-sm">{p.name}</span>
                        {hasLogin && (
                          <span title="Kann sich einloggen" className="text-emerald-500 opacity-70">
                            <SI p={IC.lock} size={10} stroke={2.5}/>
                          </span>
                        )}
                      </div>
                      {gruppen.length>0 && <div className="flex gap-1.5 flex-wrap mt-0.5">{gruppen.map(g=><span key={g.id} className="text-xs font-medium" style={{color:g.farbe}}>{g.name}</span>)}</div>}
                      {p.notiz && <div className="text-slate-400 text-xs mt-0.5 truncate" title={p.notiz}>{p.notiz}</div>}
                    </div>
                    {onChange && <>
                      <button onClick={() => openEdit(p)} className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 hover:bg-blue-50 text-slate-500 hover:text-blue-600 transition-all"><SI p={IC.edit} size={12}/></button>
                      <button onClick={() => del(p)} className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 hover:bg-red-50 text-slate-500 hover:text-red-500 transition-all"><SI p={IC.trash} size={12}/></button>
                    </>}
                  </div>
                  {praefs.length>0 && (
                    <div className="flex flex-wrap gap-1 mt-2.5 pt-2.5" style={{borderTop:'1px solid rgba(0,0,0,0.06)'}}>
                      {praefs.map(pf=>{
                        const d=allDiensteMap[pf.dienstId]; if(!d) return null;
                        const isBev=pf.prio==='bevorzugt';
                        return <span key={pf.id} className="pill text-xs" style={{background:isBev?'rgba(16,185,129,0.1)':'rgba(239,68,68,0.08)',color:isBev?'#059669':'#dc2626'}}>{isBev?'👍':'👎'} {d.name}</span>;
                      })}
                    </div>
                  )}
                </div>
                );
              })()}
            );
          })}
          </div>
        );
      })()}

      {/* ── Extras ── */}
      {onChange && (() => {
        const visPersonen = allowedGroups ? ma.personen.filter(p=>(p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).some(g=>allowedGroups.includes(g))) : ma.personen;
        const visKonflikte = (ma.konflikte||[]).filter(k => {
          const pa = ma.personen.find(p=>p.id===k.p1);
          const pb = ma.personen.find(p=>p.id===k.p2);
          if (!pa||!pb) return false;
          if (allowedGroups) {
            const ag=(pa.gruppenIds||(pa.gruppeId?[pa.gruppeId]:[])), bg=(pb.gruppenIds||(pb.gruppeId?[pb.gruppeId]:[]));
            return ag.some(g=>allowedGroups.includes(g))&&bg.some(g=>allowedGroups.includes(g));
          }
          return true;
        });
        const visPraef = (ma.praeferenzen||[]).filter(pf => {
          const p = ma.personen.find(x=>x.id===pf.personId);
          if (!p) return false;
          if (allowedGroups) return (p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).some(g=>allowedGroups.includes(g));
          return true;
        });
        // collect all dienste across all groups
        const allDienste = [];
        const seen = new Set();
        ma.gruppen.forEach(g => (g.dienste||[]).forEach(d => { if(!seen.has(d.id)){seen.add(d.id);allDienste.push({...d,grp:g});} }));
        return (
          <div className="space-y-3">
            <h2 className="text-base font-bold text-slate-800 px-1">Extras</h2>

            {/* Konflikte */}
            <div className="glass rounded-2xl p-4 space-y-3">
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-slate-800 text-sm font-semibold">Ausnahmen</p>
                  <p className="text-slate-500 text-xs mt-0.5">Personen die nie zusammen eingeteilt werden</p>
                </div>
                <button onClick={()=>{setKonForm({p1:'',p2:'',note:''});setKonModal(true);}} disabled={visPersonen.length<2}
                  className="flex items-center gap-1.5 bg-white hover:bg-gray-100 disabled:opacity-40 text-black text-xs font-bold px-3 py-1.5 transition-all rounded-full">
                  <SI p={IC.plus} size={12}/> Ausnahme
                </button>
              </div>
              {visKonflikte.length===0 && <p className="text-slate-400 text-xs text-center py-2">Keine Ausnahmen definiert</p>}
              {visKonflikte.map(k => {
                const pa = ma.personen.find(p=>p.id===k.p1);
                const pb = ma.personen.find(p=>p.id===k.p2);
                return (
                  <div key={k.id} className="flex items-center gap-2 p-2.5 rounded-xl" style={{background:'rgba(239,68,68,0.05)',border:'1px solid rgba(239,68,68,0.12)'}}>
                    <Avatar name={pa.name} farbe={pa.farbe} size={26}/>
                    <span className="text-slate-700 text-xs font-semibold truncate">{pa.name}</span>
                    <span className="text-red-400 text-xs font-bold flex-shrink-0">✕</span>
                    <Avatar name={pb.name} farbe={pb.farbe} size={26}/>
                    <span className="text-slate-700 text-xs font-semibold truncate">{pb.name}</span>
                    {k.note && <span className="text-slate-400 text-xs truncate flex-1">· {k.note}</span>}
                    <button onClick={()=>onChange(m=>({...m,konflikte:(m.konflikte||[]).filter(x=>x.id!==k.id)}))}
                      className="flex-shrink-0 text-slate-400 hover:text-red-500 transition-all ml-auto"><SI p={IC.x} size={12}/></button>
                  </div>
                );
              })}
            </div>

            {/* Dienstpräferenzen */}
            <div className="glass rounded-2xl p-4 space-y-3">
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-slate-800 text-sm font-semibold">Dienstpräferenzen</p>
                  <p className="text-slate-500 text-xs mt-0.5">Welche Dienste jemand bevorzugt oder vermeidet</p>
                </div>
                <button onClick={()=>{setPrefForm({personId:'',dienstId:'',prio:'bevorzugt'});setPrefModal(true);}} disabled={visPersonen.length===0||allDienste.length===0}
                  className="flex items-center gap-1.5 bg-white hover:bg-gray-100 disabled:opacity-40 text-black text-xs font-bold px-3 py-1.5 transition-all rounded-full">
                  <SI p={IC.plus} size={12}/> Präferenz
                </button>
              </div>
              {visPraef.length===0 && <p className="text-slate-400 text-xs text-center py-2">Keine Präferenzen definiert</p>}
              {visPraef.map(pf => {
                const person = ma.personen.find(p=>p.id===pf.personId);
                const dienst = allDienste.find(d=>d.id===pf.dienstId);
                if(!person||!dienst) return null;
                const isBev = pf.prio==='bevorzugt';
                return (
                  <div key={pf.id} className="flex items-center gap-2 p-2.5 rounded-xl"
                    style={{background:isBev?'rgba(16,185,129,0.05)':'rgba(239,68,68,0.05)',border:`1px solid ${isBev?'rgba(16,185,129,0.15)':'rgba(239,68,68,0.12)'}`}}>
                    <Avatar name={person.name} farbe={person.farbe} size={26}/>
                    <span className="text-slate-700 text-xs font-semibold truncate">{person.name}</span>
                    <span className={`text-xs font-bold flex-shrink-0 ${isBev?'text-emerald-500':'text-red-400'}`}>{isBev?'bevorzugt':'vermeidet'}</span>
                    <span className="pill text-xs flex-shrink-0" style={{background:dienst.grp.farbe+'22',color:dienst.grp.farbe}}>{dienst.name}</span>
                    {pf.note && <span className="text-slate-400 text-xs truncate flex-1">· {pf.note}</span>}
                    <button onClick={()=>onChange(m=>({...m,praeferenzen:(m.praeferenzen||[]).filter(x=>x.id!==pf.id)}))}
                      className="flex-shrink-0 text-slate-400 hover:text-red-500 transition-all ml-auto"><SI p={IC.x} size={12}/></button>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* Konflikt-Modal */}
      {konModal && (
        <Modal title="Ausnahme hinzufügen" onClose={()=>setKonModal(false)}>
          <div className="space-y-4">
            <p className="text-slate-500 text-xs">Diese zwei Personen werden bei der Auto-Einteilung nie in dieselbe Schicht eingeteilt.</p>
            {(() => {
              const kPersonen = allowedGroups ? ma.personen.filter(p=>(p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).some(g=>allowedGroups.includes(g))) : ma.personen;
              return (<>
                <div>
                  <label className="text-slate-400 text-xs block mb-1.5">Person 1 *</label>
                  <select value={konForm.p1} onChange={e=>setKonForm(f=>({...f,p1:e.target.value,p2:f.p2===e.target.value?'':f.p2}))} className={"w-full "+INP}>
                    <option value="">— auswählen —</option>
                    {kPersonen.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                  </select>
                </div>
                <div>
                  <label className="text-slate-400 text-xs block mb-1.5">Person 2 *</label>
                  <select value={konForm.p2} onChange={e=>setKonForm(f=>({...f,p2:e.target.value}))} className={"w-full "+INP}>
                    <option value="">— auswählen —</option>
                    {kPersonen.filter(p=>p.id!==konForm.p1).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                  </select>
                </div>
              </>);
            })()}
            <div>
              <label className="text-slate-400 text-xs block mb-1.5">Grund (optional)</label>
              <input value={konForm.note} onChange={e=>setKonForm(f=>({...f,note:e.target.value}))}
                placeholder="z. B. Geschwister, persönlicher Konflikt…" className={"w-full "+INP}/>
            </div>
            <div className="flex gap-2 pt-1">
              <button onClick={()=>{
                if(!konForm.p1||!konForm.p2) return;
                onChange(m=>({...m,konflikte:[...(m.konflikte||[]),{id:genId(),p1:konForm.p1,p2:konForm.p2,note:konForm.note.trim()}]}));
                toast('Ausnahme gespeichert');
                setKonModal(false);
              }} disabled={!konForm.p1||!konForm.p2}
                className="flex-1 bg-white hover:bg-gray-100 disabled:opacity-40 text-black font-bold py-2.5 text-sm transition-all rounded-full">
                Speichern
              </button>
              <button onClick={()=>setKonModal(false)} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm transition-all rounded-full">Abbrechen</button>
            </div>
          </div>
        </Modal>
      )}

      {/* Präferenz-Modal */}
      {prefModal && (() => {
        const pPersonen = allowedGroups ? ma.personen.filter(p=>(p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).some(g=>allowedGroups.includes(g))) : ma.personen;
        const allD = []; const seenD = new Set();
        ma.gruppen.forEach(g=>(g.dienste||[]).forEach(d=>{if(!seenD.has(d.id)){seenD.add(d.id);allD.push({...d,grp:g});}}));
        return (
          <Modal title="Dienstpräferenz hinzufügen" onClose={()=>setPrefModal(false)}>
            <div className="space-y-4">
              <div>
                <label className="text-slate-400 text-xs block mb-1.5">Person *</label>
                <select value={prefForm.personId} onChange={e=>setPrefForm(f=>({...f,personId:e.target.value}))} className={"w-full "+INP}>
                  <option value="">— auswählen —</option>
                  {pPersonen.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
              </div>
              <div>
                <label className="text-slate-400 text-xs block mb-1.5">Dienst *</label>
                <select value={prefForm.dienstId} onChange={e=>setPrefForm(f=>({...f,dienstId:e.target.value}))} className={"w-full "+INP}>
                  <option value="">— auswählen —</option>
                  {allD.map(d=><option key={d.id} value={d.id}>{d.name} ({d.grp.name})</option>)}
                </select>
              </div>
              <div>
                <label className="text-slate-400 text-xs block mb-2">Typ *</label>
                <div className="flex gap-2">
                  {[['bevorzugt','Bevorzugt','#10b981'],['vermeidet','Vermeidet','#ef4444']].map(([val,lbl,col])=>(
                    <button key={val} type="button" onClick={()=>setPrefForm(f=>({...f,prio:val}))}
                      className="flex-1 py-2.5 rounded-xl text-xs font-bold transition-all border"
                      style={prefForm.prio===val?{background:col+'18',color:col,borderColor:col+'44'}:{background:'transparent',color:'#94a3b8',borderColor:'rgba(0,0,0,0.1)'}}>
                      {val==='bevorzugt'?'👍 ':' 👎 '}{lbl}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label className="text-slate-400 text-xs block mb-1.5">Notiz (optional)</label>
                <input value={prefForm.note||''} onChange={e=>setPrefForm(f=>({...f,note:e.target.value}))}
                  placeholder="z. B. aus gesundheitl. Gründen…" className={"w-full "+INP}/>
              </div>
              <div className="flex gap-2 pt-1">
                <button onClick={()=>{
                  if(!prefForm.personId||!prefForm.dienstId) return;
                  onChange(m=>({...m,praeferenzen:[...(m.praeferenzen||[]),{id:genId(),personId:prefForm.personId,dienstId:prefForm.dienstId,prio:prefForm.prio,note:(prefForm.note||'').trim()}]}));
                  toast('Präferenz gespeichert');
                  setPrefModal(false);
                }} disabled={!prefForm.personId||!prefForm.dienstId}
                  className="flex-1 bg-white hover:bg-gray-100 disabled:opacity-40 text-black font-bold py-2.5 text-sm transition-all rounded-full">
                  Speichern
                </button>
                <button onClick={()=>setPrefModal(false)} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm transition-all rounded-full">Abbrechen</button>
              </div>
            </div>
          </Modal>
        );
      })()}

      {modal && (
        <Modal title={modal==='add'?'Person hinzufügen':'Person bearbeiten'} onClose={() => setModal(null)}>
          <div className="space-y-4">
              <div>
                <label className="text-slate-400 text-xs block mb-1.5">Name *</label>
                <input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Vorname Nachname"
                  className={"w-full "+INP} autoFocus onKeyDown={e=>e.key==='Enter'&&save()}/>
              </div>
              <div>
                <label className="text-slate-400 text-xs block mb-1.5">Gruppen</label>
                <div className="flex flex-wrap gap-1.5">
                  {(allowedGroups ? ma.gruppen.filter(g=>allowedGroups.includes(g.id)) : ma.gruppen).map(g => {
                    const on = (form.gruppenIds||[]).includes(g.id);
                    return (
                      <button key={g.id} type="button"
                        onClick={()=>{
                          const cur=form.gruppenIds||[];
                          const next=on?cur.filter(x=>x!==g.id):[...cur,g.id];
                          set('gruppenIds',next);
                          set('dienste',[]);
                        }}
                        className="px-2.5 py-1 rounded-full text-xs font-semibold transition-all border"
                        style={on?{background:g.farbe+'22',color:g.farbe,borderColor:g.farbe+'44'}:{background:'transparent',color:'#94a3b8',borderColor:'rgba(0,0,0,0.1)'}}>
                        {g.name}
                      </button>
                    );
                  })}
                  {ma.gruppen.length===0 && <span className="text-slate-400 text-xs italic">Noch keine Gruppen</span>}
                </div>
              </div>
              {(form.gruppenIds||[]).length>0 && (() => {
                const allDienste=[];const seen=new Set();
                (form.gruppenIds||[]).forEach(gid=>{
                  const grp=ma.gruppen.find(g=>g.id===gid);
                  (grp?.dienste||[]).forEach(d=>{ if(!seen.has(d.id)){seen.add(d.id);allDienste.push({...d,grp});} });
                });
                if(allDienste.length===0) return null;
                return (
                  <div>
                    <label className="text-slate-400 text-xs block mb-1.5">
                      Erlaubte Dienste <span className="text-slate-500 font-normal">(leer = keine)</span>
                    </label>
                    <div className="flex flex-wrap gap-1.5">
                      {allDienste.map(({id,name,grp}) => {
                        const on=(form.dienste||[]).includes(id);
                        return (
                          <button key={id} type="button"
                            onClick={()=>{ const cur=form.dienste||[]; set('dienste',on?cur.filter(x=>x!==id):[...cur,id]); }}
                            className="px-2.5 py-1 rounded-full text-xs font-semibold transition-all border"
                            style={on?{background:grp.farbe+'22',color:grp.farbe,borderColor:grp.farbe+'44'}:{background:'transparent',color:'#94a3b8',borderColor:'rgba(0,0,0,0.1)'}}>
                            {name}
                          </button>
                        );
                      })}
                    </div>
                    {(form.dienste||[]).length===0 && <p className="text-slate-400 text-xs mt-1">Kein Dienst ausgewählt</p>}
                  </div>
                );
              })()}
              <div>
                <label className="text-slate-400 text-xs block mb-2">Farbe</label>
                <ColorPicker value={form.farbe} onChange={c=>set('farbe',c)}/>
                <div className="mt-3 flex items-center gap-2">
                  <Avatar name={form.name||'?'} farbe={form.farbe} size={38}/>
                  <span className="text-slate-400 text-sm">{form.name||'Vorschau'}</span>
                </div>
              </div>

              {/* Login section */}
              <div className="pt-1 border-t border-black/8">
                <p className="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-3 flex items-center gap-1.5">
                  <SI p={IC.lock} size={10}/> Login-Zugang (optional)
                </p>
                <div className="space-y-3">
                  <div className="relative">
                    <input type="text" autoComplete="off" style={{WebkitTextSecurity:showPin?'none':'disc'}} value={form.pin}
                      onChange={e=>set('pin',e.target.value)}
                      placeholder="PIN setzen (leer = kein Login)"
                      className={"w-full pr-9 "+INP}/>
                    <button type="button" onClick={()=>setShowPin(p=>!p)}
                      className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition-all">
                      <SI p={IC.eye} size={14}/>
                    </button>
                  </div>
                  {form.pin.trim() && (<>
                    <div>
                      <label className="text-slate-400 text-xs block mb-1.5">Rolle</label>
                      <div className="flex gap-1.5">
                        {ROLE_OPTIONS.map(r=>(
                          <button key={r} type="button" onClick={()=>set('role',r)}
                            className={`flex-1 py-1.5 rounded-full text-xs font-semibold transition-all ${form.role===r?'bg-slate-900 text-white':'bg-black/5 text-slate-600 hover:bg-black/10'}`}>
                            {ROLE_LABELS[r]}
                          </button>
                        ))}
                      </div>
                    </div>
                    {(form.role==='editor'||form.role==='viewer') && (
                      <div className="space-y-2">
                        <label className="text-slate-400 text-xs block">Bereich-Zugang</label>
                        {PROFILES.map(pr => {
                          const acc=(form.areaAccess||{})[pr.id]??'none';
                          return (
                            <div key={pr.id}>
                              <div className="flex items-center gap-2">
                                <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:pr.color}}/>
                                <span className="text-slate-700 text-xs font-semibold">{pr.label}</span>
                                <div className="flex gap-1 flex-1">
                                  {[['none','Kein'],['view','Ansehen'],['edit','Bearbeiten']].map(([lvl,lbl])=>(
                                    <button key={lvl} type="button"
                                      onClick={()=>set('areaAccess',{...form.areaAccess,[pr.id]:lvl})}
                                      className={`flex-1 py-1 rounded-full text-xs font-semibold transition-all ${acc===lvl?'bg-slate-900 text-white':'bg-black/5 text-slate-500 hover:bg-black/10'}`}>
                                      {lbl}
                                    </button>
                                  ))}
                                </div>
                              </div>
                              {acc==='edit' && pr.id===profile && (ma?.gruppen||[]).length>0 && (
                                <div className="ml-5 mt-1.5 flex flex-wrap gap-1.5 items-center">
                                  <span className="text-slate-400 text-xs flex-shrink-0">Teams:</span>
                                  {(ma.gruppen||[]).map(g => {
                                    const selGrp=((form.areaGroups||{})[pr.id]||[]);
                                    const on=selGrp.includes(g.id);
                                    return (
                                      <button key={g.id} type="button"
                                        onClick={()=>{
                                          const cur=((form.areaGroups||{})[pr.id]||[]);
                                          const next=on?cur.filter(x=>x!==g.id):[...cur,g.id];
                                          set('areaGroups',{...form.areaGroups,[pr.id]:next});
                                        }}
                                        className="px-2 py-0.5 rounded-full text-xs font-semibold transition-all border"
                                        style={on?{background:g.farbe+'22',color:g.farbe,borderColor:g.farbe+'44'}:{background:'transparent',color:'#94a3b8',borderColor:'rgba(0,0,0,0.1)'}}>
                                        {g.name}
                                      </button>
                                    );
                                  })}
                                  <span className="text-slate-400 text-xs">({((form.areaGroups||{})[pr.id]||[]).length===0?'Alle':((form.areaGroups||{})[pr.id]||[]).length+' ausgewählt'})</span>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </>)}
                </div>
              </div>

              <div>
                <label className="text-slate-400 text-xs block mb-1.5">Notiz (intern)</label>
                <textarea value={form.notiz} onChange={e=>set('notiz',e.target.value)}
                  placeholder="z. B. nur Sonntags, Telefon: …"
                  rows={2} className={"w-full resize-none "+INP}/>
              </div>

              <div className="flex gap-2 pt-1">
                <button onClick={save} className="flex-1 bg-white hover:bg-gray-100 text-black font-bold py-2.5 text-sm transition-all rounded-full">Speichern</button>
                <button onClick={() => setModal(null)} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm transition-all rounded-full">Abbrechen</button>
              </div>
            </div>
        </Modal>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════════════════
// GRUPPEN VIEW
// ═══════════════════════════════════════════════════════════════════════════════
const GruppenView = ({ ma, onChange, onChangeShared, toast, allowedGroups }) => {
  const [modal,      setModal]      = useState(null);
  const [form,       setForm]       = useState({ name:'', farbe:'#6366f1' });
  const [newDienst,  setNewDienst]  = useState({});

  const openAdd  = () => { setForm({ name:'', farbe:MA_COLORS[ma.gruppen.length % MA_COLORS.length] }); setModal('add'); };
  const openEdit = g => { setForm({ name:g.name, farbe:g.farbe }); setModal({ mode:'edit', id:g.id }); };

  const saveGruppe = () => {
    if (!form.name.trim()) return;
    if (modal==='add') {
      onChange(m => ({ ...m, gruppen: [...m.gruppen, { id:genId(), name:form.name.trim(), farbe:form.farbe, dienste:[] }] }));
      toast('Gruppe erstellt');
    } else {
      onChange(m => ({ ...m, gruppen: m.gruppen.map(g => g.id===modal.id ? { ...g, name:form.name.trim(), farbe:form.farbe } : g) }));
      toast('Gruppe gespeichert');
    }
    setModal(null);
  };

  const delGruppe = g => {
    onChange(m => ({ ...m, gruppen: m.gruppen.filter(x=>x.id!==g.id) }));
    if (onChangeShared) onChangeShared(s => ({ ...s, personen: (s.personen||[]).map(p=>({...p,gruppenIds:(p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).filter(x=>x!==g.id)})) }));
    toast('Gruppe gelöscht', 'warn');
  };

  const addDienst = gid => {
    const name = (newDienst[gid]||'').trim();
    if (!name) return;
    onChange(m => ({ ...m, gruppen: m.gruppen.map(g => g.id===gid ? { ...g, dienste:[...(g.dienste||[]), { id:genId(), name }] } : g) }));
    setNewDienst(p=>({...p,[gid]:''}));
    toast('Dienst hinzugefügt');
  };

  const delDienst = (gid, did) => {
    onChange(m => ({ ...m, gruppen: m.gruppen.map(g => g.id===gid ? { ...g, dienste:(g.dienste||[]).filter(d=>d.id!==did) } : g) }));
  };

  return (
    <div className="space-y-5 up">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-xl font-bold grad">Gruppen &amp; Dienste</h1>
          <p className="text-slate-500 text-sm mt-0.5">{ma.gruppen.length} Gruppen</p>
        </div>
        {onChange && !allowedGroups && (
          <button onClick={openAdd} className="flex items-center gap-1.5 bg-white hover:bg-gray-100 text-black text-xs font-bold px-3.5 py-2 transition-all rounded-full">
            <SI p={IC.plus} size={13}/> Gruppe
          </button>
        )}
      </div>

      {ma.gruppen.length===0 ? (
        <div className="glass rounded-2xl py-16 text-center">
          <div className="text-slate-400 font-medium mb-1">Noch keine Gruppen</div>
          {onChange && <button onClick={openAdd} className="mt-2 text-slate-700 hover:text-slate-900 text-sm">Erste Gruppe erstellen</button>}
        </div>
      ) : (
        <div className="space-y-4">
          {ma.gruppen.map(g => {
            const members = ma.personen.filter(p=>(p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).includes(g.id));
            return (
              <div key={g.id} className="glass rounded-2xl p-4 glow">
                <div className="flex items-center gap-3 mb-3">
                  <span className="w-3 h-3 rounded-full flex-shrink-0" style={{background:g.farbe}}/>
                  <span className="font-semibold text-slate-800">{g.name}</span>
                  <span className="text-slate-600 text-xs">{members.length} Mitarbeiter · {(g.dienste||[]).length} Dienste</span>
                  {onChange && (!allowedGroups || allowedGroups.includes(g.id)) && (
                    <div className="ml-auto flex gap-1">
                      <button onClick={() => openEdit(g)} className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 hover:bg-blue-900/30 text-slate-500 hover:text-blue-400 transition-all"><SI p={IC.edit} size={12}/></button>
                      {!allowedGroups && <button onClick={() => delGruppe(g)} className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 hover:bg-red-900/25 text-slate-500 hover:text-red-400 transition-all"><SI p={IC.trash} size={12}/></button>}
                    </div>
                  )}
                </div>
                <div className="space-y-1.5 mb-3">
                  {(g.dienste||[]).map(d => (
                    <div key={d.id} className="flex items-center gap-2 px-3 py-1.5 rounded-full" style={{background:'rgba(0,0,0,0.03)',border:'1px solid rgba(0,0,0,0.07)'}}>
                      <span className="text-slate-700 text-sm flex-1">{d.name}</span>
                      {onChange && (!allowedGroups||allowedGroups.includes(g.id)) && <button onClick={() => delDienst(g.id,d.id)} className="text-slate-700 hover:text-red-400 transition-all"><SI p={IC.x} size={11}/></button>}
                    </div>
                  ))}
                </div>
                {onChange && (!allowedGroups||allowedGroups.includes(g.id)) && (
                <div className="flex gap-2">
                  <input value={newDienst[g.id]||''} onChange={e=>setNewDienst(p=>({...p,[g.id]:e.target.value}))}
                    placeholder="Neuer Dienst…" className={INP_SM+" flex-1"}
                    onKeyDown={e=>e.key==='Enter'&&addDienst(g.id)}/>
                  <button onClick={() => addDienst(g.id)} className="px-3 py-1.5 rounded-full bg-black/8 hover:bg-black/10 text-slate-800 text-xs font-semibold transition-all">+ Dienst</button>
                </div>
                )}
                {members.length>0 && (
                  <div className="flex flex-wrap gap-1 mt-3 pt-3" style={{borderTop:'1px solid rgba(0,0,0,0.06)'}}>
                    {members.map(p=><span key={p.id} className="pill" style={{background:p.farbe+'22',color:p.farbe}}>{p.name}</span>)}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {modal && (
        <Modal title={modal==='add'?'Gruppe erstellen':'Gruppe bearbeiten'} onClose={() => setModal(null)}>
          <div className="space-y-4">
            <div>
              <label className="text-slate-400 text-xs block mb-1.5">Name *</label>
              <input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}
                placeholder="Gruppenname" className={"w-full "+INP} autoFocus onKeyDown={e=>e.key==='Enter'&&saveGruppe()}/>
            </div>
            <div>
              <label className="text-slate-400 text-xs block mb-2">Farbe</label>
              <ColorPicker value={form.farbe} onChange={c=>setForm(p=>({...p,farbe:c}))}/>
            </div>
            <div className="flex gap-2 pt-1">
              <button onClick={saveGruppe} className="flex-1 bg-white hover:bg-gray-100 text-black font-bold py-2.5 text-sm rounded-full">Speichern</button>
              <button onClick={() => setModal(null)} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm rounded-full">Abbrechen</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════════════════
// VORLAGEN VIEW
// ═══════════════════════════════════════════════════════════════════════════════
const VorlagenView = ({ ma, onChange, toast }) => {
  const [modal,  setModal]  = useState(null);
  const [form,   setForm]   = useState({ name:'', art:'einzel', slots:[], tage:[{id:genId(),label:'Tag 1',slots:[]}] });
  const [selTag, setSelTag] = useState(0);

  const emptyForm = () => ({ name:'', art:'einzel', slots:[], tage:[{id:genId(),label:'Tag 1',slots:[]}] });
  const openAdd  = () => { setForm(emptyForm()); setSelTag(0); setModal('add'); };
  const openEdit = v => {
    setForm({ name:v.name, art:v.art||'einzel', slots:(v.slots||[]).map(s=>({...s})),
      tage:(v.tage||[{id:genId(),label:'Tag 1',slots:[]}]).map(t=>({...t,slots:(t.slots||[]).map(s=>({...s}))})) });
    setSelTag(0); setModal({ mode:'edit', id:v.id });
  };

  // ── Einzel slot helpers ──
  const mkSlot = () => { const g=ma.gruppen[0]; if(!g)return null; const d=(g.dienste||[])[0]; return {id:genId(),gruppeId:g.id,dienstId:d?.id||'',doppelt:false}; };
  const addSlot    = () => { const s=mkSlot(); if(s) setForm(f=>({...f,slots:[...f.slots,s]})); };
  const updSlot    = (sid,k,v) => setForm(f=>({...f,slots:f.slots.map(s=>s.id===sid?{...s,[k]:v}:s)}));
  const remSlot    = sid => setForm(f=>({...f,slots:f.slots.filter(s=>s.id!==sid)}));

  // ── Zeitraum tag/slot helpers ──
  const addTag     = () => { const idx=form.tage.length; setForm(f=>({...f,tage:[...f.tage,{id:genId(),label:`Tag ${idx+1}`,slots:[]}]})); setSelTag(idx); };
  const remTag     = i  => { setForm(f=>({...f,tage:f.tage.filter((_,j)=>j!==i)})); setSelTag(p=>Math.max(0,p-1)); };
  const updTagLabel= (i,lbl) => setForm(f=>({...f,tage:f.tage.map((t,j)=>j===i?{...t,label:lbl}:t)}));
  const addTagSlot = () => { const s=mkSlot(); if(!s)return; setForm(f=>({...f,tage:f.tage.map((t,i)=>i===selTag?{...t,slots:[...t.slots,s]}:t)})); };
  const updTagSlot = (sid,k,v) => setForm(f=>({...f,tage:f.tage.map((t,i)=>i===selTag?{...t,slots:t.slots.map(s=>s.id===sid?{...s,[k]:v}:s)}:t)}));
  const remTagSlot = sid => setForm(f=>({...f,tage:f.tage.map((t,i)=>i===selTag?{...t,slots:t.slots.filter(s=>s.id!==sid)}:t)}));

  const SlotRow = ({ s, onUpd, onRem }) => {
    const g = ma.gruppen.find(x=>x.id===s.gruppeId);
    return (
      <div className="flex gap-2 items-center">
        <select value={s.gruppeId} onChange={e=>{ const g2=ma.gruppen.find(x=>x.id===e.target.value); onUpd(s.id,'gruppeId',e.target.value); if(g2?.dienste?.[0])onUpd(s.id,'dienstId',g2.dienste[0].id); }} className={INP_SM+" flex-1"}>
          {ma.gruppen.map(g2=><option key={g2.id} value={g2.id}>{g2.name}</option>)}
        </select>
        <select value={s.dienstId} onChange={e=>onUpd(s.id,'dienstId',e.target.value)} className={INP_SM+" flex-1"}>
          <option value="">— Dienst —</option>
          {(g?.dienste||[]).map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
        </select>
        <button type="button" onClick={()=>onUpd(s.id,'doppelt',!s.doppelt)} className={`px-2 py-1.5 rounded-lg text-xs font-bold transition-all ${s.doppelt?'bg-amber-600/30 text-amber-400':'bg-black/5 text-slate-600'}`}>×2</button>
        <button type="button" onClick={()=>onRem(s.id)} className="text-slate-600 hover:text-red-400 transition-all"><SI p={IC.x} size={13}/></button>
      </div>
    );
  };

  const save = () => {
    if (!form.name.trim()) return;
    const data = form.art==='zeitraum'
      ? { name:form.name.trim(), art:'zeitraum', tage:form.tage, slots:[] }
      : { name:form.name.trim(), art:'einzel',   slots:form.slots, tage:[] };
    if (modal==='add') {
      onChange(m=>({ ...m, vorlagen:[...m.vorlagen,{id:genId(),...data}] }));
      toast('Vorlage erstellt');
    } else {
      onChange(m=>({ ...m, vorlagen:m.vorlagen.map(v=>v.id===modal.id?{...v,...data}:v) }));
      toast('Vorlage gespeichert');
    }
    setModal(null);
  };

  const del = v => { onChange(m=>({ ...m, vorlagen:m.vorlagen.filter(x=>x.id!==v.id) })); toast('Vorlage gelöscht','warn'); };

  return (
    <div className="space-y-5 up">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-xl font-bold grad">Vorlagen</h1>
          <p className="text-slate-500 text-sm mt-0.5">Einzel- und Zeitraum-Vorlagen</p>
        </div>
        {onChange && (
          <button onClick={openAdd} disabled={ma.gruppen.length===0}
            className="flex items-center gap-1.5 bg-white hover:bg-gray-100 disabled:opacity-40 text-black text-xs font-bold px-3.5 py-2 transition-all rounded-full">
            <SI p={IC.plus} size={13}/> Vorlage
          </button>
        )}
      </div>

      {ma.gruppen.length===0 && <div className="glass rounded-2xl p-4 text-slate-500 text-sm text-center">Erstelle zuerst <strong className="text-slate-400">Gruppen &amp; Dienste</strong>.</div>}
      {ma.vorlagen.length===0 && ma.gruppen.length>0 && (
        <div className="glass rounded-2xl py-16 text-center">
          <div className="text-slate-400 font-medium mb-1">Noch keine Vorlagen</div>
          {onChange && <button onClick={openAdd} className="mt-2 text-slate-700 hover:text-slate-900 text-sm">Vorlage erstellen</button>}
        </div>
      )}

      <div className="space-y-3">
        {ma.vorlagen.map(v => {
          const isZr = v.art==='zeitraum';
          return (
            <div key={v.id} className="glass rounded-2xl p-4 glow">
              <div className="flex items-center gap-2 mb-2">
                <span className="font-semibold text-slate-800">{v.name}</span>
                {isZr
                  ? <span className="pill text-xs" style={{background:'rgba(99,102,241,0.15)',color:'#818cf8'}}>📅 {(v.tage||[]).length} Tage</span>
                  : <span className="text-slate-500 text-xs">{(v.slots||[]).length} Slots</span>}
                {onChange && <div className="ml-auto flex gap-1">
                  <button onClick={()=>openEdit(v)} className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 hover:bg-blue-900/30 text-slate-500 hover:text-blue-400 transition-all"><SI p={IC.edit} size={12}/></button>
                  <button onClick={()=>del(v)} className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 hover:bg-red-900/25 text-slate-500 hover:text-red-400 transition-all"><SI p={IC.trash} size={12}/></button>
                </div>}
              </div>
              {isZr ? (
                <div className="space-y-1">
                  {(v.tage||[]).map(tag=>(
                    <div key={tag.id} className="flex gap-2 items-start">
                      <span className="text-slate-500 text-xs w-12 pt-0.5 flex-shrink-0">{tag.label}</span>
                      <div className="flex flex-wrap gap-1">{(tag.slots||[]).map(s=>{ const g=ma.gruppen.find(x=>x.id===s.gruppeId);const d=(g?.dienste||[]).find(x=>x.id===s.dienstId);return <span key={s.id} className="pill" style={{background:(g?.farbe||'#8b5cf6')+'22',color:g?.farbe||'#8b5cf6'}}>{d?.name||'?'}{s.doppelt?' ×2':''}</span>;})}</div>
                    </div>
                  ))}
                </div>
              ) : (
                <div className="flex flex-wrap gap-1.5">
                  {(v.slots||[]).map(s=>{ const g=ma.gruppen.find(x=>x.id===s.gruppeId);const d=(g?.dienste||[]).find(x=>x.id===s.dienstId);return <span key={s.id} className="pill" style={{background:(g?.farbe||'#8b5cf6')+'22',color:g?.farbe||'#8b5cf6'}}>{d?.name||'?'}{s.doppelt?' ×2':''}</span>; })}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {modal && (
        <Modal title={modal==='add'?'Vorlage erstellen':'Vorlage bearbeiten'} onClose={()=>setModal(null)} wide>
          <div className="space-y-4">
            <div>
              <label className="text-slate-400 text-xs block mb-1.5">Name *</label>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}
                placeholder="z. B. Sonntagsgottesdienst" className={"w-full "+INP} autoFocus/>
            </div>

            {/* Art toggle */}
            <div>
              <label className="text-slate-400 text-xs block mb-1.5">Art</label>
              <div className="flex gap-1.5">
                {[['einzel','Einzel-Tag'],['zeitraum','Zeitraum / Mehrtägig']].map(([a,l])=>(
                  <button key={a} type="button" onClick={()=>setForm(f=>({...f,art:a}))}
                    className={`flex-1 py-1.5 rounded-full text-xs font-semibold transition-all ${form.art===a?'bg-slate-900 text-white':'bg-black/5 text-slate-600 hover:bg-black/10'}`}>
                    {l}
                  </button>
                ))}
              </div>
            </div>

            {/* Einzel slots */}
            {form.art==='einzel' && (
              <div>
                <label className="text-slate-400 text-xs block mb-2">Slots</label>
                <div className="space-y-2">
                  {form.slots.map(s=><SlotRow key={s.id} s={s} onUpd={updSlot} onRem={remSlot}/>)}
                </div>
                <button onClick={addSlot} disabled={ma.gruppen.length===0} className="mt-2 flex items-center gap-1 text-slate-700 hover:text-slate-900 text-xs transition-all">
                  <SI p={IC.plus} size={12}/> Slot hinzufügen
                </button>
              </div>
            )}

            {/* Zeitraum tage */}
            {form.art==='zeitraum' && (
              <div>
                <label className="text-slate-400 text-xs block mb-2">Tage</label>
                {/* Tab bar */}
                <div className="flex gap-1 flex-wrap mb-3">
                  {form.tage.map((tag,i)=>(
                    <button key={tag.id} type="button" onClick={()=>setSelTag(i)}
                      className={`px-2.5 py-1 rounded-full text-xs font-semibold transition-all ${selTag===i?'bg-slate-900 text-white':'bg-black/5 text-slate-600 hover:bg-black/10'}`}>
                      {tag.label}
                    </button>
                  ))}
                  <button type="button" onClick={addTag} className="px-2.5 py-1 rounded-full text-xs font-semibold bg-black/5 text-slate-500 hover:text-slate-700 transition-all">
                    <SI p={IC.plus} size={11}/>
                  </button>
                </div>
                {/* Selected tag editor */}
                {form.tage[selTag] && (
                  <div className="space-y-2 pl-1 border-l-2" style={{borderColor:'rgba(99,102,241,0.3)'}}>
                    <div className="flex gap-2 items-center">
                      <input value={form.tage[selTag].label} onChange={e=>updTagLabel(selTag,e.target.value)}
                        className={INP_SM+" flex-1"} placeholder="Tag-Bezeichnung"/>
                      {form.tage.length>1 && <button type="button" onClick={()=>remTag(selTag)} className="text-slate-500 hover:text-red-400 transition-all"><SI p={IC.trash} size={12}/></button>}
                    </div>
                    <div className="space-y-2">
                      {(form.tage[selTag].slots||[]).map(s=><SlotRow key={s.id} s={s} onUpd={updTagSlot} onRem={remTagSlot}/>)}
                    </div>
                    <button onClick={addTagSlot} disabled={ma.gruppen.length===0} className="flex items-center gap-1 text-slate-700 hover:text-slate-900 text-xs transition-all">
                      <SI p={IC.plus} size={12}/> Slot hinzufügen
                    </button>
                  </div>
                )}
              </div>
            )}

            <div className="flex gap-2 pt-1">
              <button onClick={save} className="flex-1 bg-white hover:bg-gray-100 text-black font-bold py-2.5 text-sm rounded-full">Speichern</button>
              <button onClick={()=>setModal(null)} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm rounded-full">Abbrechen</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

// DIENSTPLAN VIEW
