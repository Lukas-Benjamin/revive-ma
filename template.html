// EINSTELLUNGEN VIEW
// ═══════════════════════════════════════════════════════════════════════════════
const EinstellungenView = ({ ma, onChange, onChangeShared, toast, profile, profiles, setProfiles, isAdmin }) => {
  const [pin,    setPin]    = useState('');
  const [pin2,   setPin2]   = useState('');
  const [showPw, setShowPw] = useState(false);

  // Bereiche-State (admin only)
  const [bName,      setBName]    = useState('');
  const [bColor,     setBColor]   = useState('#06b6d4');
  const [bEditId,    setBEditId]  = useState(null);
  const [bEditName,  setBEditName]= useState('');
  const [bEditColor, setBEditColor]= useState('');
  const saveProfiles = newProfiles => {
    if (setProfiles) { setProfiles(newProfiles); PROFILES = newProfiles; }
    db.collection('config').doc('profiles').set({ data: newProfiles }).catch(()=>{});
  };
  const addBereich = () => {
    if (!bName.trim() || !profiles) return;
    const id = bName.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'') + '-' + Math.random().toString(36).slice(2,5);
    saveProfiles([...profiles, { id, label: bName.trim(), color: bColor, grad: `linear-gradient(135deg,${bColor},#000000)` }]);
    setBName(''); setBColor('#06b6d4');
    toast('Bereich hinzugefügt ✓');
  };
  const saveBereich = id => {
    if (!profiles) return;
    saveProfiles(profiles.map(p => p.id===id ? { ...p, label: bEditName, color: bEditColor, grad: `linear-gradient(135deg,${bEditColor},#000000)` } : p));
    setBEditId(null); toast('Bereich gespeichert ✓');
  };
  const removeBereich = id => {
    if (!profiles) return;
    const pr = profiles.find(p=>p.id===id);
    if (!confirm(`Bereich "${pr?.label}" wirklich löschen?\n\nAlle Einträge bleiben erhalten, sind aber nicht mehr sichtbar.`)) return;
    saveProfiles(profiles.filter(p => p.id !== id));
    toast('Bereich gelöscht', 'warn');
  };

  const savePin = async () => {
    if (!pin) { toast('Bitte PIN eingeben','error'); return; }
    if (pin !== pin2) { toast('PINs stimmen nicht überein','error'); return; }
    try {
      await db.collection('config').doc('auth').set({ adminPin:pin }, { merge:true });
      toast('PIN gespeichert ✓');
      setPin(''); setPin2('');
    } catch { toast('Fehler beim Speichern','error'); }
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(ma, null, 2)], { type:'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `ma-${profile}-${today()}.json`;
    a.click();
    toast('Export heruntergeladen');
  };

  const importJSON = e => {
    const f = e.target.files?.[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (!d.gruppen) throw new Error();
        onChange({ gruppen:d.gruppen||[], vorlagen:d.vorlagen||[], schichten:d.schichten||[] });
        if (onChangeShared && (d.personen||d.konflikte||d.praeferenzen))
          onChangeShared({ personen:d.personen||[], konflikte:d.konflikte||[], praeferenzen:d.praeferenzen||[] });
        toast('Daten importiert ✓');
      } catch { toast('Ungültige JSON-Datei','error'); }
    };
    r.readAsText(f); e.target.value='';
  };

  const resetAll = () => {
    if (!confirm('Alle Mitarbeiterdaten wirklich zurücksetzen?\n\nDies kann nicht rückgängig gemacht werden.')) return;
    onChange(DEFAULT_MA());
    if (onChangeShared) onChangeShared(DEFAULT_SHARED());
    toast('Zurückgesetzt','warn');
  };

  return (
    <div className="space-y-5 up max-w-xl">
      <div>
        <h1 className="text-xl font-bold grad">Einstellungen</h1>
        <p className="text-slate-500 text-sm mt-0.5">App-Konfiguration & Datenverwaltung</p>
      </div>

      {/* PIN */}
      <div className="glass rounded-2xl p-5 glow space-y-3">
        <p className="text-slate-500 text-xs font-semibold uppercase tracking-wider flex items-center gap-1.5"><SI p={IC.lock} size={11}/> Admin-PIN ändern</p>
        <div className="relative">
          <input type="text" autoComplete="off" style={{WebkitTextSecurity:showPw?'none':'disc'}} value={pin} onChange={e=>setPin(e.target.value)}
            placeholder="Neuer PIN" className={"w-full pr-10 "+INP}/>
          <button type="button" onClick={() => setShowPw(p=>!p)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-700">
            <SI p={showPw?IC.eyeOff:IC.eye} size={14}/>
          </button>
        </div>
        <input type="text" autoComplete="off" style={{WebkitTextSecurity:showPw?'none':'disc'}} value={pin2} onChange={e=>setPin2(e.target.value)}
          placeholder="PIN bestätigen" className={"w-full "+INP}
          onKeyDown={e=>e.key==='Enter'&&savePin()}/>
        <button onClick={savePin} className="w-full py-2.5 bg-white hover:bg-gray-100 text-black text-sm font-bold transition-all" style={{borderRadius:30}}>PIN speichern</button>
      </div>

      {/* Backup */}
      <div className="glass rounded-2xl p-5 glow space-y-3">
        <p className="text-slate-500 text-xs font-semibold uppercase tracking-wider">Datensicherung</p>
        <div className="flex gap-2">
          <button onClick={exportJSON} className="flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-xl bg-black/5 hover:bg-black/5 text-slate-700 text-sm font-semibold transition-all border border-black/10">
            <SI p={IC.download} size={13}/> Exportieren
          </button>
          <label className="flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-xl bg-black/5 hover:bg-black/5 text-slate-700 text-sm font-semibold transition-all border border-black/10 cursor-pointer">
            <SI p={IC.upload} size={13}/> Importieren
            <input type="file" accept=".json" onChange={importJSON} className="hidden"/>
          </label>
        </div>
      </div>

      {/* Stats */}
      <div className="glass rounded-2xl p-5">
        <p className="text-slate-500 text-xs font-semibold uppercase tracking-wider mb-3">Datenübersicht</p>
        {[['Personen',ma.personen.length],['Gruppen',ma.gruppen.length],['Vorlagen',ma.vorlagen.length],['Schichten',ma.schichten.length]].map(([k,v])=>(
          <div key={k} className="flex items-center justify-between py-2" style={{borderBottom:'1px solid rgba(0,0,0,0.06)'}}>
            <span className="text-slate-400 text-sm">{k}</span>
            <span className="font-bold text-slate-900">{v}</span>
          </div>
        ))}
      </div>

      {/* Bereiche (admin only) */}
      {isAdmin && profiles && setProfiles && (
        <>
          <div className="glass rounded-2xl p-5 glow space-y-3">
            <p className="text-slate-500 text-xs font-semibold uppercase tracking-wider">Bereiche verwalten</p>
            <p className="text-slate-500 text-xs">Standorte/Bereiche hinzufügen, umbenennen oder entfernen. Der Tab "Gesamt" ist immer vorhanden.</p>
            <div className="flex gap-2">
              <input value={bName} onChange={e => setBName(e.target.value)} placeholder="Name des neuen Bereichs"
                className={"flex-1 "+INP} onKeyDown={e => e.key === 'Enter' && addBereich()}/>
              <button onClick={addBereich} className="bg-white hover:bg-gray-100 text-black px-4 py-2.5 text-sm font-bold transition-all whitespace-nowrap" style={{borderRadius:30}}>Hinzufügen</button>
            </div>
            <ColorPicker value={bColor} onChange={setBColor}/>
          </div>
          <div className="glass rounded-2xl p-5 glow space-y-2">
            <p className="text-slate-500 text-xs font-semibold uppercase tracking-wider mb-3">Vorhandene Bereiche</p>
            {profiles.map(pr => (
              <div key={pr.id} className="p-3 rounded-xl bg-black/[0.03] border border-black/8">
                {bEditId === pr.id ? (
                  <div className="space-y-3">
                    <div className="flex gap-2 items-center">
                      <input value={bEditName} onChange={e => setBEditName(e.target.value)}
                        className={"flex-1 "+INP_SM} autoFocus onKeyDown={e => e.key === 'Enter' && saveBereich(pr.id)}/>
                      <button onClick={() => saveBereich(pr.id)} className="w-7 h-7 flex items-center justify-center rounded-lg bg-emerald-900/40 text-emerald-400 hover:bg-emerald-900/60 transition-all"><SI p={IC.check} size={13}/></button>
                      <button onClick={() => setBEditId(null)} className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 text-slate-500 transition-all"><SI p={IC.x} size={13}/></button>
                    </div>
                    <ColorPicker value={bEditColor} onChange={setBEditColor}/>
                  </div>
                ) : (
                  <div className="flex items-center gap-3">
                    <span className="dot" style={{ width: 12, height: 12, borderRadius: 3, background: pr.color, flexShrink: 0 }}/>
                    <div className="flex-1 min-w-0">
                      <span className="text-slate-800 text-sm font-medium">{pr.label}</span>
                      <span className="text-slate-500 text-xs ml-2">id: {pr.id}</span>
                    </div>
                    <button onClick={() => { setBEditId(pr.id); setBEditName(pr.label); setBEditColor(pr.color); }}
                      className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 hover:bg-blue-900/30 text-slate-500 hover:text-blue-400 transition-all"><SI p={IC.edit} size={13}/></button>
                    <button onClick={() => removeBereich(pr.id)}
                      className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 hover:bg-red-900/25 text-slate-500 hover:text-red-400 transition-all"><SI p={IC.trash} size={13}/></button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </>
      )}

      {/* Danger Zone */}
      <div className="glass rounded-2xl p-5" style={{borderColor:'rgba(239,68,68,0.2)'}}>
        <p className="text-slate-500 text-xs font-semibold uppercase tracking-wider mb-3 text-red-500/70">Gefahrenzone</p>
        <button onClick={resetAll} className="w-full py-2.5 rounded-xl text-red-400 text-sm font-semibold transition-all" style={{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.2)'}}>
          Alle Daten zurücksetzen
        </button>
      </div>
    </div>
  );
};

// ─── ProfilesView ─────────────────────────────────────────────────────────────
const INP_P = "w-full bg-black/5 border border-black/10 rounded-xl px-3 py-2.5 text-sm text-slate-900 placeholder-slate-400 transition-all";

const ProfilesView = ({ currentUser, onUpdateUser, ma, currentProfile }) => {
  const [users, setUsers]      = useState([]);
  const [modal, setModal]      = useState(null);
  const [form, setForm]        = useState({name:'',pin:'',role:'viewer',permissions:{},areaAccess:{},areaGroups:{}});
  const [showFPin,setShowFPin] = useState(false);
  const [myPin, setMyPin]      = useState('');
  const [showMP, setShowMP]    = useState(false);
  const [pinOK, setPinOK]      = useState(false);
  const can = perms(currentUser);

  useEffect(() => {
    const unsub = db.collection('k21-users').onSnapshot(
      snap => setUsers(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.name.localeCompare(b.name))),
      ()=>{}
    );
    return ()=>unsub();
  }, []);

  const save = async () => {
    const data = {name:form.name.trim(),pin:form.pin,role:form.role,permissions:form.permissions||{},areaAccess:form.areaAccess||{},areaGroups:form.areaGroups||{}};
    if (!data.name||!data.pin) return;
    try {
      if (modal==='add') {
        await fetch('/api/users?c=k21-users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
      } else {
        await fetch(`/api/users/${modal.user.id}?c=k21-users`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
      }
    } catch {}
    // Firestore fallback / realtime sync
    if (modal==='add') db.collection('k21-users').add({...data,createdAt:new Date().toISOString()}).catch(()=>{});
    else db.collection('k21-users').doc(modal.user.id).update(data).catch(()=>{});
    setModal(null);
  };

  const del = async u => {
    if (!confirm(`${u.name} wirklich löschen?`)) return;
    await fetch(`/api/users/${u.id}?c=k21-users`,{method:'DELETE'}).catch(()=>{});
    db.collection('k21-users').doc(u.id).delete().catch(()=>{});
  };

  const changeMyPin = async () => {
    if (!myPin.trim()) return;
    if (currentUser?.role === 'owner') {
      await fetch('/api/admin-pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:myPin.trim()})}).catch(()=>{});
    } else {
      await fetch(`/api/users/${currentUser.id}?c=k21-users`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:myPin.trim()})}).catch(()=>{});
      db.collection('k21-users').doc(currentUser.id).update({pin:myPin}).catch(()=>{});
    }
    onUpdateUser({...currentUser});
    setMyPin(''); setPinOK(true); setTimeout(()=>setPinOK(false),2500);
  };

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between">
        <div>
          <h2 className="grad text-xl">Profile</h2>
          <p className="text-slate-500 text-sm mt-0.5">Zugänge &amp; Berechtigungen</p>
        </div>
        {can.profiles && (
          <button onClick={()=>{setForm({name:'',pin:'',role:'viewer',permissions:{},areaAccess:{},areaGroups:{}});setModal('add');}}
            className="flex items-center gap-1.5 text-white text-xs font-bold px-3.5 py-2 transition-all"
            style={{background:'#000000',borderRadius:30}}>
            <SI p={IC.plus} size={13}/> Profil
          </button>
        )}
      </div>

      {/* My PIN */}
      <div className="glass rounded-2xl p-5">
        <p className="text-slate-500 text-xs font-semibold uppercase tracking-wider mb-3">Mein PIN ändern</p>
        <div className="flex gap-2">
          <div className="relative flex-1">
            <input type="text" autoComplete="off" style={{WebkitTextSecurity:showMP?'none':'disc'}} value={myPin} onChange={e=>setMyPin(e.target.value)}
              placeholder="Neuer PIN" className={INP_P+" pr-9"} onKeyDown={e=>e.key==='Enter'&&changeMyPin()}/>
            <button type="button" onClick={()=>setShowMP(p=>!p)}
              className="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition-all">
              <SI p={IC.eye} size={14}/>
            </button>
          </div>
          <button onClick={changeMyPin} disabled={!myPin.trim()}
            className="px-4 py-2.5 text-sm font-bold text-white disabled:opacity-40 transition-all"
            style={{background:'#000000',borderRadius:12}}>
            {pinOK?'✓':'Speichern'}
          </button>
        </div>
        {currentUser?.role==='owner' && <p className="text-xs text-slate-400 mt-2">Admin-PIN ist fest eingestellt.</p>}
      </div>

      {/* Info hint */}
      <div className="glass rounded-2xl px-4 py-3 flex items-start gap-2.5" style={{borderColor:'rgba(16,185,129,0.2)',background:'rgba(16,185,129,0.04)'}}>
        <SI p={IC.lock} size={13} stroke={2} className="text-emerald-500 mt-0.5 flex-shrink-0" style={{color:'#10b981',marginTop:2}}/>
        <p className="text-slate-600 text-xs leading-relaxed">
          Login-Profile werden auch unter <strong>Personen</strong> verwaltet — dort PIN setzen oder ändern.
          Wer einen PIN hat, kann sich in <em>beiden Apps</em> einloggen.
        </p>
      </div>

      {/* Owner card */}
      <div className="glass rounded-2xl p-4 flex items-center gap-3">
        <div className="w-9 h-9 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-bold text-white" style={{background:'#000000'}}>LR</div>
        <div className="flex-1 min-w-0">
          <div className="font-semibold text-slate-900 text-sm">Lukas Reuter</div>
          <div className="text-slate-500 text-xs">Admin · Alle Rechte</div>
        </div>
        <span className="pill text-xs font-semibold" style={{background:'rgba(0,0,0,0.08)',color:'#000000'}}>Admin</span>
      </div>

      {/* Firebase users */}
      {users.map(u => {
        const inSchedule = ma?.personen?.some(p => p.name.toLowerCase()===u.name.toLowerCase());
        const isAdminRole = u.role==='owner'||u.role==='admin';
        return (
        <div key={u.id} className="glass rounded-2xl p-4 flex items-center gap-3">
          <div className="w-9 h-9 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-bold text-white" style={{background:'#4f46e5'}}>{initials(u.name)}</div>
          <div className="flex-1 min-w-0">
            <div className="font-semibold text-slate-900 text-sm truncate">{u.name}</div>
            <div className="flex flex-wrap items-center gap-1.5 mt-0.5">
              <span className="text-slate-500 text-xs">{ROLE_LABELS[u.role]||'Betrachter'}</span>
              {inSchedule && <span className="text-emerald-500 text-xs">· im Dienstplan</span>}
              {!isAdminRole && (() => {
                const aa = u.areaAccess||{};
                const hasAA = Object.keys(aa).length>0;
                if (!hasAA && !(u.areas||[]).length) return <span className="text-slate-400 text-xs">· alle Bereiche</span>;
                return PROFILES.map(pr => {
                  const lvl = getAreaAccess(u, pr.id);
                  if (lvl==='none') return null;
                  const grpIds = (u.areaGroups||{})[pr.id]||[];
                  const grpInfo = grpIds.length>0 ? ` (${grpIds.length} Teams)` : '';
                  return <span key={pr.id} className="pill text-xs" style={{background:pr.color+'22',color:pr.color,border:`1px solid ${pr.color}44`}}>{pr.label} {lvl==='view'?'👁':'✏️'}{grpInfo}</span>;
                });
              })()}
            </div>
          </div>
          {can.profiles && <>
            <button onClick={()=>{
              const migratedAA = u.areaAccess || (() => {
                const old = u.areas||[];
                const def = u.role==='editor'?'edit':'view';
                if(!old.length) return Object.fromEntries(PROFILES.map(p=>[p.id,def]));
                return Object.fromEntries(PROFILES.map(p=>[p.id,old.includes(p.id)?def:'none']));
              })();
              setForm({name:u.name,pin:u.pin||'',role:u.role||'viewer',permissions:u.permissions||{},areaAccess:migratedAA,areaGroups:u.areaGroups||{}});setModal({mode:'edit',user:u});}}
              className="w-8 h-8 flex items-center justify-center rounded-lg bg-black/5 hover:bg-blue-50 text-slate-500 hover:text-blue-600 transition-all">
              <SI p={IC.edit} size={13}/>
            </button>
            <button onClick={()=>del(u)}
              className="w-8 h-8 flex items-center justify-center rounded-lg bg-black/5 hover:bg-red-50 text-slate-500 hover:text-red-500 transition-all">
              <SI p={IC.trash} size={13}/>
            </button>
          </>}
        </div>
        );
      })}
      {users.length===0 && (
        <div className="glass rounded-2xl p-5 text-center text-slate-400 text-sm">
          {can.profiles ? 'Noch keine Profile — erstelle das erste oben.' : 'Kontaktiere einen Admin für Zugang.'}
        </div>
      )}

      {modal && (
        <Modal title={modal==='add'?'Profil erstellen':'Profil bearbeiten'} onClose={()=>setModal(null)}>
          <div className="space-y-3">
            <div>
              <label className="text-slate-500 text-xs block mb-1.5">Name *</label>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}
                placeholder="Vollständiger Name" className={INP_P} autoFocus/>
            </div>
            <div>
              <label className="text-slate-500 text-xs block mb-1.5">PIN / Passwort *</label>
              <div className="relative">
                <input type="text" autoComplete="off" style={{WebkitTextSecurity:showFPin?'none':'disc'}} value={form.pin}
                  onChange={e=>setForm(f=>({...f,pin:e.target.value}))}
                  placeholder="PIN setzen" className={INP_P+" pr-9"}/>
                <button type="button" onClick={()=>setShowFPin(p=>!p)}
                  className="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition-all">
                  <SI p={IC.eye} size={14}/>
                </button>
              </div>
            </div>
            <div>
              <label className="text-slate-500 text-xs block mb-1.5">Rolle</label>
              <div className="flex gap-1.5">
                {ROLE_OPTIONS.map(r=>(
                  <button key={r} onClick={()=>setForm(f=>({...f,role:r,permissions:{}}))}
                    className={`flex-1 py-1.5 rounded-lg text-xs font-semibold transition-all ${form.role===r?'bg-slate-900 text-white':'bg-black/5 text-slate-600 hover:bg-black/8'}`}>
                    {ROLE_LABELS[r]}
                  </button>
                ))}
              </div>
            </div>
            {/* Area access — for non-admins */}
            {(form.role==='editor'||form.role==='viewer') && (
              <div className="pt-1">
                <label className="text-slate-500 text-xs block mb-2">Bereichs-Zugang</label>
                <div className="space-y-2">
                  {[...PROFILES, { id:'__gesamt__', label:'Gesamt (Übersicht)', color:'#000000' }].map(pr => {
                    const acc = (form.areaAccess||{})[pr.id]??'none';
                    return (
                      <div key={pr.id}>
                        <div className="flex items-center gap-2">
                          <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:pr.color}}/>
                          <span className="text-slate-700 text-xs font-semibold w-24 flex-shrink-0">{pr.label}</span>
                          <div className="flex gap-1 flex-1">
                            {[['none','Kein'],['view','Ansehen'],['edit','Bearbeiten']].map(([lvl,lbl])=>(
                              <button key={lvl} type="button"
                                onClick={()=>setForm(f=>({...f,areaAccess:{...f.areaAccess,[pr.id]:lvl}}))}
                                className={`flex-1 py-1 rounded-lg text-xs font-semibold transition-all ${acc===lvl?'bg-slate-900 text-white':'bg-black/5 text-slate-500 hover:bg-black/8'}`}>
                                {lbl}
                              </button>
                            ))}
                          </div>
                        </div>
                        {pr.id===currentProfile && acc!=='none' && pr.id!=='__gesamt__' && (ma?.gruppen||[]).length>0 && (
                          <div className="ml-5 mt-1.5 flex flex-wrap gap-1.5 items-center">
                            <span className="text-slate-400 text-xs flex-shrink-0">Teams:</span>
                            {(ma.gruppen||[]).map(g => {
                              const selGrp = ((form.areaGroups||{})[pr.id]||[]);
                              const on = selGrp.includes(g.id);
                              return (
                                <button key={g.id} type="button"
                                  onClick={()=>{
                                    const cur = ((form.areaGroups||{})[pr.id]||[]);
                                    const next = on?cur.filter(x=>x!==g.id):[...cur,g.id];
                                    setForm(f=>({...f,areaGroups:{...f.areaGroups,[pr.id]:next}}));
                                  }}
                                  className="px-2 py-0.5 rounded-lg text-xs font-semibold transition-all border"
                                  style={on?{background:g.farbe+'22',color:g.farbe,borderColor:g.farbe+'44'}:{background:'transparent',color:'#94a3b8',borderColor:'rgba(0,0,0,0.1)'}}>
                                  {g.name}
                                </button>
                              );
                            })}
                            <span className="text-slate-400 text-xs">({((form.areaGroups||{})[pr.id]||[]).length===0?'Alle':((form.areaGroups||{})[pr.id]||[]).length+' ausgewählt'})</span>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {form.role==='viewer' && (
              <div className="pt-1 space-y-2">
                <label className="text-slate-500 text-xs block">Zusätzliche Rechte</label>
                {[['edit','Daten bearbeiten'],['del','Daten löschen'],['settings','Einstellungen sehen']].map(([k,l])=>(
                  <label key={k} className="flex items-center gap-2.5 cursor-pointer py-0.5">
                    <input type="checkbox" checked={!!form.permissions[k]}
                      onChange={e=>setForm(f=>({...f,permissions:{...f.permissions,[k]:e.target.checked}}))}/>
                    <span className="text-slate-700 text-sm">{l}</span>
                  </label>
                ))}
              </div>
            )}
            <div className="flex gap-2 pt-2">
              <button onClick={()=>setModal(null)}
                className="flex-1 py-2.5 text-sm text-slate-600 font-medium rounded-xl transition-all"
                style={{background:'rgba(0,0,0,0.05)'}}>Abbrechen</button>
              <button onClick={save} disabled={!form.name.trim()||!form.pin}
                className="flex-1 py-2.5 text-sm font-bold text-white rounded-xl disabled:opacity-40 transition-all"
                style={{background:'#000000'}}>Speichern</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

// LOGIN
// ═══════════════════════════════════════════════════════════════════════════════
const LoginScreen = ({ onLogin, ownerPin }) => {
  const [name,     setName]    = useState('');
  const [pin,      setPin]     = useState('');
  const [showPin,  setShowPin] = useState(false);
  const [err,      setErr]     = useState('');
  const [users,    setUsers]   = useState([]);
  const [ready,    setReady]   = useState(false);
  const [dropOpen, setDropOpen]= useState(false);

  useEffect(() => {
    let cancelled = false;
    const load = async () => {
      try {
        const r = await fetch('/api/users?c=k21-users');
        if (!r.ok) throw new Error('server');
        const data = await r.json();
        if (!cancelled) { setUsers(data); setReady(true); return; }
      } catch {}
      // Fallback: direct Firestore
      const unsub = db.collection('k21-users').onSnapshot(
        snap => { if (!cancelled) { setUsers(snap.docs.map(d=>({id:d.id,...d.data()}))); setReady(true); } },
        () => { if (!cancelled) setReady(true); }
      );
      return () => unsub();
    };
    load();
    return () => { cancelled = true; };
  }, []);

  const allNames = [OWNER_NAME, ...users.map(u=>u.name)];
  const filtered = name.trim() ? allNames.filter(n=>n.toLowerCase().includes(name.toLowerCase())) : allNames;

  const tryLogin = () => {
    const n = name.trim();
    if (!n||!pin) { setErr('Bitte Name und PIN eingeben'); return; }
    if (n.toLowerCase()===OWNER_NAME.toLowerCase()&&pin===(ownerPin||OWNER_PIN)) {
      onLogin({id:'owner',name:OWNER_NAME,role:'owner',permissions:{edit:true,del:true,settings:true,profiles:true}});
      return;
    }
    const u = users.find(x=>x.name.toLowerCase()===n.toLowerCase());
    if (u&&String(u.pin)===String(pin)) {
      onLogin({id:u.id,name:u.name,role:u.role||'viewer',permissions:perms(u),areaAccess:u.areaAccess||{},areaGroups:u.areaGroups||{},areas:u.areas||[]});
    } else {
      setErr('Name oder PIN nicht korrekt');
    }
  };

  const INP_L = "w-full bg-black/5 border border-black/10 rounded-xl px-4 py-3 text-slate-900 placeholder-slate-400 text-sm transition-all";

  return (
    <div className="min-h-screen flex items-center justify-center px-4" style={{background:'#f8fafc'}}>
      <div className="w-full max-w-xs up">
        <div className="text-center mb-8">
          <img src="/logo.png" style={{width:80,height:80,margin:'0 auto 16px',display:'block',objectFit:'contain',mixBlendMode:'multiply'}} alt="K21"/>
          <h1 style={{fontFamily:'Gotham,sans-serif',fontWeight:900,fontSize:28,color:'#000000',letterSpacing:'-0.04em',margin:0,lineHeight:1}}>Mitarbeiter</h1>
        </div>

        <div className="glass rounded-2xl glow" style={{overflow:'visible'}}>
          <div className="p-5 space-y-3">
            <div className="relative">
              <input value={name} onChange={e=>{setName(e.target.value);setErr('');setDropOpen(true);}}
                onFocus={()=>setDropOpen(true)} onBlur={()=>setTimeout(()=>setDropOpen(false),150)}
                placeholder="Dein Name" className={INP_L} autoComplete="off" autoFocus/>
              {dropOpen&&filtered.length>0&&(
                <div className="absolute top-full mt-1 left-0 right-0 glass rounded-xl z-20 glow overflow-hidden">
                  {filtered.slice(0,6).map(n=>(
                    <button key={n} onMouseDown={()=>{setName(n);setDropOpen(false);setErr('');}}
                      className="w-full text-left px-4 py-2.5 text-sm text-slate-800 hover:bg-black/5 transition-all flex items-center gap-2.5">
                      <div className="w-6 h-6 rounded-full flex-shrink-0 flex items-center justify-center text-white font-bold" style={{background:'#000000',fontSize:9}}>
                        {n.split(' ').map(w=>w[0]).join('').slice(0,2)}
                      </div>
                      {n}
                    </button>
                  ))}
                </div>
              )}
            </div>
            <div className="relative">
              <input type="text" autoComplete="off" style={{WebkitTextSecurity:showPin?'none':'disc'}} value={pin}
                onChange={e=>{setPin(e.target.value);setErr('');}}
                onKeyDown={e=>e.key==='Enter'&&tryLogin()}
                placeholder="PIN / Passwort" className={INP_L+" pr-10"}/>
              <button type="button" onClick={()=>setShowPin(p=>!p)}
                className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition-all">
                <SI p={IC.eye} size={15}/>
              </button>
            </div>
            {err&&<p className="text-red-500 text-xs">{err}</p>}
            <button onClick={tryLogin} disabled={!name.trim()||!pin||!ready}
              className="w-full py-3 text-sm font-bold text-white disabled:opacity-40 transition-all"
              style={{background:'#000000',borderRadius:30}}>
              {ready?'Anmelden':'Verbinde…'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

// ABFRAGE FORM  (public — no login required)
// ═══════════════════════════════════════════════════════════════════════════════
const AbfrageForm = ({ token }) => {
  const [schicht, setSchicht] = useState(null);
  const [maData,  setMaData]  = useState(null);
  const [pid,     setPid]     = useState('');
  const [form,    setForm]    = useState({});
  const [done,    setDone]    = useState(false);
  const [err,     setErr]     = useState('');

  useEffect(() => {
    const search = async () => {
      let activeProfiles = PROFILES;
      try {
        const cfgSnap = await db.collection('config').doc('profiles').get();
        const cfgData = cfgSnap.data()?.data;
        if (cfgData && cfgData.length) activeProfiles = cfgData;
      } catch {}
      for (const pr of activeProfiles) {
        try {
          const snap = await db.collection(pr.id).doc('ma').get();
          const d = snap.data();
          const s = (d?.schichten||[]).find(s=>s.abfrageToken===token);
          if (s) { setSchicht(s); setMaData(d); setPid(''); return; }
        } catch {}
      }
      setErr('Abfrage nicht gefunden oder bereits abgelaufen.');
    };
    search();
  }, [token]);

  const submit = async () => {
    if (!pid) return;
    const wishes = Object.entries(form).filter(([,v])=>v&&v!=='neutral').map(([slotId,art])=>({personId:pid,slotId,art}));
    // Check if person said "wunschfrei" for ALL slots → record as abwesenheit
    const allEntries = Object.values(form).filter(v=>v&&v!=='neutral');
    const hasYes  = allEntries.some(v=>v==='wunschdienst');
    const hasNo   = allEntries.some(v=>v==='wunschfrei');
    let activeProfiles = PROFILES;
    try {
      const cfgSnap = await db.collection('config').doc('profiles').get();
      const cfgData = cfgSnap.data()?.data;
      if (cfgData && cfgData.length) activeProfiles = cfgData;
    } catch {}
    for (const pr of activeProfiles) {
      try {
        const snap = await db.collection(pr.id).doc('ma').get();
        const d = snap.data();
        if (!(d?.schichten||[]).find(s=>s.abfrageToken===token)) continue;
        // 1. Update wuensche in schicht
        const newSchichten = (d.schichten||[]).map(s => {
          if (s.abfrageToken!==token) return s;
          return {...s, wuensche:[...(s.wuensche||[]).filter(w=>w.personId!==pid),...wishes]};
        });
        // 2. If person has NO "ja" entries → add abwesenheit for schicht date
        let updates = { schichten:newSchichten };
        if (hasNo && !hasYes && schicht?.datum) {
          const existingAbw = (d.abwesenheiten||[]).filter(a=>!(a.personId===pid&&a.from===schicht.datum&&a.reason?.startsWith('Abfrage')));
          const newAbw = { id: Math.random().toString(36).slice(2)+Date.now().toString(36), personId:pid, from:schicht.datum, to:schicht.datum, reason:'Abfrage: '+(schicht.titel||schicht.datum) };
          updates.abwesenheiten = [...existingAbw, newAbw];
        } else if (hasYes) {
          // Remove any previous "abwesend wegen Abfrage" for this date + person
          const filtered = (d.abwesenheiten||[]).filter(a=>!(a.personId===pid&&a.from===schicht?.datum&&a.reason?.startsWith('Abfrage')));
          updates.abwesenheiten = filtered;
        }
        // 3. Also update shared MA (personen/konflikte/praeferenzen live there)
        await db.collection(pr.id).doc('ma').update(updates);
        setDone(true); return;
      } catch {}
    }
  };

  if (err) return (
    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
      <div className="glass rounded-2xl p-8 max-w-sm w-full text-center glow">
        <p className="text-red-400 font-semibold text-sm">{err}</p>
      </div>
    </div>
  );
  if (!schicht) return <div className="min-h-screen flex items-center justify-center"><div className="text-slate-500 text-sm">Wird geladen…</div></div>;
  if (done) return (
    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
      <div className="glass rounded-2xl p-8 max-w-sm w-full text-center glow space-y-3">
        <div className="w-14 h-14 rounded-full flex items-center justify-center mx-auto" style={{background:'rgba(16,185,129,0.1)'}}>
          <SI p={IC.check} size={24} stroke={2.5} style={{color:'#10b981'}}/>
        </div>
        <h2 className="font-black text-lg text-slate-900">Gespeichert!</h2>
        <p className="text-slate-500 text-sm">Deine Verfügbarkeit wurde eingetragen.</p>
      </div>
    </div>
  );

  const gruppen = maData?.gruppen||[];
  const personen = maData?.personen||[];
  return (
    <div className="min-h-screen bg-slate-50 p-4">
      <div className="max-w-md mx-auto space-y-4 up">
        <div className="glass rounded-2xl p-5 glow">
          <div className="flex items-center gap-2 mb-3">
            <img src="/logo.png" style={{width:24,height:24,objectFit:'contain',mixBlendMode:'multiply'}} alt="K21"/>
            <span style={{fontFamily:'Gotham,sans-serif',fontWeight:900,fontSize:11,color:'#000000',letterSpacing:'-0.03em'}}>DIENSTPLAN ABFRAGE</span>
          </div>
          <h1 className="text-lg font-black text-slate-900">{schicht.titel||fmtDe(schicht.datum)}</h1>
          <p className="text-slate-500 text-sm">{fmtDe(schicht.datum)} · {schicht.slots.length} Slots</p>
        </div>
        <div className="glass rounded-2xl p-4 glow space-y-3">
          <label className="text-slate-400 text-xs font-semibold uppercase tracking-wider block">Dein Name</label>
          <select value={pid} onChange={e=>setPid(e.target.value)} className="w-full bg-black/5 border border-black/10 rounded-xl px-3 py-2.5 text-sm text-slate-800">
            <option value="">— auswählen —</option>
            {personen.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </div>
        {pid && schicht.slots.length>0 && (
          <div className="glass rounded-2xl p-4 glow space-y-4">
            <label className="text-slate-400 text-xs font-semibold uppercase tracking-wider block">Deine Verfügbarkeit</label>
            {schicht.slots.map(sl=>{
              const g=gruppen.find(x=>x.id===sl.gruppeId);
              const d=(g?.dienste||[]).find(x=>x.id===sl.dienstId);
              const val=form[sl.id]||'neutral';
              return (
                <div key={sl.id} className="space-y-1.5">
                  <div className="flex items-center gap-2">
                    <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:g?.farbe||'#8b5cf6'}}/>
                    <span className="text-xs font-semibold text-slate-700">{d?.name||'?'} <span className="text-slate-400 font-normal">({g?.name})</span></span>
                    {sl.doppelt&&<span className="pill text-xs" style={{background:'rgba(245,158,11,0.15)',color:'#f59e0b'}}>Doppeldienst</span>}
                  </div>
                  <div className="flex gap-1.5">
                    {[['wunschdienst','👍 Kann','#10b981'],['neutral','Neutral','#64748b'],['wunschfrei','👎 Kann nicht','#ef4444']].map(([v,l,col])=>(
                      <button key={v} onClick={()=>setForm(f=>({...f,[sl.id]:v}))}
                        className="flex-1 py-1.5 text-xs font-semibold rounded-lg transition-all border"
                        style={val===v?{background:col+'18',color:col,borderColor:col+'44'}:{background:'transparent',color:'#94a3b8',borderColor:'rgba(0,0,0,0.08)'}}>
                        {l}
                      </button>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}
        {pid && (
          <button onClick={submit} className="w-full bg-black hover:bg-slate-900 text-white font-bold py-3.5 text-sm transition-all" style={{borderRadius:30}}>
            Absenden
          </button>
        )}
      </div>
    </div>
  );
};

// CHURCHTOOLS VIEW
// ═══════════════════════════════════════════════════════════════════════════════
const CTView = ({ ma, onChange, onChangeShared, profiles, profile, writeMaForProfile, toast }) => {
  const [tab, setTab] = useState('einstellungen');
  const [calendars, setCalendars] = useState([]);
  const [svcGroups, setSvcGroups] = useState([]);
  const [services,  setServices]  = useState([]);
  const [events,    setEvents]    = useState([]);
  const [persons,   setPersons]   = useState([]);
  const [loadState, setLoadState] = useState({});
  const [personSearch, setPersonSearch] = useState('');
  const [expandedCal, setExpandedCal] = useState(null);
  const [expandedEvent, setExpandedEvent] = useState(null);
  const [calFilter, setCalFilter] = useState('');
  const [fromDate, setFromDate] = useState(today());
  const [toDate,   setToDate]   = useState(() => { const d=new Date(); d.setDate(d.getDate()+28); return d.toISOString().slice(0,10); });
  // Event import preview modal
  const [previewSchicht, setPreviewSchicht] = useState(null);
  // Person import modal
  const [importModal, setImportModal] = useState(null);
  const [impForm, setImpForm] = useState({pin:'', gruppenIds:[], rolle:'viewer', createLogin:true});
  // Inline edit for already-imported persons
  const [editingMaPersonId, setEditingMaPersonId] = useState(null);
  const setLoad = (k,v) => setLoadState(s=>({...s,[k]:v}));

  const cts = ma.ctSettings||{calendarMappings:[],importedEventIds:[],ctPersonIds:{}};

  // Local editable mappings
  const [localMaps, setLocalMaps] = useState(() => cts.calendarMappings||[]);
  useEffect(()=>{ setLocalMaps(cts.calendarMappings||[]); },[ma.ctSettings]);

  const EMPTY_MAP = calId => ({calendarId:calId,enabled:false,targetProfileId:'',planId:'',serviceGroupMappings:[],serviceLabelOverrides:{}});
  const getMap = calId => localMaps.find(m=>m.calendarId===calId)||EMPTY_MAP(calId);
  const updMap = (calId,patch) => setLocalMaps(prev=>{
    const ex=prev.find(m=>m.calendarId===calId);
    if(ex) return prev.map(m=>m.calendarId===calId?{...m,...patch}:m);
    return [...prev,{...EMPTY_MAP(calId),...patch}];
  });
  const updSgMap = (calId,ctGId,maGId) => setLocalMaps(prev=>prev.map(m=>{
    if(m.calendarId!==calId) return m;
    const sgm=m.serviceGroupMappings||[];
    const ex=sgm.find(s=>s.ctGroupId===ctGId);
    if(ex) return {...m,serviceGroupMappings:sgm.map(s=>s.ctGroupId===ctGId?{...s,maGruppeId:maGId}:s)};
    return {...m,serviceGroupMappings:[...sgm,{ctGroupId:ctGId,maGruppeId:maGId}]};
  }));

  const saveMappings = () => {
    onChange(m=>({...m,ctSettings:{...cts,calendarMappings:localMaps}}));
    toast('Einstellungen gespeichert ✓');
  };

  // Load base CT data on mount
  useEffect(()=>{
    setLoad('init',true);
    Promise.all([
      fetch('/api/ct/calendars').then(r=>r.json()),
      fetch('/api/ct/servicegroups').then(r=>r.json()),
      fetch('/api/ct/services?limit=200').then(r=>r.json()),
    ]).then(([c,sg,sv])=>{
      setCalendars(c.data||[]);
      setSvcGroups(sg.data||[]);
      setServices(sv.data||[]);
    }).catch(()=>toast('ChurchTools nicht erreichbar','error'))
      .finally(()=>setLoad('init',false));
  },[]);

  const loadEvents = () => {
    setLoad('events',true);
    const enabledIds=(cts.calendarMappings||[]).filter(m=>m.enabled).map(m=>m.calendarId);
    const ids=enabledIds.length?enabledIds:calendars.map(c=>c.id);
    const p=new URLSearchParams({from:fromDate,to:toDate});
    ids.forEach(id=>p.append('calendar_ids[]',id));
    fetch(`/api/ct/events?${p}`).then(r=>r.json())
      .then(d=>setEvents(d.data||[]))
      .catch(()=>toast('Events konnten nicht geladen werden','error'))
      .finally(()=>setLoad('events',false));
  };

  const loadPersons = () => {
    setLoad('persons',true);
    fetch('/api/ct/persons?limit=200').then(r=>r.json())
      .then(d=>setPersons(d.data||[]))
      .catch(()=>toast('Personen konnten nicht geladen werden','error'))
      .finally(()=>setLoad('persons',false));
  };

  // Build slots from CT event services (respects label overrides + group/person mappings)
  const buildSlots = (ev, mapping) => {
    const ctPersonIds = cts.ctPersonIds||{};
    const labelOverrides = mapping?.serviceLabelOverrides||{};
    return (ev.eventServices||[]).map(es=>{
      const svc = services.find(s=>s.id===es.serviceId);
      const sgMapping = (mapping?.serviceGroupMappings||[]).find(s=>s.ctGroupId===svc?.serviceGroupId);
      return {
        id:genId(),
        gruppeId: sgMapping?.maGruppeId||'',
        label: labelOverrides[String(es.serviceId)] || svc?.name || 'Dienst',
        personId: ctPersonIds[String(es.personId)]||'',
        ctServiceId: es.serviceId,
        _ctPersonId: es.personId, // only for preview display
      };
    });
  };

  const evTimes = ev => {
    const startT = ev.startDate ? new Date(ev.startDate).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Berlin'}) : '';
    const endT   = ev.endDate   ? new Date(ev.endDate).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Berlin'}) : '';
    return startT+(endT?'–'+endT:'');
  };

  // Open the import preview modal (user can edit everything before confirming)
  const openImportPreview = ev => {
    const calId = parseInt(ev.calendar?.domainIdentifier||ev.calendar?.id||0);
    const mapping = (cts.calendarMappings||[]).find(m=>m.calendarId===calId);
    const targetProfId = mapping?.targetProfileId || profile || '';
    setPreviewSchicht({
      datum: ev.startDate?.slice(0,10)||'',
      titel: ev.name||'',
      zeit: evTimes(ev),
      slots: buildSlots(ev, mapping),
      planId: mapping?.planId||'',
      targetProfId,
      ctEventId: String(ev.id),
    });
  };

  // Confirm import from preview modal
  const confirmImport = async () => {
    if(!previewSchicht) return;
    const {targetProfId, ctEventId, ...rest} = previewSchicht;
    // Strip internal _ctPersonId helper field from slots
    const cleanSlots = (rest.slots||[]).map(({_ctPersonId,...s})=>s);
    const schicht = {...rest, slots:cleanSlots, id:genId(), veroeffentlicht:false, wuensche:[], tauschAnfragen:[]};
    const evId = ctEventId;

    if(writeMaForProfile && targetProfId && targetProfId!==profile) {
      await writeMaForProfile(targetProfId, m=>({...m, schichten:[...(m.schichten||[]),schicht]}));
      onChange && onChange(m=>({...m, ctSettings:{...(m.ctSettings||{}),importedEventIds:[...(m.ctSettings?.importedEventIds||[]),evId]}}));
    } else if(onChange) {
      onChange(m=>({...m,
        schichten:[...(m.schichten||[]),schicht],
        ctSettings:{...(m.ctSettings||{}),importedEventIds:[...(m.ctSettings?.importedEventIds||[]),evId]},
      }));
    }
    const areaLabel = (profiles||[]).find(p=>p.id===targetProfId)?.label||targetProfId||'Aktueller Bereich';
    toast(`"${schicht.titel}" → ${areaLabel} ✓`);
    setPreviewSchicht(null);
  };

  // Update a slot field in the preview modal
  const updPreviewSlot = (slotId, patch) => setPreviewSchicht(ps=>({...ps, slots:ps.slots.map(s=>s.id===slotId?{...s,...patch}:s)}));
  const removePreviewSlot = slotId => setPreviewSchicht(ps=>({...ps, slots:ps.slots.filter(s=>s.id!==slotId)}));
  const addPreviewSlot = () => setPreviewSchicht(ps=>({...ps, slots:[...(ps.slots||[]),{id:genId(),label:'',gruppeId:'',personId:''}]}));

  // Bulk import: all new events in one write per profile (no race conditions)
  const autoImport = async () => {
    const newEvs = events.filter(ev=>!(cts.importedEventIds||[]).includes(String(ev.id)));
    if(!newEvs.length){toast('Keine neuen Events');return;}

    const schichtenByProfile = {};
    const allNewIds = [];
    for(const ev of newEvs) {
      const calId = parseInt(ev.calendar?.domainIdentifier||ev.calendar?.id||0);
      const mapping = (cts.calendarMappings||[]).find(m=>m.calendarId===calId);
      const targetProfId = mapping?.targetProfileId || profile || '';
      const slots = buildSlots(ev, mapping).map(({_ctPersonId,...s})=>s);
      const datum = ev.startDate?.slice(0,10)||'';
      const schicht = {id:genId(), datum, titel:ev.name||'Event', zeit:evTimes(ev), slots, planId:mapping?.planId||'', ctEventId:String(ev.id), veroeffentlicht:false, wuensche:[], tauschAnfragen:[]};
      if(!schichtenByProfile[targetProfId]) schichtenByProfile[targetProfId] = [];
      schichtenByProfile[targetProfId].push(schicht);
      allNewIds.push(String(ev.id));
    }

    for(const [profId, schichten] of Object.entries(schichtenByProfile)) {
      if(profId !== profile && writeMaForProfile) {
        await writeMaForProfile(profId, m=>({...m, schichten:[...(m.schichten||[]),...schichten]}));
      }
    }
    const currentSchichten = schichtenByProfile[profile] || [];
    onChange && onChange(m=>({...m,
      schichten:[...(m.schichten||[]),...currentSchichten],
      ctSettings:{...(m.ctSettings||{}),importedEventIds:[...(m.ctSettings?.importedEventIds||[]),...allNewIds]},
    }));
    toast(`${newEvs.length} Event${newEvs.length!==1?'s':''} ohne Vorschau importiert ✓`);
  };

  // Open person import modal
  const openImportPerson = p => {
    setImportModal(p);
    setImpForm({pin:'', gruppenIds:[], rolle:'viewer', createLogin:true});
  };

  // Confirm person import with account creation
  const confirmImportPerson = async () => {
    if(!importModal) return;
    const p = importModal;
    const name = [p.firstName,p.lastName].filter(Boolean).join(' ');
    const newId = genId();
    const newPerson = { id:newId, name, ctPersonId:String(p.id), gruppenIds:impForm.gruppenIds, farbe:'#8b5cf6', email:p.email||'' };

    // Add to shared personen
    onChangeShared && onChangeShared(m=>({...m, personen:[...(m.personen||[]),newPerson]}));

    // Track CT person ID mapping in current area's ctSettings
    onChange && onChange(m=>({...m, ctSettings:{...(m.ctSettings||{}), ctPersonIds:{...(m.ctSettings?.ctPersonIds||{}),[String(p.id)]:newId}}}));

    // Create login account in k21-users if requested
    if(impForm.createLogin && impForm.pin.trim()) {
      const loginData = { name, pin:impForm.pin.trim(), role:impForm.rolle, areas:[], areaAccess:{} };
      await fetch('/api/users?c=k21-users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(loginData)}).catch(()=>{});
    }

    toast(`${name} importiert${impForm.createLogin?' + Account erstellt':''} ✓`);
    setImportModal(null);
  };

  const isImported = evId => (cts.importedEventIds||[]).includes(String(evId));
  const isPersonImported = pId => !!(cts.ctPersonIds||{})[String(pId)];
  const fmtEvDate = d => { try { return new Date(d).toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'2-digit',timeZone:'Europe/Berlin'}); } catch { return d; } };

  const SUBTABS = [{id:'einstellungen',label:'⚙ Einstellungen'},{id:'events',label:'📅 Events'},{id:'personen',label:'👤 Personen'}];

  return (
    <div className="space-y-5">
      {/* Sub-tabs */}
      <div className="flex gap-1" style={{borderBottom:'2px solid rgba(0,0,0,0.08)'}}>
        {SUBTABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            className="px-4 py-2 text-xs font-semibold transition-all"
            style={{color:tab===t.id?'#000':'#94a3b8',borderBottom:tab===t.id?'2px solid #000':'2px solid transparent',marginBottom:'-2px'}}>
            {t.label}
          </button>
        ))}
      </div>

      {loadState.init && <div className="text-center py-8 text-slate-400 text-sm">Verbinde mit ChurchTools…</div>}

      {/* ══════════ EINSTELLUNGEN ══════════ */}
      {tab==='einstellungen' && !loadState.init && (
        <div className="space-y-4">
          {/* Info bar */}
          <div className="glass rounded-2xl p-4" style={{borderLeft:'3px solid #6366f1'}}>
            <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">ChurchTools Instanz</div>
            <div className="text-sm text-slate-700 font-semibold">k21.church.tools</div>
            <div className="text-xs text-slate-400 mt-0.5">{calendars.length} Kalender · {services.length} Dienstrollen · {svcGroups.length} Dienstgruppen</div>
          </div>

          <div className="text-xs font-bold text-slate-500 uppercase tracking-wider">Kalender konfigurieren</div>

          {calendars.map(cal=>{
            const m = getMap(cal.id);
            const open = expandedCal===cal.id;
            const svcsInCal = services; // all services are shown per group
            return (
              <div key={cal.id} className="glass rounded-2xl overflow-hidden">
                {/* Calendar header row */}
                <div className="flex items-center gap-3 p-4">
                  <button onClick={e=>{e.stopPropagation();updMap(cal.id,{enabled:!m.enabled});}}
                    className="w-9 h-5 rounded-full transition-all flex-shrink-0 relative"
                    style={{background:m.enabled?'#6366f1':'rgba(0,0,0,0.12)'}}>
                    <span className="absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition-all"
                      style={{left:m.enabled?'calc(100% - 18px)':'2px'}}/>
                  </button>
                  <div className="flex-1 min-w-0 cursor-pointer" onClick={()=>setExpandedCal(open?null:cal.id)}>

                      <div className="text-xs text-slate-400 mt-0.5">

                      {open?'▲ Schließen':'▼ Konfigurieren'}

                {open && m.enabled && (

                      <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">① Zielbereich</div>
                      <select value={m.targetProfileId||''} onChange={e=>updMap(cal.id,{targetProfileId:e.target.value})} className={"w-full "+INP_SM}>
                        <option value="">Aktueller Bereich</option>
                        {(profiles||[]).map(pr=><option key={pr.id} value={pr.id}>{pr.label}</option>)}
                      </select>
                      <div className="text-xs text-slate-400 mt-1">Events aus diesem Kalender gehen in diesen App-Bereich</div>
                    </div>

                    {/* ② Ziel-Plan */}
                    <div>
                      <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">② Ziel-Plan</div>
                      <select value={m.planId||''} onChange={e=>updMap(cal.id,{planId:e.target.value})} className={"w-full "+INP_SM}>

                    </div>

                    <div>
                      <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">③ Dienstgruppen → MA-Gruppen</div>

                          return (
                            <div key={sg.id} className="flex items-center gap-2">
                              <div className="w-5 h-5 rounded flex-shrink-0 flex items-center justify-center text-xs" style={{background:'rgba(99,102,241,0.1)',color:'#6366f1'}}>G</div>
                              <span className="text-xs text-slate-700 font-semibold flex-shrink-0 w-32 truncate" title={sg.name}>{sg.name}</span>
                              <span className="text-slate-300 text-xs flex-shrink-0">→</span>
                              <select value={sgm?.maGruppeId||''} onChange={e=>updSgMap(cal.id,sg.id,e.target.value)} className={"flex-1 "+INP_SM}>

                                {(ma.gruppen||[]).map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
                              </select>
                            </div>

                        })}
                      </div>
                    </div>

                    {/* ④ Dienst-Labels */}
                    <div>
                      <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">④ Dienst-Labels umbenennen</div>
                      <div className="text-xs text-slate-400 mb-3">Optional: CT-Dienst-Name durch eigenen Label ersetzen (leer = CT-Name wird verwendet)</div>

                        const svcsOfGroup = services.filter(s=>s.serviceGroupId===sg.id);
                        if(!svcsOfGroup.length) return null;
                        return (
                          <div key={sg.id} className="mb-3">
                            <div className="text-xs text-slate-500 font-semibold mb-1.5 flex items-center gap-1.5">
                              <span className="w-4 h-4 rounded flex items-center justify-center text-xs" style={{background:'rgba(99,102,241,0.1)',color:'#6366f1'}}>G</span>
                              {sg.name}
                            </div>
                            <div className="space-y-1.5 pl-5">
                              {svcsOfGroup.map(svc=>{
                                const override=(m.serviceLabelOverrides||{})[String(svc.id)]||'';
                                return (
                                  <div key={svc.id} className="flex items-center gap-2">
                                    <span className="text-xs text-slate-500 w-32 flex-shrink-0 truncate" title={svc.name}>{svc.name}</span>

                                    <input value={override} placeholder={svc.name}
                                      onChange={e=>updMap(cal.id,{serviceLabelOverrides:{...(m.serviceLabelOverrides||{}),[String(svc.id)]:e.target.value}})}
                                      className={"flex-1 "+INP_SM}/>

                                  </div>
                                );
                              })}
                            </div>
                          </div>

                      {services.length===0 && <div className="text-xs text-slate-400 italic">Keine Dienste geladen</div>}
                    </div>
                  </div>

              </div>

          <div className="flex gap-2 pt-2">
            <button onClick={saveMappings}
              className="px-5 py-2.5 text-white text-sm font-bold transition-all"
              style={{borderRadius:30,background:'#000'}}>
              Einstellungen speichern
            </button>
          </div>
        </div>
      )}

      {/* ══════════ EVENTS ══════════ */}
      {tab==='events' && !loadState.init && (
        <div className="space-y-4">
          {/* Filter bar */}

                </select>
              </div>

                {loadState.events?'Lade…':'Events laden'}
              </button>
            </div>

              <div className="flex items-center justify-between pt-1 border-t border-black/5">

                  className="px-4 py-1.5 text-xs font-bold transition-all"
                  style={{borderRadius:30,background:'rgba(16,185,129,0.12)',color:'#10b981',border:'1px solid rgba(16,185,129,0.3)'}}>

                </button>
              </div>
            )}
          </div>

          {events.length===0 && !loadState.events && (
            <div className="text-center py-10 text-slate-400 text-sm">Klicke "Events laden" um Termine aus ChurchTools zu holen</div>

              .filter(ev=>!calFilter || String(parseInt(ev.calendar?.domainIdentifier||ev.calendar?.id||0))===calFilter)

                const calMap = getMap(calId);
                const calName = ev.calendar?.title||ev.calendar?.name||'?';
                const imp = isImported(ev.id);
                const isExpanded = expandedEvent===ev.id;

                  <div key={ev.id} className="glass rounded-2xl overflow-hidden" style={{opacity:imp?0.7:1}}>

                    <div className="flex items-start gap-3 p-4 cursor-pointer" onClick={()=>setExpandedEvent(isExpanded?null:ev.id)}>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap mb-1">
                          <span className="font-semibold text-slate-800 text-sm">{ev.name}</span>
                          <span className="pill text-xs" style={{background:'rgba(99,102,241,0.1)',color:'#6366f1'}}>{calName}</span>
                          {imp
                            ? <span className="pill text-xs" style={{background:'rgba(16,185,129,0.12)',color:'#10b981'}}>✓ Importiert</span>
                            : <span className="pill text-xs" style={{background:'rgba(248,113,113,0.12)',color:'#f87171'}}>Neu</span>

                      <div className="flex items-center gap-1.5 flex-shrink-0">

                          <button onClick={e=>{e.stopPropagation();openImportPreview(ev);}}

                            style={{borderRadius:20,background:'#6366f1',color:'#fff'}}>
                            + Importieren
                          </button>
                        )}
                        <button className="text-slate-400 text-xs px-1">{isExpanded?'▲':'▼'}</button>
                      </div>
                    </div>

                    {/* Expanded: slot preview */}
                    {isExpanded && (
                      <div className="border-t border-black/5 px-4 py-3 space-y-1.5" style={{background:'rgba(0,0,0,0.02)'}}>
                        <div className="text-xs font-semibold text-slate-500 mb-2">Dienst-Slots in diesem Event:</div>
                        {(ev.eventServices||[]).length===0 && <div className="text-xs text-slate-400 italic">Keine Dienste zugewiesen</div>}
                        {(ev.eventServices||[]).map(es=>{
                          const svc = services.find(s=>s.id===es.serviceId);
                          const labelOverride = (calMap.serviceLabelOverrides||{})[String(es.serviceId)];
                          const label = labelOverride || svc?.name || 'Dienst';
                          const sg = svcGroups.find(g=>g.id===svc?.serviceGroupId);
                          const sgMap = (calMap.serviceGroupMappings||[]).find(s=>s.ctGroupId===sg?.id);
                          const maGruppe = (ma.gruppen||[]).find(g=>g.id===sgMap?.maGruppeId);
                          const maPerson = es.personId ? (ma.personen||[]).find(mp=>mp.id===(cts.ctPersonIds||{})[String(es.personId)]) : null;
                          const personNotImported = es.personId && !maPerson;
                          return (
                            <div key={es.id} className="flex items-center gap-2 flex-wrap text-xs py-1 border-b border-black/4 last:border-0">
                              <span className="font-semibold text-slate-700 w-28 flex-shrink-0">{label}</span>
                              {maGruppe
                                ? <span className="pill" style={{background:'rgba(99,102,241,0.1)',color:'#6366f1'}}>{maGruppe.name}</span>
                                : <span className="text-slate-300">keine Gruppe</span>}
                              <span className="text-slate-300 mx-1">·</span>
                              {maPerson
                                ? <span className="pill" style={{background:'rgba(16,185,129,0.12)',color:'#10b981'}}>👤 {maPerson.name}</span>
                                : personNotImported
                                  ? <span className="pill" style={{background:'rgba(251,191,36,0.15)',color:'#d97706'}}>⚠ Person nicht importiert</span>
                                  : <span className="text-slate-300">offen</span>}
                            </div>
                          );
                        })}
                        {!imp && onChange && (
                          <div className="pt-2">
                            <button onClick={()=>openImportPreview(ev)}
                              className="px-4 py-1.5 text-xs font-bold transition-all"
                              style={{borderRadius:20,background:'rgba(99,102,241,0.1)',color:'#6366f1',border:'1px solid rgba(99,102,241,0.25)'}}>
                              + Mit Vorschau importieren →
                            </button>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
          </div>
        </div>
      )}

      {/* ══════════ PERSONEN ══════════ */}

        <div className="space-y-4">
          <div className="flex gap-2 items-center">
            <input value={personSearch} onChange={e=>setPersonSearch(e.target.value)}
              placeholder="Suchen…" className={"flex-1 "+INP_SM}/>

              className="px-4 py-1.5 text-white text-xs font-bold transition-all disabled:opacity-50"
              style={{borderRadius:30,background:'#6366f1'}}>
              {loadState.persons?'Lade…':'Personen laden'}
            </button>
          </div>

            <div className="text-center py-10 text-slate-400 text-sm">Klicke "Personen laden" um CT-Kontakte zu sehen</div>

              .filter(p=>{ const n=`${p.firstName||''} ${p.lastName||''}`.toLowerCase(); return !personSearch||n.includes(personSearch.toLowerCase()); })

                const imp = isPersonImported(p.id);
                const maPersonId = (cts.ctPersonIds||{})[String(p.id)];

                const isEditing = editingMaPersonId===maPersonId;

                  <div key={p.id} className="glass rounded-xl overflow-hidden">

                      <div className="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-bold text-white"
                        style={{background:maPerson?.farbe||(imp?'#10b981':'#6366f1')}}>
                        {(p.firstName||'?')[0]}{(p.lastName||'')[0]}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="font-semibold text-slate-800 text-sm">{p.firstName} {p.lastName}</div>
                        {imp && maPerson && <div className="text-xs text-green-600">✓ {maPerson.name} · {(maPerson.gruppenIds||[]).map(gid=>(ma.gruppen||[]).find(g=>g.id===gid)?.name).filter(Boolean).join(', ')||'Keine Gruppe'}</div>}

                      </div>
                      {imp && onChangeShared && (
                        <button onClick={()=>setEditingMaPersonId(isEditing?null:maPersonId)}
                          className="flex-shrink-0 px-3 py-1.5 text-xs font-bold transition-all"
                          style={{borderRadius:20,background:isEditing?'rgba(0,0,0,0.08)':'rgba(99,102,241,0.1)',color:isEditing?'#64748b':'#6366f1',border:'1px solid rgba(99,102,241,0.2)'}}>
                          {isEditing?'Schließen':'✏ Bearbeiten'}
                        </button>
                      )}
                      {!imp && onChange && (
                        <button onClick={()=>openImportPerson(p)}
                          className="flex-shrink-0 px-3 py-1.5 text-xs font-bold transition-all"
                          style={{borderRadius:20,background:'rgba(99,102,241,0.1)',color:'#6366f1',border:'1px solid rgba(99,102,241,0.25)'}}>
                          + Import
                        </button>
                      )}
                    </div>
                    {isEditing && maPerson && (
                      <div className="border-t border-black/5 px-4 py-4 space-y-3" style={{background:'rgba(99,102,241,0.025)'}}>
                        <div className="grid grid-cols-2 gap-3">
                          <div>
                            <label className="text-xs font-semibold text-slate-500 block mb-1.5">Name</label>
                            <input defaultValue={maPerson.name}
                              onChange={e=>{const v=e.target.value;onChangeShared&&onChangeShared(m=>({...m,personen:(m.personen||[]).map(pp=>pp.id===maPerson.id?{...pp,name:v}:pp)}));}}
                              className={"w-full "+INP_SM}/>
                          </div>
                          <div>
                            <label className="text-xs font-semibold text-slate-500 block mb-1.5">Farbe</label>
                            <input type="color" value={maPerson.farbe||'#8b5cf6'}
                              onChange={e=>{const v=e.target.value;onChangeShared&&onChangeShared(m=>({...m,personen:(m.personen||[]).map(pp=>pp.id===maPerson.id?{...pp,farbe:v}:pp)}));}}
                              className="w-full h-9 rounded-lg border border-black/10 cursor-pointer p-1"/>
                          </div>
                        </div>
                        <div>
                          <label className="text-xs font-semibold text-slate-500 block mb-1.5">Gruppen</label>
                          <div className="flex flex-wrap gap-2">

                                  const newGIds=has?(maPerson.gruppenIds||[]).filter(x=>x!==g.id):[...(maPerson.gruppenIds||[]),g.id];

                                }} className="px-2.5 py-1 text-xs font-semibold transition-all"
                                  style={{borderRadius:20,background:has?'rgba(99,102,241,0.15)':'rgba(0,0,0,0.06)',color:has?'#6366f1':'#64748b',border:has?'1px solid rgba(99,102,241,0.4)':'1px solid transparent'}}>
                                  {has?'✓ ':''}{g.name}
                                </button>
                              );
                            })}

                        <button onClick={()=>{

                <div className="text-xs text-slate-400 mt-0.5">Alles anpassen bevor du importierst</div>
              </div>
              <button onClick={()=>setPreviewSchicht(null)} className="text-slate-400 hover:text-slate-700"><SI p={IC.x} size={18}/></button>
            </div>

            {/* Scrollable body */}
            <div className="overflow-y-auto flex-1 px-6 pb-4 space-y-4">
              {/* Titel + Datum + Zeit */}
              <div className="grid grid-cols-1 gap-3">
                <div>
                  <label className="text-xs font-semibold text-slate-500 block mb-1.5">Titel</label>
                  <input value={previewSchicht.titel} onChange={e=>setPreviewSchicht(ps=>({...ps,titel:e.target.value}))} className={"w-full "+INP}/>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-xs font-semibold text-slate-500 block mb-1.5">Datum</label>
                    <input type="date" value={previewSchicht.datum} onChange={e=>setPreviewSchicht(ps=>({...ps,datum:e.target.value}))} className={"w-full "+INP_SM}/>
                  </div>
                  <div>
                    <label className="text-xs font-semibold text-slate-500 block mb-1.5">Uhrzeit</label>
                    <input value={previewSchicht.zeit} onChange={e=>setPreviewSchicht(ps=>({...ps,zeit:e.target.value}))} placeholder="10:00–12:00" className={"w-full "+INP_SM}/>
                  </div>
                </div>
              </div>

              {/* Zielbereich + Plan */}
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="text-xs font-semibold text-slate-500 block mb-1.5">Zielbereich</label>
                  <select value={previewSchicht.targetProfId||''} onChange={e=>setPreviewSchicht(ps=>({...ps,targetProfId:e.target.value}))} className={"w-full "+INP_SM}>
                    <option value="">Aktueller Bereich</option>
                    {(profiles||[]).map(pr=><option key={pr.id} value={pr.id}>{pr.label}</option>)}
                  </select>
                </div>
                <div>
                  <label className="text-xs font-semibold text-slate-500 block mb-1.5">Plan</label>
                  <select value={previewSchicht.planId||''} onChange={e=>setPreviewSchicht(ps=>({...ps,planId:e.target.value}))} className={"w-full "+INP_SM}>
                    <option value="">Kein Plan</option>
                    {(ma.plaene||[]).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                  </select>
                </div>
              </div>

              {/* Slots */}
              <div>
                <div className="flex items-center justify-between mb-2">
                  <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Dienst-Slots ({(previewSchicht.slots||[]).length})</label>
