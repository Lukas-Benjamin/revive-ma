                </div>
                <div className="space-y-2">
                  {(previewSchicht.slots||[]).map((slot,i)=>(
                    <div key={slot.id} className="rounded-xl p-3 space-y-2" style={{background:'rgba(0,0,0,0.04)'}}>
                      <div className="flex items-center gap-2">
                        <span className="text-xs text-slate-400 font-semibold w-4 flex-shrink-0">{i+1}</span>
                        <input value={slot.label} onChange={e=>updPreviewSlot(slot.id,{label:e.target.value})}
                          placeholder="Dienst-Name…" className={"flex-1 "+INP_SM}/>
                        <button onClick={()=>removePreviewSlot(slot.id)} className="text-slate-300 hover:text-red-400 transition-colors flex-shrink-0">
                          <SI p={IC.trash} size={13}/>
                        </button>
                      </div>
                      <div className="grid grid-cols-2 gap-2 pl-6">
                        <div>
                          <label className="text-xs text-slate-400 block mb-1">Gruppe</label>
                          <select value={slot.gruppeId||''} onChange={e=>updPreviewSlot(slot.id,{gruppeId:e.target.value})} className={"w-full "+INP_SM}>
                            <option value="">Keine Gruppe</option>
                            {(ma.gruppen||[]).map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="text-xs text-slate-400 block mb-1">Person</label>
                          <select value={slot.personId||''} onChange={e=>updPreviewSlot(slot.id,{personId:e.target.value})} className={"w-full "+INP_SM}>
                            <option value="">Offen</option>
                            {(ma.personen||[]).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                          </select>
                        </div>
                      </div>
                    </div>
                  ))}
                  {(previewSchicht.slots||[]).length===0 && (
                    <div className="text-center py-4 text-slate-400 text-xs">Keine Slots — klicke "+ Slot hinzufügen"</div>
                  )}
                </div>
              </div>
            </div>

            {/* Footer */}
            <div className="flex gap-2 px-6 py-4 border-t border-black/5 flex-shrink-0">
              <button onClick={confirmImport}
                className="flex-1 text-white font-bold py-3 text-sm transition-all"
                style={{borderRadius:30,background:'#000'}}>
                ✓ Importieren
              </button>
              <button onClick={()=>setPreviewSchicht(null)}
                className="px-5 py-3 text-slate-400 text-sm font-semibold transition-all hover:bg-black/5"
                style={{borderRadius:30}}>
                Abbrechen
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ══════════ PERSON IMPORT MODAL ══════════ */}
      {importModal && (
        <div className="modal-overlay fixed inset-0 flex items-center justify-center z-50 px-4"
          style={{background:'rgba(0,0,0,0.55)'}} onClick={e=>{if(e.target===e.currentTarget)setImportModal(null);}}>
          <div className="glass rounded-3xl p-6 w-full max-w-sm space-y-4 glow">
            <div className="flex items-center justify-between">
              <h3 className="font-black text-lg grad">Person importieren</h3>
              <button onClick={()=>setImportModal(null)} className="text-slate-400 hover:text-slate-700"><SI p={IC.x} size={18}/></button>
            </div>
            <div className="rounded-xl px-4 py-3 flex items-center gap-3" style={{background:'rgba(99,102,241,0.07)'}}>
              <div className="w-9 h-9 rounded-full flex items-center justify-center text-xs font-bold text-white flex-shrink-0" style={{background:'#6366f1'}}>
                {(importModal.firstName||'?')[0]}{(importModal.lastName||'')[0]}
              </div>
              <div>
                <div className="font-semibold text-slate-800 text-sm">{importModal.firstName} {importModal.lastName}</div>
                {importModal.email && <div className="text-xs text-slate-400">{importModal.email}</div>}
              </div>
            </div>
            <div>
              <label className="text-slate-500 text-xs font-semibold block mb-2">Gruppen zuweisen</label>
              <div className="space-y-1 max-h-36 overflow-y-auto">
                {(ma.gruppen||[]).map(g=>(
                  <label key={g.id} className="flex items-center gap-2.5 cursor-pointer py-1">
                    <input type="checkbox"
                      checked={impForm.gruppenIds.includes(g.id)}
                      onChange={e=>setImpForm(f=>({...f,gruppenIds:e.target.checked?[...f.gruppenIds,g.id]:f.gruppenIds.filter(x=>x!==g.id)}))}
                      className="w-4 h-4 rounded accent-indigo-500"/>
                    <span className="text-sm text-slate-700">{g.name}</span>
                  </label>
                ))}
                {(ma.gruppen||[]).length===0 && <div className="text-xs text-slate-400 italic">Keine Gruppen vorhanden</div>}
              </div>
            </div>
            <div className="flex items-center justify-between py-1">
              <span className="text-sm text-slate-700 font-semibold">App-Account erstellen</span>
              <button onClick={()=>setImpForm(f=>({...f,createLogin:!f.createLogin}))}
                className={"toggle "+(impForm.createLogin?'on':'')}
                style={{background:impForm.createLogin?'#6366f1':'rgba(0,0,0,0.12)'}}/>
            </div>
            {impForm.createLogin && (
              <div className="space-y-3 border-t border-black/5 pt-3">
                <div>
                  <label className="text-slate-500 text-xs font-semibold block mb-1.5">PIN (für Login)</label>
                  <input type="password" value={impForm.pin} onChange={e=>setImpForm(f=>({...f,pin:e.target.value}))}
                    placeholder="z.B. 1234" className={"w-full "+INP}/>
                </div>
                <div>
                  <label className="text-slate-500 text-xs font-semibold block mb-1.5">Rolle</label>
                  <select value={impForm.rolle} onChange={e=>setImpForm(f=>({...f,rolle:e.target.value}))} className={"w-full "+INP}>
                    <option value="viewer">Zuschauer (nur lesen)</option>
                    <option value="editor">Editor (bearbeiten)</option>
                    <option value="admin">Admin</option>
                  </select>
                </div>
              </div>
            )}
            <div className="flex gap-2 pt-1">
              <button onClick={confirmImportPerson}
                disabled={impForm.createLogin && !impForm.pin.trim()}
                className="flex-1 text-white font-bold py-2.5 text-sm transition-all disabled:opacity-40"
                style={{borderRadius:30,background:'#6366f1'}}>
                Importieren{impForm.createLogin?' + Account':''}
              </button>
              <button onClick={()=>setImportModal(null)}
                className="px-4 py-2.5 text-slate-400 text-sm"
                style={{borderRadius:30,background:'rgba(0,0,0,0.05)'}}>
                Abbrechen
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════════════════════
const App = () => {
  const [currentUser, setCurrentUser] = useState(() => {
    const s = localStorage.getItem('k21-user');
    if (!s) return undefined;
    if (s==='guest') return null;
    try { return JSON.parse(s); } catch { return undefined; }
  });
  const [profiles,   setProfiles]   = useState(DEFAULT_PROFILES);
  const [profile,   setProfile]   = useState(() => localStorage.getItem('ma-profile')||'revive');
  const [headerEdit,      setHeaderEdit]      = useState(null);
  const [headerEditName,  setHeaderEditName]  = useState('');
  const [headerEditColor, setHeaderEditColor] = useState('#06b6d4');
  const [ma,        setMa]        = useState(() => loadJSON(`ma-data-${localStorage.getItem('ma-profile')||'revive'}`, DEFAULT_MA()));
  const [sharedMa,  setSharedMa]  = useState(() => loadJSON('ma-data-shared', DEFAULT_SHARED()));
  const [page,      setPage]      = useState('dienstplan');
  const [syncState, setSyncState] = useState(() => {
    const key = `ma-data-${localStorage.getItem('ma-profile')||'revive'}`;
    return localStorage.getItem(key) ? 'synced' : 'connecting';
  });
  const [toasts,    setToasts]    = useState([]);
  const [ownerPin,  setOwnerPin]  = useState('');

  useEffect(() => {
    const unsub = db.collection('config').doc('auth').onSnapshot(
      snap => { const p = snap.data()?.adminPin; if (p) setOwnerPin(p); },
      () => {}
    );
    return () => unsub();
  }, []);

  // Load dynamic profiles from Firebase on init
  useEffect(() => {
    db.collection('config').doc('profiles').get()
      .then(snap => {
        const data = snap.data()?.data;
        if (data && data.length) { setProfiles(data); PROFILES = data; }
      })
      .catch(() => {});
  }, []);

  const p           = perms(currentUser);
  const isAdmin     = p.settings;
  const isGesamt    = profile === '__gesamt__';
  const canEdit     = !isGesamt && p.edit && getAreaAccess(currentUser, profile) === 'edit';
  const canDel      = p.del;
  const canSettings = p.settings;
  const canProfiles = p.profiles;
  const canGesamt   = !currentUser || currentUser.role==='owner' || currentUser.role==='admin' || getAreaAccess(currentUser,'__gesamt__')!=='none';
  const curProfile  = profiles.find(pp=>pp.id===profile) || profiles[profiles.length-1] || GESAMT_PROFILE;

  const toast = (msg, type='success') => {
    const id = genId();
    setToasts(pp=>[...pp, { id, msg, type }]);
    setTimeout(() => setToasts(pp=>pp.filter(t=>t.id!==id)), 3000);
  };

  const login  = user => { setCurrentUser(user); localStorage.setItem('k21-user', user ? JSON.stringify(user) : 'guest'); };
  const logout = () => { setCurrentUser(undefined); localStorage.removeItem('k21-user'); setPage('dienstplan'); };
  const updateCurrentUser = user => { setCurrentUser(user); localStorage.setItem('k21-user', JSON.stringify(user)); };

  const saveHeaderEdit = () => {
    if (!headerEditName.trim()) return;
    let np;
    if (headerEdit==='new') {
      const id=headerEditName.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')+'-'+Math.random().toString(36).slice(2,5);
      np=[...profiles,{id,label:headerEditName.trim(),color:headerEditColor,grad:`linear-gradient(135deg,${headerEditColor},#000000)`}];
    } else {
      np=profiles.map(p=>p.id===headerEdit?{...p,label:headerEditName.trim(),color:headerEditColor,grad:`linear-gradient(135deg,${headerEditColor},#000000)`}:p);
    }
    setProfiles(np); PROFILES=np;
    db.collection('config').doc('profiles').set({data:np}).catch(()=>{});
    setHeaderEdit(null);
    toast(headerEdit==='new'?'Bereich erstellt ✓':'Bereich umbenannt ✓');
  };

  // Which church profiles this user may see
  const visibleProfiles = useMemo(() => {
    if (!currentUser||currentUser.role==='owner'||currentUser.role==='admin') return profiles;
    return profiles.filter(pp=>getAreaAccess(currentUser,pp.id)!=='none');
  }, [currentUser, profiles]);

  const allowedGroups = useMemo(() => {
    if (!currentUser||currentUser.role==='owner'||currentUser.role==='admin') return null;
    const ag = (currentUser.areaGroups||{})[profile]||[];
    return ag.length>0 ? ag : null; // null = all groups allowed
  }, [currentUser, profile]);

  const switchProfile = pid => {
    setProfile(pid);
    localStorage.setItem('ma-profile', pid);
    setPage('dienstplan');
  };

  // Auto-redirect if current profile is outside allowed areas
  useEffect(() => {
    if (isGesamt) return;
    if (visibleProfiles.length>0 && !visibleProfiles.find(pp=>pp.id===profile)) {
      switchProfile(visibleProfiles[0].id);
    }
  }, [visibleProfiles]);

  // Firebase Sync — per-profile (gruppen, vorlagen, schichten)
  // Uses server-side proxy to bypass expired Firestore security rules
  const writeMa = data => {
    setSyncState('saving');
    localStorage.setItem(`ma-data-${profile}`, JSON.stringify(data));
    fetch(`/api/ma?profile=${encodeURIComponent(profile)}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({data}),
    }).then(()=>setSyncState('synced')).catch(()=>setSyncState('error'));
  };

  useEffect(() => {
    if (profile === '__gesamt__') return;
    const localKey = `ma-data-${profile}`;
    const cached = localStorage.getItem(localKey);
    setSyncState(cached ? 'synced' : 'connecting');
    setMa(cached ? JSON.parse(cached) : DEFAULT_MA());
    const unsub = db.collection(profile).doc('ma').onSnapshot(
      { includeMetadataChanges:true },
      snap => {
        if (snap.metadata.hasPendingWrites) return;
        const data = snap.data()?.data;
        if (data) {
          const { gruppen=[], vorlagen=[], schichten=[], plaene=[], tauschAnfragen=[], abwesenheiten=[], ctSettings={calendarMappings:[],importedEventIds:[],ctPersonIds:{}} } = data;
          const clean = { gruppen, vorlagen, schichten, plaene, tauschAnfragen, abwesenheiten, ctSettings };
          localStorage.setItem(localKey, JSON.stringify(clean)); setMa(clean);
        }
        setSyncState('synced');
      },
      () => setSyncState('error')
    );
    return () => unsub();
  }, [profile]);

  const updateMa = updater => {
    setMa(prev => {
      const next = typeof updater==='function' ? updater(prev) : updater;
      writeMa(next);
      return next;
    });
  };

  // Firebase Sync — shared personen + konflikte (cross-profile)
  // Uses server-side proxy to bypass expired Firestore security rules
  const writeSharedMa = data => {
    localStorage.setItem('ma-data-shared', JSON.stringify(data));
    fetch('/api/shared-ma', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({data}),
    }).catch(()=>{});
  };

  useEffect(() => {
    const unsub = db.collection('shared').doc('ma').onSnapshot(
      { includeMetadataChanges:true },
      snap => {
        if (snap.metadata.hasPendingWrites) return;
        const data = snap.data()?.data;
        if (data) { localStorage.setItem('ma-data-shared', JSON.stringify(data)); setSharedMa(data); }
      },
      () => {}
    );
    return () => unsub();
  }, []);

  const updateSharedMa = updater => {
    const next = typeof updater==='function' ? updater(sharedMa) : updater;
    setSharedMa(next);
    writeSharedMa(next);
  };

  // Write MA data for any profile (used by CT import to route events to correct area)
  const writeMaForProfile = async (targetProfileId, updater) => {
    try {
      // Read current data via server proxy
      const r = await fetch(`/api/ma?profile=${encodeURIComponent(targetProfileId)}`);
      const doc = await r.json();
      const existing = doc?.data || DEFAULT_MA();
      const next = typeof updater==='function' ? updater(existing) : updater;
      // Write via server proxy
      await fetch(`/api/ma?profile=${encodeURIComponent(targetProfileId)}`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({data: next}),
      });
    } catch(e) { console.warn('writeMaForProfile error:', e.message); }
  };

  // Merged view used by all child components
  const fullMa = { ...ma, personen: sharedMa.personen||[], konflikte: sharedMa.konflikte||[], praeferenzen: sharedMa.praeferenzen||[], abwesenheiten: ma.abwesenheiten||[] };

  const abfrageToken = new URLSearchParams(window.location.search).get('abfrage');
  if (abfrageToken) return <AbfrageForm token={abfrageToken}/>;
  if (currentUser === undefined) return <LoginScreen onLogin={login} ownerPin={ownerPin}/>;

  const TABS = isGesamt ? [
    { id:'dienstplan', label:'Dienstplan', icon:IC.calendar },
  ] : [
    { id:'dienstplan', label:'Dienstplan', icon:IC.calendar },
    ...(p.edit ? [{ id:'personen', label:'Personen', icon:IC.person }] : []),
    ...(canEdit ? [
      { id:'gruppen',      label:'Gruppen',       icon:IC.users    },
      ...(!allowedGroups ? [{ id:'vorlagen', label:'Vorlagen', icon:IC.layers }] : []),
      { id:'verfuegbarkeit', label:'Verfügbarkeit', icon:IC.zap    },
      { id:'statistik',    label:'Statistik',     icon:IC.chart    },
    ] : []),
    ...(canSettings ? [{ id:'einstellungen', label:'Einstellungen', icon:IC.cog }] : []),
    ...(isAdmin ? [{ id:'churchtools', label:'ChurchTools', icon:IC.zap }] : []),
  ];

  return (
    <div className="min-h-screen">
      <ToastContainer toasts={toasts}/>
      <header style={{background:'#000000',borderBottom:'1px solid rgba(255,255,255,0.08)',position:'sticky',top:0,zIndex:50}}>
        {/* ── Row 1: K21 Brand + Profil-Wahl + Sync/Rolle/Logout ── */}
        <div className="max-w-4xl mx-auto px-4 py-3 flex items-center">
          {/* Logo */}
          <div className="flex items-center gap-2.5 flex-shrink-0 w-28">
            <img src="/logo.png" style={{width:30,height:30,filter:'invert(1)',mixBlendMode:'screen'}} alt="K21"/>
            <div className="hidden sm:block">
              <div style={{fontFamily:'Gotham,sans-serif',fontWeight:900,fontSize:12,color:'#ffffff',lineHeight:1,letterSpacing:'-0.03em'}}>DIENSTPLAN</div>
            </div>
          </div>

          {/* Profile switcher — centered */}
          <div className="flex gap-1.5 mx-auto items-center flex-wrap justify-center">
            {canGesamt && (
              <button onClick={() => switchProfile('__gesamt__')}
                className="px-3.5 py-1.5 text-xs font-bold transition-all"
                style={{
                  borderRadius: 30,
                  background: profile==='__gesamt__' ? '#000000' : 'transparent',
                  color: profile==='__gesamt__' ? '#ffffff' : 'rgba(255,255,255,0.35)',
                  border: profile==='__gesamt__' ? '1px solid #475569' : '1px solid rgba(255,255,255,0.1)',
                }}>
                Gesamt
              </button>
            )}
            {visibleProfiles.map(pp => (
              <div key={pp.id} className="relative flex items-center gap-0.5">
                <button onClick={() => switchProfile(pp.id)}
                  className="px-3.5 py-1.5 text-xs font-bold transition-all"
                  style={{
                    borderRadius: 30,
                    background: profile===pp.id ? '#ffffff' : 'transparent',
                    color: profile===pp.id ? '#000000' : 'rgba(255,255,255,0.4)',
                    border: profile===pp.id ? '1px solid transparent' : '1px solid rgba(255,255,255,0.12)',
                  }}>
                  {pp.label}
                </button>
                {isAdmin && (
                  <button onClick={()=>{setHeaderEdit(pp.id);setHeaderEditName(pp.label);setHeaderEditColor(pp.color||'#06b6d4');}}
                    title="Bereich umbenennen"
                    className="w-5 h-5 flex items-center justify-center rounded-full transition-all opacity-40 hover:opacity-100"
                    style={{color:'rgba(255,255,255,0.7)'}}>
                    <SI p={IC.edit} size={12}/>
                  </button>
                )}
              </div>
            ))}
            {isAdmin && (
              <button onClick={()=>{setHeaderEdit('new');setHeaderEditName('');setHeaderEditColor('#06b6d4');}}
                title="Neuer Bereich"
                className="w-7 h-7 flex items-center justify-center rounded-full transition-all opacity-50 hover:opacity-100"
                style={{color:'rgba(255,255,255,0.7)',border:'1px dashed rgba(255,255,255,0.3)'}}>
                <SI p={IC.plus} size={13}/>
              </button>
            )}
          </div>

          {/* Right: sync + role + logout */}
          <div className="flex items-center gap-2.5 flex-shrink-0 w-28 justify-end">
            <SyncDot state={syncState}/>
            <span className="pill text-xs" style={{borderRadius:30, background:currentUser?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.06)', color:currentUser?'#ffffff':'rgba(148,163,184,1)'}}>{currentUser ? currentUser.name.split(' ')[0] : 'Gast'}</span>
            <button onClick={logout} title="Abmelden" className="transition-all opacity-50 hover:opacity-100" style={{color:'#ffffff'}}><SI p={IC.logout} size={14}/></button>
          </div>
        </div>

        {/* ── Row 2: Navigation tabs (centered) ── */}
        <div style={{borderTop:'1px solid rgba(255,255,255,0.06)'}}>
          <div className="max-w-4xl mx-auto px-4 py-2 flex justify-center">
            <nav className="flex gap-1 flex-wrap justify-center">
              {TABS.map(t => (
                <button key={t.id} onClick={() => setPage(t.id)}
                  className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold transition-all"
                  style={{
                    borderRadius: 30,
                    background: page===t.id ? '#ffffff' : 'transparent',
                    color: page===t.id ? '#000000' : 'rgba(255,255,255,0.4)',
                    border: page===t.id ? '1px solid transparent' : '1px solid rgba(255,255,255,0.08)',
                  }}>
                  <SI p={t.icon} size={12}/><span className="hidden sm:inline">{t.label}</span>
                </button>
              ))}
            </nav>
          </div>
        </div>
      </header>
      <main className="max-w-4xl mx-auto px-4 py-6 pb-16">
        {isGesamt && page==='dienstplan' && <GesamtDienstplanView profiles={profiles}/>}
        {!isGesamt && page==='dienstplan'    && <DienstplanView ma={fullMa} onChange={canEdit?updateMa:null} onTausch={currentUser?updateMa:null} toast={toast} allowedGroups={allowedGroups} currentUser={currentUser}/>}
        {!isGesamt && page==='personen'         && <PersonenView       ma={fullMa} onChange={p.edit?updateSharedMa:null} toast={toast} profile={profile} allowedGroups={allowedGroups}/>}
        {!isGesamt && page==='gruppen'          && <GruppenView        ma={fullMa} onChange={canEdit?updateMa:null} onChangeShared={canEdit?updateSharedMa:null} toast={toast} allowedGroups={allowedGroups}/>}
        {!isGesamt && page==='vorlagen'         && <VorlagenView       ma={fullMa} onChange={canEdit?updateMa:null} toast={toast}/>}
        {!isGesamt && page==='verfuegbarkeit'   && <VerfuegbarkeitView ma={fullMa} onChange={canEdit?updateSharedMa:null} onChangeMa={canEdit?updateMa:null} toast={toast}/>}
        {!isGesamt && page==='statistik'        && <StatistikView      ma={fullMa} canEdit={canEdit}/>}
        {!isGesamt && page==='einstellungen' && canSettings && <EinstellungenView ma={fullMa} onChange={updateMa} onChangeShared={updateSharedMa} toast={toast} profile={profile} profiles={profiles} setProfiles={setProfiles} isAdmin={isAdmin}/>}
        {!isGesamt && page==='churchtools'  && isAdmin      && <CTView ma={fullMa} onChange={canEdit?updateMa:null} onChangeShared={updateSharedMa} profiles={profiles} profile={profile} writeMaForProfile={writeMaForProfile} toast={toast}/>}
      </main>
      {headerEdit && (
        <Modal title={headerEdit==='new'?'Neuer Bereich':'Bereich umbenennen'} onClose={()=>setHeaderEdit(null)}>
          <div className="space-y-4">
            <div>
              <label className="text-slate-400 text-xs block mb-1.5">Name</label>
              <input autoFocus value={headerEditName} onChange={e=>setHeaderEditName(e.target.value)}
                placeholder="Bereich-Name…" className={"w-full "+INP}
                onKeyDown={e=>e.key==='Enter'&&saveHeaderEdit()}/>
            </div>
            <div>
              <label className="text-slate-400 text-xs block mb-1.5">Farbe</label>
              <ColorPicker value={headerEditColor} onChange={setHeaderEditColor}/>
            </div>
            <div className="flex gap-2 pt-1">
              <button onClick={saveHeaderEdit} className="flex-1 bg-white hover:bg-gray-100 text-black font-bold py-2.5 text-sm" style={{borderRadius:30}}>Speichern</button>
              <button onClick={()=>setHeaderEdit(null)} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm" style={{borderRadius:30}}>Abbrechen</button>
            </div>
            {headerEdit!=='new' && (
              <button onClick={()=>{
                if (!window.confirm('Bereich wirklich löschen? Alle Daten dieses Bereichs bleiben in Firebase erhalten.')) return;
                const np = profiles.filter(p=>p.id!==headerEdit);
                setProfiles(np); PROFILES=np;
                db.collection('config').doc('profiles').set({data:np}).catch(()=>{});
                setHeaderEdit(null);
                toast('Bereich gelöscht ✓');
              }} className="w-full py-2 text-red-400 hover:text-red-600 text-xs font-medium transition-all text-center" style={{borderRadius:30}}>
                Bereich löschen
              </button>
            )}
          </div>
        </Modal>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
