// VORLAGEN VIEW
// ═══════════════════════════════════════════════════════════════════════════════
const VorlagenView = ({ ma, onChange, toast }) => {
  const [modal, setModal] = useState(null);
  const [form,  setForm]  = useState({ name:'', slots:[] });

  const openAdd  = () => { setForm({ name:'', slots:[] }); setModal('add'); };
  const openEdit = v => { setForm({ name:v.name, slots:v.slots.map(s=>({...s})) }); setModal({ mode:'edit', id:v.id }); };

  const addSlot = () => {
    const g = ma.gruppen[0]; if (!g) return;
    const d = (g.dienste||[])[0];
    setForm(p => ({ ...p, slots:[...p.slots, { id:genId(), gruppeId:g.id, dienstId:d?.id||'', doppelt:false }] }));
  };

  const updSlot = (sid, key, val) => setForm(p => ({ ...p, slots:p.slots.map(s=>s.id===sid?{...s,[key]:val}:s) }));
  const remSlot = sid => setForm(p => ({ ...p, slots:p.slots.filter(s=>s.id!==sid) }));

  const save = () => {
    if (!form.name.trim()) return;
    if (modal==='add') {
      onChange(m => ({ ...m, vorlagen:[...m.vorlagen, { id:genId(), name:form.name.trim(), slots:form.slots }] }));
      toast('Vorlage erstellt');
    } else {
      onChange(m => ({ ...m, vorlagen:m.vorlagen.map(v=>v.id===modal.id?{...v,name:form.name.trim(),slots:form.slots}:v) }));
      toast('Vorlage gespeichert');
    }
    setModal(null);
  };

  const del = v => { onChange(m => ({ ...m, vorlagen:m.vorlagen.filter(x=>x.id!==v.id) })); toast('Vorlage gelöscht','warn'); };

  return (
    <div className="space-y-5 up">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-xl font-bold grad">Vorlagen</h1>
          <p className="text-slate-500 text-sm mt-0.5">Wiederverwendbare Dienstplan-Vorlagen</p>
        </div>
        {onChange && (
          <button onClick={openAdd} disabled={ma.gruppen.length===0}
            className="flex items-center gap-1.5 bg-white hover:bg-gray-100 disabled:opacity-40 text-black text-xs font-bold px-3.5 py-2 transition-all" style={{borderRadius:30}}>
            <SI p={IC.plus} size={13}/> Vorlage
          </button>
        )}
      </div>

      {ma.gruppen.length===0 && (
        <div className="glass rounded-2xl p-4 text-slate-500 text-sm text-center">
          Erstelle zuerst <strong className="text-slate-400">Gruppen &amp; Dienste</strong>.
        </div>
      )}

      {ma.vorlagen.length===0 && ma.gruppen.length>0 && (
        <div className="glass rounded-2xl py-16 text-center">
          <div className="text-slate-400 font-medium mb-1">Noch keine Vorlagen</div>
          {onChange && <button onClick={openAdd} className="mt-2 text-slate-700 hover:text-slate-900 text-sm">Vorlage erstellen</button>}
        </div>
      )}

      <div className="space-y-3">
        {ma.vorlagen.map(v => (
          <div key={v.id} className="glass rounded-2xl p-4 glow">
            <div className="flex items-center gap-2 mb-3">
              <span className="font-semibold text-slate-800">{v.name}</span>
              <span className="text-slate-600 text-xs">{v.slots.length} Slots</span>
              {onChange && (
                <div className="ml-auto flex gap-1">
                  <button onClick={() => openEdit(v)} className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 hover:bg-blue-900/30 text-slate-500 hover:text-blue-400 transition-all"><SI p={IC.edit} size={12}/></button>
                  <button onClick={() => del(v)} className="w-7 h-7 flex items-center justify-center rounded-lg bg-black/5 hover:bg-red-900/25 text-slate-500 hover:text-red-400 transition-all"><SI p={IC.trash} size={12}/></button>
                </div>
              )}
            </div>
            <div className="flex flex-wrap gap-1.5">
              {v.slots.map(s => {
                const g = ma.gruppen.find(x=>x.id===s.gruppeId);
                const d = (g?.dienste||[]).find(x=>x.id===s.dienstId);
                return <span key={s.id} className="pill" style={{background:(g?.farbe||'#8b5cf6')+'22',color:g?.farbe||'#8b5cf6'}}>{d?.name||'?'}{s.doppelt?' ×2':''}</span>;
              })}
            </div>
          </div>
        ))}
      </div>

      {modal && (
        <Modal title={modal==='add'?'Vorlage erstellen':'Vorlage bearbeiten'} onClose={() => setModal(null)} wide>
          <div className="space-y-4">
            <div>
              <label className="text-slate-400 text-xs block mb-1.5">Name *</label>
              <input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}
                placeholder="z. B. Sonntagsgottesdienst" className={"w-full "+INP} autoFocus/>
            </div>
            <div>
              <label className="text-slate-400 text-xs block mb-2">Slots</label>
              <div className="space-y-2">
                {form.slots.map(s => {
                  const g = ma.gruppen.find(x=>x.id===s.gruppeId);
                  return (
                    <div key={s.id} className="flex gap-2 items-center">
                      <select value={s.gruppeId} onChange={e=>{
                          const g2=ma.gruppen.find(x=>x.id===e.target.value);
                          updSlot(s.id,'gruppeId',e.target.value);
                          if(g2?.dienste?.[0]) updSlot(s.id,'dienstId',g2.dienste[0].id);
                        }} className={INP_SM+" flex-1"}>
                        {ma.gruppen.map(g2=><option key={g2.id} value={g2.id}>{g2.name}</option>)}
                      </select>
                      <select value={s.dienstId} onChange={e=>updSlot(s.id,'dienstId',e.target.value)} className={INP_SM+" flex-1"}>
                        <option value="">— Dienst —</option>
                        {(g?.dienste||[]).map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
                      </select>
                      <button type="button" onClick={() => updSlot(s.id,'doppelt',!s.doppelt)} title="Doppelt besetzen"
                        className={`px-2 py-1.5 rounded-lg text-xs font-bold transition-all ${s.doppelt?'bg-amber-600/30 text-amber-400':'bg-black/5 text-slate-600'}`}>×2</button>
                      <button type="button" onClick={() => remSlot(s.id)} className="text-slate-600 hover:text-red-400 transition-all"><SI p={IC.x} size={13}/></button>
                    </div>
                  );
                })}
              </div>
              <button onClick={addSlot} disabled={ma.gruppen.length===0}
                className="mt-2 flex items-center gap-1 text-slate-700 hover:text-slate-900 text-xs transition-all">
                <SI p={IC.plus} size={12}/> Slot hinzufügen
              </button>
            </div>
            <div className="flex gap-2 pt-1">
              <button onClick={save} className="flex-1 bg-white hover:bg-gray-100 text-black font-bold py-2.5 text-sm" style={{borderRadius:30}}>Speichern</button>
              <button onClick={() => setModal(null)} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm" style={{borderRadius:30}}>Abbrechen</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════════════════
// DIENSTPLAN VIEW
// ═══════════════════════════════════════════════════════════════════════════════
const DienstplanView = ({ ma, onChange, onTausch, toast, allowedGroups, currentUser }) => {
  const [view,         setView]        = useState('list');   // 'list' | 'detail'
  const [modal,        setModal]       = useState(null);     // 'create'|'assign'|'wish'|'share'|'addslot'|'tausch'
  const [selSchichtId, setSelSchichtId]= useState(null);
  const [selSlot,      setSelSlot]     = useState(null);     // slot obj + isSecond
  const [wishPid,      setWishPid]     = useState('');
  const [wishForm,     setWishForm]    = useState({});
  const [shareText,    setShareText]   = useState('');
  const [shareScope,   setShareScope]  = useState('single'); // 'single'|'all'
  const [createForm,   setCreateForm]  = useState({ datum:today(), titel:'', vorlageId:'' });
  const [tauschSlot,   setTauschSlot]  = useState(null);    // {slotId, isSecond}
  const [tauschNote,   setTauschNote]  = useState('');

  const selSchicht = useMemo(() => ma.schichten.find(s=>s.id===selSchichtId)||null, [ma.schichten, selSchichtId]);
  const sorted     = useMemo(() => [...ma.schichten].sort((a,b)=>b.datum.localeCompare(a.datum)), [ma.schichten]);
  const myPerson   = useMemo(() => currentUser ? ma.personen.find(p=>p.name===currentUser.name)||null : null, [ma.personen, currentUser]);
  const myGroupIds = useMemo(() => myPerson ? (myPerson.gruppenIds||(myPerson.gruppeId?[myPerson.gruppeId]:[])) : [], [myPerson]);

  // ── Tausch helpers ──
  const submitTausch = () => {
    if (!myPerson||!tauschSlot||!selSchicht) return;
    const req = { id:genId(), schichtId:selSchicht.id, slotId:tauschSlot.slotId, isSecond:tauschSlot.isSecond, personId:myPerson.id, note:tauschNote.trim(), createdAt:new Date().toISOString() };
    onTausch(m=>({ ...m, tauschAnfragen:[...(m.tauschAnfragen||[]),req] }));
    setTauschSlot(null); setTauschNote(''); setModal('detail_view');
    toast('Tausch-Anfrage gestellt 🔄');
  };
  const acceptTausch = req => {
    if (!myPerson||req.personId===myPerson.id) return;
    onTausch(m=>({
      ...m,
      schichten:m.schichten.map(s=>s.id===req.schichtId?{...s,slots:s.slots.map(sl=>sl.id===req.slotId?{...sl,[req.isSecond?'personId2':'personId']:myPerson.id}:sl)}:s),
      tauschAnfragen:(m.tauschAnfragen||[]).filter(r=>r.id!==req.id)
    }));
    toast('Tausch angenommen ✓');
  };
  const cancelTausch = req => {
    if (!myPerson||req.personId!==myPerson.id) return;
    onTausch(m=>({ ...m, tauschAnfragen:(m.tauschAnfragen||[]).filter(r=>r.id!==req.id) }));
    toast('Tausch-Anfrage zurückgezogen');
  };

  // ── helpers ──
  const updateSchicht = (id, updater) => {
    onChange(m => ({ ...m, schichten: m.schichten.map(s => s.id===id ? (typeof updater==='function'?updater(s):{...s,...updater}) : s) }));
  };

  const createSchicht = () => {
    if (!createForm.datum) return;
    const vorlage = ma.vorlagen.find(v=>v.id===createForm.vorlageId);
    const slots = vorlage ? vorlage.slots.map(s=>({ id:genId(), gruppeId:s.gruppeId, dienstId:s.dienstId, doppelt:s.doppelt||false, personId:'', personId2:'' })) : [];
    const neu = { id:genId(), datum:createForm.datum, titel:createForm.titel.trim(), slots, wuensche:[], veroeffentlicht:false };
    onChange(m => ({ ...m, schichten:[...m.schichten, neu] }));
    setSelSchichtId(neu.id); setView('detail'); setModal(null);
    toast('Schicht erstellt');
  };

  const deleteSchicht = id => {
    onChange(m => ({ ...m, schichten:m.schichten.filter(s=>s.id!==id) }));
    setView('list'); setSelSchichtId(null);
    toast('Schicht gelöscht','warn');
  };

  const togglePublish = () => {
    if (!selSchicht) return;
    updateSchicht(selSchicht.id, s=>({ ...s, veroeffentlicht:!s.veroeffentlicht }));
    toast(selSchicht.veroeffentlicht?'Unveröffentlicht':'Veröffentlicht ✓');
  };

  const assignPerson = (slotId, personId, isSecond) => {
    if (!selSchicht) return;
    const field = isSecond ? 'personId2' : 'personId';
    updateSchicht(selSchicht.id, s => ({
      ...s, slots: s.slots.map(sl => sl.id===slotId ? { ...sl, [field]: sl[field]===personId?'':personId } : sl)
    }));
    setModal('detail_view');
  };

  const addSchSlot = () => {
    if (!selSchicht) return;
    const g = ma.gruppen[0]; if (!g) return;
    const d = (g.dienste||[])[0];
    updateSchicht(selSchicht.id, s => ({ ...s, slots:[...s.slots, { id:genId(), gruppeId:g.id, dienstId:d?.id||'', doppelt:false, personId:'', personId2:'' }] }));
    toast('Slot hinzugefügt');
  };

  const remSchSlot = slotId => {
    if (!selSchicht) return;
    updateSchicht(selSchicht.id, s=>({ ...s, slots:s.slots.filter(sl=>sl.id!==slotId) }));
  };

  const saveWishes = () => {
    if (!selSchicht) return;
    const other = (selSchicht.wuensche||[]).filter(w=>w.personId!==wishPid);
    const mine  = Object.entries(wishForm).filter(([,v])=>v).map(([slotId,art])=>({ personId:wishPid, slotId, art }));
    updateSchicht(selSchicht.id, s=>({ ...s, wuensche:[...other,...mine] }));
    toast('Wünsche gespeichert'); setModal('detail_view');
  };

  const runAuto = () => {
    if (!selSchicht) return;
    const counts = {};
    ma.personen.forEach(p=>{ counts[p.id]=0; });
    ma.schichten.forEach(s => s.slots.forEach(sl => {
      if(sl.personId)  counts[sl.personId]  = (counts[sl.personId]||0)+1;
      if(sl.personId2) counts[sl.personId2] = (counts[sl.personId2]||0)+1;
    }));

    const konflikte = ma.konflikte || [];
    // Returns true if pid conflicts with anyone already in the shift
    const conflictsWith = (pid, alreadyInShift) =>
      konflikte.some(k =>
        (k.p1===pid && alreadyInShift.has(k.p2)) ||
        (k.p2===pid && alreadyInShift.has(k.p1))
      );

    const usedNow = new Set();
    const newSlots = selSchicht.slots.map(sl => {
      // Skip slots whose group the user has no access to
      if (allowedGroups && !allowedGroups.includes(sl.gruppeId)) return {...sl};
      const eligible = ma.personen.filter(p => {
        if (!(p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).includes(sl.gruppeId)) return false;
        if ((p.dienste||[]).length>0 && !(p.dienste||[]).includes(sl.dienstId)) return false;
        const w = (selSchicht.wuensche||[]).find(x=>x.personId===p.id&&x.slotId===sl.id);
        return w?.art !== 'wunschfrei';
      });
      const pick = (excl) => {
        const ok = p => !excl.has(p.id) && !conflictsWith(p.id, usedNow);
        const wunsch = eligible.filter(p=>{ const w=(selSchicht.wuensche||[]).find(x=>x.personId===p.id&&x.slotId===sl.id); return w?.art==='wunschdienst'&&ok(p); });
        const rest   = eligible.filter(p=>ok(p)&&!wunsch.find(x=>x.id===p.id));
        const pool   = [...wunsch, ...rest.sort((a,b)=>(counts[a.id]||0)-(counts[b.id]||0))];
        if (!pool.length) return '';
        const p = pool[0]; counts[p.id]=(counts[p.id]||0)+1; excl.add(p.id); return p.id;
      };
      const p1 = pick(new Set(usedNow)); if(p1) usedNow.add(p1);
      const p2 = sl.doppelt ? pick(new Set(usedNow)) : ''; if(p2) usedNow.add(p2);
      return { ...sl, personId:p1, personId2:p2 };
    });
    updateSchicht(selSchicht.id, s=>({ ...s, slots:newSlots }));
    toast('Auto-Einteilung abgeschlossen ⚡');
  };

  const runAutoAll = () => {
    if (!onChange) return;
    if (!confirm('Alle Schichten automatisch einteilen?\nBestehende Einteilungen werden überschrieben.')) return;
    const counts = {};
    ma.personen.forEach(p=>{ counts[p.id]=0; });
    const konflikte = ma.konflikte||[];
    const conflictsWith = (pid, set) => konflikte.some(k=>(k.p1===pid&&set.has(k.p2))||(k.p2===pid&&set.has(k.p1)));
    const newSchichten = [...ma.schichten].sort((a,b)=>a.datum.localeCompare(b.datum)).map(s=>{
      const usedNow = new Set();
      const newSlots = s.slots.map(sl=>{
        if(allowedGroups&&!allowedGroups.includes(sl.gruppeId)) return {...sl};
        const eligible = ma.personen.filter(p=>{
          if(!(p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).includes(sl.gruppeId)) return false;
          if((p.dienste||[]).length>0&&!(p.dienste||[]).includes(sl.dienstId)) return false;
          const w=(s.wuensche||[]).find(x=>x.personId===p.id&&x.slotId===sl.id);
          return w?.art!=='wunschfrei';
        });
        const pick = excl=>{
          const ok=p=>!excl.has(p.id)&&!conflictsWith(p.id,usedNow);
          const wunsch=eligible.filter(p=>{const w=(s.wuensche||[]).find(x=>x.personId===p.id&&x.slotId===sl.id);return w?.art==='wunschdienst'&&ok(p);});
          const rest=eligible.filter(p=>ok(p)&&!wunsch.find(x=>x.id===p.id));
          const pool=[...wunsch,...rest.sort((a,b)=>(counts[a.id]||0)-(counts[b.id]||0))];
          if(!pool.length) return '';
          const p=pool[0]; counts[p.id]=(counts[p.id]||0)+1; excl.add(p.id); return p.id;
        };
        const p1=pick(new Set(usedNow)); if(p1) usedNow.add(p1);
        const p2=sl.doppelt?pick(new Set(usedNow)):''; if(p2) usedNow.add(p2);
        return {...sl,personId:p1,personId2:p2};
      });
      return {...s,slots:newSlots};
    });
    onChange(m=>({...m,schichten:newSchichten}));
    toast(`${ma.schichten.length} Schichten auto-eingeteilt ⚡`);
  };

  const buildShareText = s => {
    const lines = [`📅 *${s.titel||fmtDe(s.datum)}* — ${fmtDe(s.datum)}\n`];
    s.slots.forEach(sl => {
      const g  = ma.gruppen.find(x=>x.id===sl.gruppeId);
      const d  = (g?.dienste||[]).find(x=>x.id===sl.dienstId);
      const p1 = ma.personen.find(x=>x.id===sl.personId);
      const p2 = sl.doppelt ? ma.personen.find(x=>x.id===sl.personId2) : null;
      const names = [p1?.name,p2?.name].filter(Boolean).join(' & ') || '—';
      lines.push(`• ${d?.name||'?'}: ${names}`);
    });
    return lines.join('\n');
  };

  // ── List View ──
  if (view==='list') return (
    <div className="space-y-5 up">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-xl font-bold grad">Dienstplan</h1>
          <p className="text-slate-500 text-sm mt-0.5">{ma.schichten.length} Schichten</p>
        </div>
        <div className="flex gap-2">
          {onChange && !allowedGroups && <button onClick={runAutoAll} disabled={ma.schichten.length===0}
            className="flex items-center gap-1.5 bg-white hover:bg-gray-100 disabled:opacity-40 text-black text-xs font-bold px-3.5 py-2 transition-all" style={{borderRadius:30}}>
            <SI p={IC.zap} size={13}/> Auto-Plan
          </button>}
          {ma.schichten.length>0 && <button onClick={()=>{ setShareScope('all'); setShareText(buildPlanText(ma)); setModal('share'); }}
            className="flex items-center gap-1.5 bg-white hover:bg-gray-100 text-black text-xs font-bold px-3.5 py-2 transition-all" style={{borderRadius:30}}>
            <SI p={IC.send} size={13}/> Teilen
          </button>}
          {onChange && !allowedGroups && <button onClick={() => { setCreateForm({ datum:today(), titel:'', vorlageId:ma.vorlagen[0]?.id||'' }); setModal('create'); }}
            className="flex items-center gap-1.5 bg-white hover:bg-gray-100 text-black text-xs font-bold px-3.5 py-2 transition-all" style={{borderRadius:30}}>
            <SI p={IC.plus} size={13}/> Schicht
          </button>}
        </div>
      </div>

      {sorted.length===0 ? (
        <div className="glass rounded-2xl py-16 text-center">
          <div className="text-slate-400 font-medium mb-1">Noch keine Schichten</div>
          {onChange && <button onClick={() => { setCreateForm({ datum:today(), titel:'', vorlageId:'' }); setModal('create'); }}
            className="mt-2 text-slate-700 hover:text-slate-900 text-sm">Erste Schicht erstellen</button>}
        </div>
      ) : (
        <div className="space-y-3">
          {sorted.map(s => {
            const filled = s.slots.filter(sl=>sl.personId).length;
            const openRequests = (ma.tauschAnfragen||[]).filter(r=>r.schichtId===s.id).length;
            return (
              <div key={s.id} className="glass glass-hover rounded-2xl p-4 cursor-pointer transition-all"
                onClick={() => { setSelSchichtId(s.id); setView('detail'); }}>
                <div className="flex items-start gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap mb-1.5">
                      <span className="font-semibold text-slate-800 text-sm">{fmtDe(s.datum)}</span>
                      {s.titel && <span className="text-slate-700 text-sm">{s.titel}</span>}
                      {s.veroeffentlicht
                        ? <span className="pill" style={{background:'rgba(16,185,129,0.15)',color:'#10b981'}}>✓ Veröffentlicht</span>
                        : <span className="pill" style={{background:'rgba(100,116,139,0.15)',color:'#64748b'}}>Entwurf</span>}
                      {openRequests>0 && <span className="pill" style={{background:'rgba(251,146,60,0.18)',color:'#f97316'}}>🔄 {openRequests} Tausch</span>}
                    </div>
                    <div className="text-slate-600 text-xs mb-2">{filled}/{s.slots.length} Slots besetzt</div>
                    <div className="flex flex-wrap gap-1">
                      {s.slots.slice(0,8).map(sl => {
                        const g = ma.gruppen.find(x=>x.id===sl.gruppeId);
                        const p = ma.personen.find(x=>x.id===sl.personId);
                        const col = g?.farbe||'#8b5cf6';
                        return <span key={sl.id} className="pill" style={{background:p?col+'22':'rgba(0,0,0,0.05)',color:p?col:'#64748b'}}>{p?p.name:'—'}</span>;
                      })}
                      {s.slots.length>8 && <span className="text-slate-600 text-xs ml-1">+{s.slots.length-8}</span>}
                    </div>
                  </div>
                  {onChange && !allowedGroups && <button onClick={e=>{e.stopPropagation();if(confirm('Schicht löschen?'))deleteSchicht(s.id);}}
                    className="w-7 h-7 flex-shrink-0 flex items-center justify-center rounded-lg bg-black/5 hover:bg-red-900/25 text-slate-600 hover:text-red-400 transition-all">
                    <SI p={IC.trash} size={12}/>
                  </button>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {modal==='create' && (
        <Modal title="Neue Schicht erstellen" onClose={() => setModal(null)}>
          <div className="space-y-4">
            <div>
              <label className="text-slate-400 text-xs block mb-1.5">Datum *</label>
              <input type="date" value={createForm.datum} onChange={e=>setCreateForm(p=>({...p,datum:e.target.value}))} className={"w-full "+INP} autoFocus/>
            </div>
            <div>
              <label className="text-slate-400 text-xs block mb-1.5">Titel</label>
              <input value={createForm.titel} onChange={e=>setCreateForm(p=>({...p,titel:e.target.value}))}
                placeholder="z. B. Sonntagsgottesdienst" className={"w-full "+INP}
                onKeyDown={e=>e.key==='Enter'&&createSchicht()}/>
            </div>
            {ma.vorlagen.length>0 && (
              <div>
                <label className="text-slate-400 text-xs block mb-1.5">Vorlage</label>
                <select value={createForm.vorlageId} onChange={e=>setCreateForm(p=>({...p,vorlageId:e.target.value}))} className={"w-full "+INP}>
                  <option value="">— Keine Vorlage (leere Schicht) —</option>
                  {ma.vorlagen.map(v=><option key={v.id} value={v.id}>{v.name} ({v.slots.length} Slots)</option>)}
                </select>
              </div>
            )}
            <div className="flex gap-2 pt-1">
              <button onClick={createSchicht} className="flex-1 bg-white hover:bg-gray-100 text-black font-bold py-2.5 text-sm" style={{borderRadius:30}}>Erstellen</button>
              <button onClick={() => setModal(null)} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm" style={{borderRadius:30}}>Abbrechen</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );

  // ── Detail View ──
  if (!selSchicht) { setView('list'); return null; }

  return (
    <div className="space-y-4 up">
      {/* Header */}
      <div className="flex items-center gap-3">
        <button onClick={() => setView('list')} className="w-8 h-8 flex items-center justify-center rounded-xl bg-black/5 hover:bg-black/5 text-slate-400 transition-all">
          <SI p={IC.chevLeft} size={16}/>
        </button>
        <div className="flex-1 min-w-0">
          <h1 className="text-lg font-bold text-slate-100 leading-none">{fmtDe(selSchicht.datum)}{selSchicht.titel?' — '+selSchicht.titel:''}</h1>
          <div className="text-slate-500 text-xs mt-0.5">{selSchicht.slots.filter(sl=>sl.personId).length}/{selSchicht.slots.length} Slots besetzt</div>
        </div>
      </div>

      {/* Action Bar */}
      <div className="flex gap-2 flex-wrap">
        {onChange && !allowedGroups && <>
          <button onClick={togglePublish}
            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${selSchicht.veroeffentlicht?'bg-emerald-900/30 text-emerald-400 hover:bg-emerald-900/40':'bg-black/5 text-slate-700 hover:bg-black/10'}`}>
            {selSchicht.veroeffentlicht?'✓ Veröffentlicht':'Veröffentlichen'}
          </button>
          <button onClick={runAuto} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold bg-amber-600/20 text-amber-400 hover:bg-amber-600/30 transition-all">
            <SI p={IC.zap} size={12}/> Auto-Einteilung
          </button>
        </>}
        <button onClick={()=>{ setShareScope('single'); setShareText(buildPlanText(ma,selSchicht)); setModal('share'); }}
          className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold bg-black/5 text-slate-700 hover:bg-black/8 transition-all">
          <SI p={IC.send} size={12}/> Teilen
        </button>
        {onChange && !allowedGroups && (
          <button onClick={addSchSlot} disabled={ma.gruppen.length===0}
            className="ml-auto flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold bg-black/8 text-slate-800 hover:bg-black/12 disabled:opacity-40 transition-all">
            <SI p={IC.plus} size={12}/> Slot
          </button>
        )}
      </div>

      {/* Slots */}
      <div className="space-y-2">
        {selSchicht.slots.length===0 && (
          <div className="glass rounded-2xl py-10 text-center text-slate-600 text-sm">
            Keine Slots. Klicke "+ Slot" oder erstelle eine Vorlage.
          </div>
        )}
        {selSchicht.slots.map(sl => {
          const g  = ma.gruppen.find(x=>x.id===sl.gruppeId);
          const d  = (g?.dienste||[]).find(x=>x.id===sl.dienstId);
          const p1 = ma.personen.find(x=>x.id===sl.personId);
          const p2 = sl.doppelt ? ma.personen.find(x=>x.id===sl.personId2) : null;
          const col = g?.farbe||'#8b5cf6';
          const wCount = (selSchicht.wuensche||[]).filter(w=>w.slotId===sl.id).length;

          return (
            <div key={sl.id} className="glass rounded-2xl p-3">
              <div className="flex items-center gap-2 mb-2">
                <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:col}}/>
                <span className="text-xs font-semibold text-slate-500">{g?.name||'?'}</span>
                <span className="text-slate-700 text-xs">›</span>
                <span className="text-xs font-semibold text-slate-700">{d?.name||'?'}</span>
                {sl.doppelt && <span className="pill text-xs" style={{background:'rgba(245,158,11,0.15)',color:'#f59e0b'}}>×2</span>}
                {wCount>0 && <span className="pill text-xs" style={{background:'rgba(245,158,11,0.1)',color:'#f59e0b'}}>{wCount} Wünsche</span>}
                {onChange && <button onClick={() => remSchSlot(sl.id)} className="ml-auto text-slate-700 hover:text-red-400 transition-all"><SI p={IC.x} size={12}/></button>}
              </div>
              <div className="flex gap-2 flex-wrap items-center">
                {/* Assign P1 — clickable for admin/allowed group, read-only otherwise */}
                {(onChange && (!allowedGroups || allowedGroups.includes(sl.gruppeId)))
                  ? <button onClick={() => { setSelSlot({...sl,isSecond:false}); setModal('assign'); }}
                      className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-medium transition-all"
                      style={p1?{background:p1.farbe+'25',color:p1.farbe,border:`1px solid ${p1.farbe}44`}:{background:'rgba(0,0,0,0.04)',color:'#64748b',border:'1px solid rgba(0,0,0,0.08)'}}>
                      {p1?<><Avatar name={p1.name} farbe={p1.farbe} size={16}/><span>{p1.name}</span></>:'+ Zuweisen'}
                    </button>
                  : p1 && <span className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-medium" style={{background:p1.farbe+'25',color:p1.farbe,border:`1px solid ${p1.farbe}44`}}><Avatar name={p1.name} farbe={p1.farbe} size={16}/>{p1.name}</span>
                }
                {/* Assign P2 */}
                {sl.doppelt && ((onChange && (!allowedGroups || allowedGroups.includes(sl.gruppeId)))
                  ? <button onClick={() => { setSelSlot({...sl,isSecond:true}); setModal('assign'); }}
                      className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-medium transition-all"
                      style={p2?{background:p2.farbe+'25',color:p2.farbe,border:`1px solid ${p2.farbe}44`}:{background:'rgba(0,0,0,0.04)',color:'#64748b',border:'1px solid rgba(0,0,0,0.08)'}}>
                      {p2?<><Avatar name={p2.name} farbe={p2.farbe} size={16}/><span>{p2.name}</span></>:'+ Zuweisen (2)'}
                    </button>
                  : p2 && <span className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-medium" style={{background:p2.farbe+'25',color:p2.farbe,border:`1px solid ${p2.farbe}44`}}><Avatar name={p2.name} farbe={p2.farbe} size={16}/>{p2.name}</span>
                )}
                {/* Tausch buttons — shown when myPerson is assigned to this slot */}
                {onTausch && myPerson && sl.personId===myPerson.id && !(ma.tauschAnfragen||[]).some(r=>r.slotId===sl.id&&!r.isSecond) && (
                  <button onClick={()=>{setTauschSlot({slotId:sl.id,isSecond:false});setTauschNote('');setModal('tausch');}}
                    className="flex items-center gap-1 px-2 py-1 rounded-lg text-xs font-medium transition-all"
                    style={{background:'rgba(251,146,60,0.12)',color:'#f97316',border:'1px solid rgba(251,146,60,0.25)'}}>
                    🔄 Tauschen
                  </button>
                )}
                {onTausch && myPerson && sl.doppelt && sl.personId2===myPerson.id && !(ma.tauschAnfragen||[]).some(r=>r.slotId===sl.id&&r.isSecond) && (
                  <button onClick={()=>{setTauschSlot({slotId:sl.id,isSecond:true});setTauschNote('');setModal('tausch');}}
                    className="flex items-center gap-1 px-2 py-1 rounded-lg text-xs font-medium transition-all"
                    style={{background:'rgba(251,146,60,0.12)',color:'#f97316',border:'1px solid rgba(251,146,60,0.25)'}}>
                    🔄 Tauschen (2)
                  </button>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Wünsche Section — nur für Admin */}
      {onChange && selSchicht.slots.length>0 && (
        <div className="glass rounded-2xl p-4">
          <div className="text-slate-500 text-xs font-semibold uppercase tracking-wider mb-3">Wünsche bearbeiten</div>
          <div className="flex flex-wrap gap-2">
            {ma.personen.filter(p => { const gids=p.gruppenIds||(p.gruppeId?[p.gruppeId]:[]);return ma.gruppen.some(g=>gids.includes(g.id)&&selSchicht.slots.some(sl=>sl.gruppeId===g.id)); }).map(p => {
              const myWishes = (selSchicht.wuensche||[]).filter(w=>w.personId===p.id);
              return (
                <button key={p.id} onClick={() => {
                    setWishPid(p.id);
                    const wm={};
                    myWishes.forEach(w=>wm[w.slotId]=w.art);
                    setWishForm(wm); setModal('wish');
                  }}
                  className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs transition-all"
                  style={{background:'rgba(0,0,0,0.04)',border:'1px solid rgba(0,0,0,0.08)',color:'#64748b'}}>
                  <Avatar name={p.name} farbe={p.farbe} size={18}/>
                  {p.name}
                  {myWishes.length>0&&<span style={{color:'#f59e0b',fontSize:10}}>({myWishes.length})</span>}
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* Tausch-Anfragen Section */}
      {onTausch && (() => {
        const schichtReqs = (ma.tauschAnfragen||[]).filter(r=>r.schichtId===selSchicht.id);
        const visReqs = schichtReqs.filter(r=>{
          const requester=ma.personen.find(p=>p.id===r.personId);
          if(!requester) return false;
          const rGrps=requester.gruppenIds||(requester.gruppeId?[requester.gruppeId]:[]);
          // Owner/admin see all; others see requests from their own groups
          if(!myPerson) return true;
          return rGrps.some(g=>myGroupIds.includes(g))||r.personId===myPerson.id;
        });
        if(visReqs.length===0) return null;
        return (
          <div className="glass rounded-2xl p-4 space-y-2">
            <div className="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2">🔄 Tausch-Anfragen</div>
            {visReqs.map(r=>{
              const requester=ma.personen.find(p=>p.id===r.personId);
              const schicht2=ma.schichten.find(s=>s.id===r.schichtId);
              const slot2=schicht2?.slots.find(sl=>sl.id===r.slotId);
              const g=ma.gruppen.find(x=>x.id===slot2?.gruppeId);
              const d=(g?.dienste||[]).find(x=>x.id===slot2?.dienstId);
              const isOwn=myPerson?.id===r.personId;
              const canAccept=myPerson&&!isOwn&&(myPerson.gruppenIds||(myPerson.gruppeId?[myPerson.gruppeId]:[])).includes(slot2?.gruppeId||'');
              return (
                <div key={r.id} className="flex items-center gap-3 p-2.5 rounded-xl" style={{background:'rgba(251,146,60,0.06)',border:'1px solid rgba(251,146,60,0.15)'}}>
                  <Avatar name={requester?.name||'?'} farbe={requester?.farbe||'#f97316'} size={28}/>
                  <div className="flex-1 min-w-0">
                    <div className="text-xs font-semibold text-slate-700">{requester?.name||'?'} · <span style={{color:g?.farbe}}>{d?.name||'?'}</span></div>
                    {r.note && <div className="text-slate-500 text-xs truncate">„{r.note}"</div>}
                  </div>
                  {canAccept && <button onClick={()=>acceptTausch(r)}
                    className="px-3 py-1.5 rounded-lg text-xs font-bold transition-all"
                    style={{background:'rgba(16,185,129,0.15)',color:'#10b981'}}>Annehmen</button>}
                  {isOwn && <button onClick={()=>cancelTausch(r)}
                    className="px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-slate-500 hover:text-red-400">Zurückziehen</button>}
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* Tausch Modal */}
      {modal==='tausch' && tauschSlot && selSchicht && (() => {
        const slot2=selSchicht.slots.find(sl=>sl.id===tauschSlot.slotId);
        const g=ma.gruppen.find(x=>x.id===slot2?.gruppeId);
        const d=(g?.dienste||[]).find(x=>x.id===slot2?.dienstId);
        return (
          <Modal title="Tausch-Anfrage stellen" onClose={()=>setModal('detail_view')}>
            <div className="space-y-4">
              <p className="text-slate-500 text-sm">Dein Dienst <strong style={{color:g?.farbe}}>{d?.name||'?'}</strong> wird für alle in deiner Gruppe sichtbar. Wer annimmt, übernimmt den Dienst.</p>
              <div>
                <label className="text-slate-400 text-xs block mb-1.5">Nachricht (optional)</label>
                <input value={tauschNote} onChange={e=>setTauschNote(e.target.value)}
                  placeholder="z. B. bin krank, bitte jemand übernehmen"
                  className={"w-full "+INP} autoFocus onKeyDown={e=>e.key==='Enter'&&submitTausch()}/>
              </div>
              <div className="flex gap-2 pt-1">
                <button onClick={submitTausch} className="flex-1 bg-white hover:bg-gray-100 text-black font-bold py-2.5 text-sm" style={{borderRadius:30}}>Anfrage stellen</button>
                <button onClick={()=>setModal('detail_view')} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm" style={{borderRadius:30}}>Abbrechen</button>
              </div>
            </div>
          </Modal>
        );
      })()}

      {/* Assign Modal */}
      {modal==='assign' && selSlot && (() => {
        const g = ma.gruppen.find(x=>x.id===selSlot.gruppeId);
        const d = (g?.dienste||[]).find(x=>x.id===selSlot.dienstId);
        const eligible = ma.personen.filter(p=>(p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).includes(selSlot.gruppeId));
        const cur = selSlot.isSecond ? selSlot.personId2 : selSlot.personId;
        return (
          <Modal title={`Zuweisen: ${d?.name||'?'}`} onClose={() => setModal(null)}>
            <div className="space-y-1.5">
              {eligible.length===0&&<div className="text-slate-500 text-sm py-4 text-center">Keine Personen in dieser Gruppe.</div>}
              {eligible.map(p => {
                const sel = cur===p.id;
                const wish = (selSchicht.wuensche||[]).find(w=>w.personId===p.id&&w.slotId===selSlot.id);
                return (
                  <button key={p.id} onClick={() => assignPerson(selSlot.id,p.id,selSlot.isSecond)}
                    className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all"
                    style={sel?{background:p.farbe+'30',border:`1px solid ${p.farbe}55`}:{background:'rgba(0,0,0,0.03)',border:'1px solid rgba(0,0,0,0.08)'}}>
                    <Avatar name={p.name} farbe={p.farbe} size={34}/>
                    <div className="flex-1 text-left">
                      <div className="font-semibold text-sm" style={{color:sel?p.farbe:'#e2e8f0'}}>{p.name}</div>
                      {wish&&<div className="text-xs" style={{color:wish.art==='wunschdienst'?'#10b981':'#ef4444'}}>{wish.art==='wunschdienst'?'✓ Wunschdienst':'✕ Wunschfrei'}</div>}
                    </div>
                    {sel&&<SI p={IC.check} size={14} stroke={3}/>}
                  </button>
                );
              })}
            </div>
          </Modal>
        );
      })()}

      {/* Wish Modal */}
      {modal==='wish' && wishPid && (() => {
        const person = ma.personen.find(p=>p.id===wishPid);
        const personGrpIds=person?.gruppenIds||(person?.gruppeId?[person.gruppeId]:[]);
        const relSlots = selSchicht.slots.filter(sl=>personGrpIds.includes(sl.gruppeId));
        return (
          <Modal title={`Wünsche: ${person?.name||'?'}`} onClose={() => setModal(null)}>
            <div className="space-y-3">
              {relSlots.length===0&&<div className="text-slate-500 text-sm">Keine relevanten Slots.</div>}
              {relSlots.map(sl => {
                const g = ma.gruppen.find(x=>x.id===sl.gruppeId);
                const d = (g?.dienste||[]).find(x=>x.id===sl.dienstId);
                const art = wishForm[sl.id]||'';
                return (
                  <div key={sl.id} className="flex items-center gap-2">
                    <span className="flex-1 text-sm text-slate-700 truncate">{d?.name||'?'}</span>
                    {['','wunschdienst','wunschfrei'].map(v=>(
                      <button key={v} onClick={() => setWishForm(p=>({...p,[sl.id]:v}))}
                        className={`px-2.5 py-1 rounded-lg text-xs font-medium transition-all whitespace-nowrap ${art===v?v==='wunschdienst'?'bg-emerald-900/40 text-emerald-400':v==='wunschfrei'?'bg-red-900/30 text-red-400':'bg-black/10 text-slate-800':'bg-black/5 text-slate-600 hover:bg-black/5'}`}>
                        {v===''?'Egal':v==='wunschdienst'?'✓ Wunsch':'✕ Frei'}
                      </button>
                    ))}
                  </div>
                );
              })}
              <div className="flex gap-2 pt-2">
                <button onClick={saveWishes} className="flex-1 bg-white hover:bg-gray-100 text-black font-bold py-2.5 text-sm" style={{borderRadius:30}}>Speichern</button>
                <button onClick={() => setModal(null)} className="px-4 py-2.5 bg-black/5 text-slate-400 text-sm" style={{borderRadius:30}}>Abbrechen</button>
              </div>
            </div>
          </Modal>
        );
      })()}

      {/* Share Modal */}
      {modal==='share' && (
        <Modal title={shareScope==='all'?'Gesamtplan teilen':'Schicht teilen'} onClose={() => setModal(null)}>
          <div className="space-y-4">
            {/* Preview */}
            <div className="rounded-2xl overflow-auto max-h-48" style={{background:'rgba(0,0,0,0.03)',border:'1px solid rgba(0,0,0,0.06)'}}>
              <pre className="text-xs text-slate-700 font-mono whitespace-pre-wrap leading-relaxed p-4">{shareText}</pre>
            </div>
            {/* Action buttons */}
            <div className="grid grid-cols-3 gap-2">
              <button onClick={()=>{ exportExcelPlan(ma, selSchicht?.datum||today(), shareScope==='single'?selSchicht:null); toast('Excel exportiert ✓'); }}
                className="flex flex-col items-center gap-2 py-4 rounded-2xl transition-all border"
                style={{background:'rgba(16,185,129,0.06)',borderColor:'rgba(16,185,129,0.2)',color:'#059669'}}>
                <SI p={IC.download} size={18} stroke={1.8}/>
                <span className="text-xs font-bold">Excel</span>
              </button>
              <button onClick={()=>navigator.clipboard?.writeText(shareText).then(()=>toast('Kopiert! 📋')).catch(()=>alert(shareText))}
                className="flex flex-col items-center gap-2 py-4 rounded-2xl transition-all border"
                style={{background:'rgba(59,130,246,0.06)',borderColor:'rgba(59,130,246,0.2)',color:'#2563eb'}}>
                <SI p={IC.copy} size={18} stroke={1.8}/>
                <span className="text-xs font-bold">Kopieren</span>
              </button>
              <button onClick={()=>{
                const w=window.open('','_blank','width=800,height=600');
                const rows = shareScope==='single'&&selSchicht
                  ? selSchicht.slots.map(sl=>{const g=ma.gruppen.find(x=>x.id===sl.gruppeId);const d=(g?.dienste||[]).find(x=>x.id===sl.dienstId);const p1=ma.personen.find(x=>x.id===sl.personId);const p2=sl.doppelt?ma.personen.find(x=>x.id===sl.personId2):null;return `<tr><td>${g?.name||''}</td><td>${d?.name||''}</td><td>${p1?.name||'—'}</td><td>${p2?.name||''}</td></tr>`;}).join('')
                  : [...ma.schichten].sort((a,b)=>a.datum.localeCompare(b.datum)).map(s=>`<tr><td colspan="4" style="background:#f1f5f9;font-weight:700;padding:10px 12px">${fmtDe(s.datum)}${s.titel?' — '+s.titel:''}</td></tr>`+s.slots.map(sl=>{const g=ma.gruppen.find(x=>x.id===sl.gruppeId);const d=(g?.dienste||[]).find(x=>x.id===sl.dienstId);const p1=ma.personen.find(x=>x.id===sl.personId);const p2=sl.doppelt?ma.personen.find(x=>x.id===sl.personId2):null;return `<tr><td>${g?.name||''}</td><td>${d?.name||''}</td><td>${p1?.name||'—'}</td><td>${p2?.name||''}</td></tr>`;}).join('')).join('');
                w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Dienstplan</title><style>body{font-family:system-ui,sans-serif;margin:32px;color:#0f172a}h2{font-size:1.2rem;font-weight:800;margin-bottom:16px}table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;padding:8px 12px;background:#0f172a;color:#fff;font-weight:600}td{padding:8px 12px;border-bottom:1px solid #e2e8f0}tr:hover td{background:#f8fafc}@media print{button{display:none}}</style></head><body><h2>${shareScope==='single'&&selSchicht?(fmtDe(selSchicht.datum)+(selSchicht.titel?' — '+selSchicht.titel:'')):'Dienstplan'}</h2><table><thead><tr><th>Gruppe</th><th>Dienst</th><th>Person 1</th><th>Person 2</th></tr></thead><tbody>${rows}</tbody></table><br/><button onclick="window.print()" style="padding:10px 24px;background:#000;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700">Drucken / Als PDF speichern</button></body></html>`);
                w.document.close();
              }}
                className="flex flex-col items-center gap-2 py-4 rounded-2xl transition-all border"
                style={{background:'rgba(100,116,139,0.06)',borderColor:'rgba(100,116,139,0.2)',color:'#475569'}}>
                <SI p={IC.printer} size={18} stroke={1.8}/>
                <span className="text-xs font-bold">PDF</span>
              </button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

// STATISTIK VIEW
// ═══════════════════════════════════════════════════════════════════════════════
const StatistikView = ({ ma }) => {
  const stats = useMemo(() => {
    return ma.personen.map(p => {
      let total = 0;
      const byDienst = {};
      ma.schichten.forEach(s => s.slots.forEach(sl => {
        const hit = sl.personId===p.id || sl.personId2===p.id;
        if (!hit) return;
        total++;
        const g = ma.gruppen.find(x=>x.id===sl.gruppeId);
        const d = (g?.dienste||[]).find(x=>x.id===sl.dienstId);
        const key = d?.name||'?';
        byDienst[key] = (byDienst[key]||0)+1;
      }));
      return { p, total, byDienst };
    }).sort((a,b) => b.total-a.total);
  }, [ma]);

  const maxVal = stats.length ? Math.max(...stats.map(s=>s.total), 1) : 1;

  return (
    <div className="space-y-5 up">
      <div>
        <h1 className="text-xl font-bold grad">Statistik</h1>
        <p className="text-slate-500 text-sm mt-0.5">Einsätze pro Mitarbeiter</p>
      </div>
      {stats.length===0 ? (
        <div className="glass rounded-2xl py-16 text-center text-slate-600">Noch keine Daten</div>
      ) : (
        <div className="space-y-3">
          {stats.map(({ p, total, byDienst }) => {
            const gruppen2 = (p.gruppenIds||(p.gruppeId?[p.gruppeId]:[])).map(gid=>ma.gruppen.find(g=>g.id===gid)).filter(Boolean);
            const pct = Math.round((total/maxVal)*100);
            return (
              <div key={p.id} className="glass rounded-2xl p-4 glow">
                <div className="flex items-center gap-3 mb-2">
                  <Avatar name={p.name} farbe={p.farbe} size={36}/>
                  <div className="flex-1 min-w-0">
                    <div className="font-semibold text-slate-800 text-sm">{p.name}</div>
                    {gruppen2.length>0&&<div className="flex gap-1.5 flex-wrap">{gruppen2.map(g=><span key={g.id} className="text-xs" style={{color:g.farbe}}>{g.name}</span>)}</div>}
                  </div>
                  <div className="text-2xl font-black" style={{color:p.farbe}}>{total}</div>
                </div>
                <div className="h-1.5 rounded-full bg-black/5 overflow-hidden mb-2">
                  <div className="h-full rounded-full transition-all" style={{width:`${pct}%`,background:p.farbe}}/>
                </div>
                {Object.keys(byDienst).length>0 && (
                  <div className="flex flex-wrap gap-1">
                    {Object.entries(byDienst).map(([k,v])=>(
                      <span key={k} className="pill" style={{background:'rgba(0,0,0,0.06)',color:'#94a3b8'}}>{k}: {v}</span>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

// EINSTELLUNGEN VIEW
// ═══════════════════════════════════════════════════════════════════════════════
const EinstellungenView = ({ ma, onChange, onChangeShared, toast, profile }) => {
  const [pin,    setPin]    = useState('');
  const [pin2,   setPin2]   = useState('');
  const [showPw, setShowPw] = useState(false);

  const savePin = async () => {
    if (!pin) { toast('Bitte PIN eingeben','error'); return; }
    if (pin !== pin2) { toast('PINs stimmen nicht überein','error'); return; }
    try {
      await db.collection('config').doc('auth').set({ adminPin:pin }, { merge:true });
      toast('PIN gespeichert ✓');
      setPin(''); setPin2('');
    } catch { toast('Fehler beim Speichern','error'); }
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(ma, null, 2)], { type:'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `ma-${profile}-${today()}.json`;
    a.click();
    toast('Export heruntergeladen');
  };

  const importJSON = e => {
    const f = e.target.files?.[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (!d.gruppen) throw new Error();
        onChange({ gruppen:d.gruppen||[], vorlagen:d.vorlagen||[], schichten:d.schichten||[] });
        if (onChangeShared && (d.personen||d.konflikte))
          onChangeShared({ personen:d.personen||[], konflikte:d.konflikte||[] });
        toast('Daten importiert ✓');
      } catch { toast('Ungültige JSON-Datei','error'); }
    };
    r.readAsText(f); e.target.value='';
  };

  const resetAll = () => {
    if (!confirm('Alle Mitarbeiterdaten wirklich zurücksetzen?\n\nDies kann nicht rückgängig gemacht werden.')) return;
    onChange(DEFAULT_MA());
    if (onChangeShared) onChangeShared(DEFAULT_SHARED());
    toast('Zurückgesetzt','warn');
  };

  return (
    <div className="space-y-5 up max-w-xl">
      <div>
        <h1 className="text-xl font-bold grad">Einstellungen</h1>
        <p className="text-slate-500 text-sm mt-0.5">App-Konfiguration & Datenverwaltung</p>
      </div>

      {/* PIN */}
      <div className="glass rounded-2xl p-5 glow space-y-3">
        <p className="text-slate-500 text-xs font-semibold uppercase tracking-wider flex items-center gap-1.5"><SI p={IC.lock} size={11}/> Admin-PIN ändern</p>
        <div className="relative">
          <input type="text" autoComplete="off" style={{WebkitTextSecurity:showPw?'none':'disc'}} value={pin} onChange={e=>setPin(e.target.value)}
            placeholder="Neuer PIN" className={"w-full pr-10 "+INP}/>
          <button type="button" onClick={() => setShowPw(p=>!p)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-700">
            <SI p={showPw?IC.eyeOff:IC.eye} size={14}/>
          </button>
        </div>
        <input type="text" autoComplete="off" style={{WebkitTextSecurity:showPw?'none':'disc'}} value={pin2} onChange={e=>setPin2(e.target.value)}
          placeholder="PIN bestätigen" className={"w-full "+INP}
          onKeyDown={e=>e.key==='Enter'&&savePin()}/>
        <button onClick={savePin} className="w-full py-2.5 bg-white hover:bg-gray-100 text-black text-sm font-bold transition-all" style={{borderRadius:30}}>PIN speichern</button>
      </div>

      {/* Backup */}
      <div className="glass rounded-2xl p-5 glow space-y-3">
        <p className="text-slate-500 text-xs font-semibold uppercase tracking-wider">Datensicherung</p>
        <div className="flex gap-2">
          <button onClick={exportJSON} className="flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-xl bg-black/5 hover:bg-black/5 text-slate-700 text-sm font-semibold transition-all border border-black/10">
            <SI p={IC.download} size={13}/> Exportieren
          </button>
          <label className="flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-xl bg-black/5 hover:bg-black/5 text-slate-700 text-sm font-semibold transition-all border border-black/10 cursor-pointer">
            <SI p={IC.upload} size={13}/> Importieren
            <input type="file" accept=".json" onChange={importJSON} className="hidden"/>
          </label>
        </div>
      </div>

      {/* Stats */}
      <div className="glass rounded-2xl p-5">
        <p className="text-slate-500 text-xs font-semibold uppercase tracking-wider mb-3">Datenübersicht</p>
        {[['Personen',ma.personen.length],['Gruppen',ma.gruppen.length],['Vorlagen',ma.vorlagen.length],['Schichten',ma.schichten.length]].map(([k,v])=>(
          <div key={k} className="flex items-center justify-between py-2" style={{borderBottom:'1px solid rgba(0,0,0,0.06)'}}>
            <span className="text-slate-400 text-sm">{k}</span>
            <span className="font-bold text-slate-900">{v}</span>
          </div>
        ))}
      </div>

      {/* Danger Zone */}
      <div className="glass rounded-2xl p-5" style={{borderColor:'rgba(239,68,68,0.2)'}}>
        <p className="text-slate-500 text-xs font-semibold uppercase tracking-wider mb-3 text-red-500/70">Gefahrenzone</p>
        <button onClick={resetAll} className="w-full py-2.5 rounded-xl text-red-400 text-sm font-semibold transition-all" style={{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.2)'}}>
          Alle Daten zurücksetzen
        </button>
      </div>
    </div>
  );
};

              <button onClick={()=>setModal(null)}

                style={{background:'#000000'}}>Speichern</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

const LoginScreen = ({ onLogin }) => {
  const [name,     setName]    = useState('');
  const [pin,      setPin]     = useState('');
  const [showPin,  setShowPin] = useState(false);
  const [err,      setErr]     = useState('');
  const [users,    setUsers]   = useState([]);
  const [ready,    setReady]   = useState(false);
  const [dropOpen, setDropOpen]= useState(false);

  useEffect(() => {
    const unsub = db.collection('k21-users').onSnapshot(
      snap => { setUsers(snap.docs.map(d=>({id:d.id,...d.data()}))); setReady(true); },
      () => setReady(true)
    );
    return () => unsub();
  }, []);

  const allNames = [OWNER_NAME, ...users.map(u=>u.name)];
  const filtered = name.trim() ? allNames.filter(n=>n.toLowerCase().includes(name.toLowerCase())) : allNames;

  const tryLogin = () => {
    const n = name.trim();
    if (!n||!pin) { setErr('Bitte Name und PIN eingeben'); return; }
    if (n.toLowerCase()===OWNER_NAME.toLowerCase()&&pin===OWNER_PIN) {
      onLogin({id:'owner',name:OWNER_NAME,role:'owner',permissions:{edit:true,del:true,settings:true,profiles:true}});
      return;
    }
    const u = users.find(x=>x.name.toLowerCase()===n.toLowerCase());
    if (u&&u.pin===pin) {
      onLogin({id:u.id,name:u.name,role:u.role||'viewer',permissions:perms(u),areaAccess:u.areaAccess||{},areaGroups:u.areaGroups||{},areas:u.areas||[]});
    } else {
      setErr('Name oder PIN nicht korrekt');
    }
  };

  const INP_L = "w-full bg-black/5 border border-black/10 rounded-xl px-4 py-3 text-slate-900 placeholder-slate-400 text-sm transition-all";

  return (
    <div className="min-h-screen flex items-center justify-center px-4" style={{background:'#f8fafc'}}>
      <div className="w-full max-w-xs up">
        <div className="text-center mb-8">
          <div className="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-5 border-2" style={{background:'#000000',borderColor:'#000000'}}>
            <span style={{fontFamily:'Montserrat,sans-serif',fontWeight:900,fontSize:22,color:'#ffffff',letterSpacing:'-1px'}}>K21</span>
          </div>
          <h1 style={{fontFamily:'Montserrat,sans-serif',fontWeight:900,fontSize:28,color:'#0f172a',letterSpacing:'-0.04em',margin:0,lineHeight:1}}>Mitarbeiter</h1>
          <p className="text-slate-500 text-sm mt-2 tracking-wide">Wunstorf · Schaumburg · Revive</p>
        </div>

        <div className="glass rounded-2xl glow" style={{overflow:'visible'}}>
          <div className="p-5 space-y-3">
            <div className="relative">
              <input value={name} onChange={e=>{setName(e.target.value);setErr('');setDropOpen(true);}}
                onFocus={()=>setDropOpen(true)} onBlur={()=>setTimeout(()=>setDropOpen(false),150)}
                placeholder="Dein Name" className={INP_L} autoComplete="off" autoFocus/>
              {dropOpen&&filtered.length>0&&(
                <div className="absolute top-full mt-1 left-0 right-0 glass rounded-xl z-20 glow overflow-hidden">
                  {filtered.slice(0,6).map(n=>(
                    <button key={n} onMouseDown={()=>{setName(n);setDropOpen(false);setErr('');}}
                      className="w-full text-left px-4 py-2.5 text-sm text-slate-800 hover:bg-black/5 transition-all flex items-center gap-2.5">
                      <div className="w-6 h-6 rounded-full flex-shrink-0 flex items-center justify-center text-white font-bold" style={{background:'#000000',fontSize:9}}>
                        {n.split(' ').map(w=>w[0]).join('').slice(0,2)}
                      </div>
                      {n}
                    </button>
                  ))}
                </div>
              )}
            </div>
            <div className="relative">
              <input type="text" autoComplete="off" style={{WebkitTextSecurity:showPin?'none':'disc'}} value={pin}
                onChange={e=>{setPin(e.target.value);setErr('');}}
                onKeyDown={e=>e.key==='Enter'&&tryLogin()}
                placeholder="PIN / Passwort" className={INP_L+" pr-10"}/>
              <button type="button" onClick={()=>setShowPin(p=>!p)}
                className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition-all">
                <SI p={IC.eye} size={15}/>
              </button>
            </div>
            {err&&<p className="text-red-500 text-xs">{err}</p>}
            <button onClick={tryLogin} disabled={!name.trim()||!pin||!ready}
              className="w-full py-3 text-sm font-bold text-white disabled:opacity-40 transition-all"
              style={{background:'#000000',borderRadius:30}}>
              {ready?'Anmelden':'Verbinde…'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════════════════════
const App = () => {
  const [currentUser, setCurrentUser] = useState(() => {
    const s = localStorage.getItem('k21-user');
    if (!s) return undefined;
    if (s==='guest') return null;
    try { return JSON.parse(s); } catch { return undefined; }
  });
  const [profile,   setProfile]   = useState(() => localStorage.getItem('ma-profile')||'revive');
  const [ma,        setMa]        = useState(() => loadJSON(`ma-data-${localStorage.getItem('ma-profile')||'revive'}`, DEFAULT_MA()));
  const [sharedMa,  setSharedMa]  = useState(() => loadJSON('ma-data-shared', DEFAULT_SHARED()));
  const [page,      setPage]      = useState('dienstplan');
  const [syncState, setSyncState] = useState(() => {
    const key = `ma-data-${localStorage.getItem('ma-profile')||'revive'}`;
    return localStorage.getItem(key) ? 'synced' : 'connecting';
  });
  const [toasts,    setToasts]    = useState([]);

  const p           = perms(currentUser);
  const isAdmin     = p.settings;
  const canEdit     = p.edit && getAreaAccess(currentUser, profile) === 'edit';
  const canDel      = p.del;
  const canSettings = p.settings;
  const canProfiles = p.profiles;
  const curProfile  = PROFILES.find(pp=>pp.id===profile) || PROFILES[2];

  const toast = (msg, type='success') => {
    const id = genId();
    setToasts(pp=>[...pp, { id, msg, type }]);
    setTimeout(() => setToasts(pp=>pp.filter(t=>t.id!==id)), 3000);
  };

  const login  = user => { setCurrentUser(user); localStorage.setItem('k21-user', user ? JSON.stringify(user) : 'guest'); };
  const logout = () => { setCurrentUser(undefined); localStorage.removeItem('k21-user'); setPage('dienstplan'); };
  const updateCurrentUser = user => { setCurrentUser(user); localStorage.setItem('k21-user', JSON.stringify(user)); };

  // Which church profiles this user may see
  const visibleProfiles = useMemo(() => {
    if (!currentUser||currentUser.role==='owner'||currentUser.role==='admin') return PROFILES;
    return PROFILES.filter(p=>getAreaAccess(currentUser,p.id)!=='none');
  }, [currentUser]);

  const allowedGroups = useMemo(() => {
    if (!currentUser||currentUser.role==='owner'||currentUser.role==='admin') return null;
    const ag = (currentUser.areaGroups||{})[profile]||[];
    return ag.length>0 ? ag : null; // null = all groups allowed
  }, [currentUser, profile]);

  const switchProfile = pid => {
    setProfile(pid);
    localStorage.setItem('ma-profile', pid);
    setPage('dienstplan');
  };

  // Auto-redirect if current profile is outside allowed areas
  useEffect(() => {
    if (visibleProfiles.length>0 && !visibleProfiles.find(pp=>pp.id===profile)) {
      switchProfile(visibleProfiles[0].id);
    }
  }, [visibleProfiles]);

  // Firebase Sync — per-profile (gruppen, vorlagen, schichten)
  const writeMa = data => {
    setSyncState('saving');
    localStorage.setItem(`ma-data-${profile}`, JSON.stringify(data));
    db.collection(profile).doc('ma').set({ data })
      .then(()=>setSyncState('synced'))
      .catch(()=>setSyncState('error'));
  };

  useEffect(() => {
    const localKey = `ma-data-${profile}`;
    const cached = localStorage.getItem(localKey);
    setSyncState(cached ? 'synced' : 'connecting');
    setMa(cached ? JSON.parse(cached) : DEFAULT_MA());
    const unsub = db.collection(profile).doc('ma').onSnapshot(
      { includeMetadataChanges:true },
      snap => {
        if (snap.metadata.hasPendingWrites) return;
        const data = snap.data()?.data;
        if (data) {
          const { gruppen=[], vorlagen=[], schichten=[] } = data;
          const clean = { gruppen, vorlagen, schichten };
          localStorage.setItem(localKey, JSON.stringify(clean)); setMa(clean);
        }
        setSyncState('synced');
      },
      () => setSyncState('error')
    );
    return () => unsub();
  }, [profile]);

  const updateMa = updater => {
    const next = typeof updater==='function' ? updater(ma) : updater;
    setMa(next);
    writeMa(next);
  };

  // Firebase Sync — shared personen + konflikte (cross-profile)
  const writeSharedMa = data => {
    localStorage.setItem('ma-data-shared', JSON.stringify(data));
    db.collection('shared').doc('ma').set({ data }).catch(()=>{});
  };

  useEffect(() => {
    const unsub = db.collection('shared').doc('ma').onSnapshot(
      { includeMetadataChanges:true },
      snap => {
        if (snap.metadata.hasPendingWrites) return;
        const data = snap.data()?.data;
        if (data) { localStorage.setItem('ma-data-shared', JSON.stringify(data)); setSharedMa(data); }
      },
      () => {}
    );
    return () => unsub();
  }, []);

  const updateSharedMa = updater => {
    const next = typeof updater==='function' ? updater(sharedMa) : updater;
    setSharedMa(next);
    writeSharedMa(next);
  };

  // Merged view used by all child components
  const fullMa = { ...ma, personen: sharedMa.personen||[], konflikte: sharedMa.konflikte||[] };

  if (currentUser === undefined) return <LoginScreen onLogin={login}/>;

  const TABS = [
    { id:'dienstplan', label:'Dienstplan', icon:IC.calendar },
    ...(p.edit ? [{ id:'personen', label:'Personen', icon:IC.person }] : []),
    ...(canEdit ? [
      { id:'gruppen',   label:'Gruppen',   icon:IC.users  },
      ...(!allowedGroups ? [{ id:'vorlagen', label:'Vorlagen', icon:IC.layers }] : []),
      { id:'statistik', label:'Statistik', icon:IC.chart  },
    ] : []),
    ...(canSettings ? [{ id:'einstellungen', label:'Einstellungen', icon:IC.cog   }] : []),
  ];

  return (
    <div className="min-h-screen">
      <ToastContainer toasts={toasts}/>
      <header style={{background:'#000000',borderBottom:'1px solid rgba(255,255,255,0.08)',position:'sticky',top:0,zIndex:50}}>
        {/* ── Row 1: K21 Brand + Profil-Wahl + Sync/Rolle/Logout ── */}
        <div className="max-w-4xl mx-auto px-4 py-3 flex items-center">
          {/* Logo */}
          <div className="flex items-center gap-2.5 flex-shrink-0 w-28">
            <div className="w-8 h-8 rounded-full border border-white/60 flex items-center justify-center flex-shrink-0">
              <span style={{fontFamily:'Montserrat,sans-serif',fontWeight:900,fontSize:9,color:'#ffffff',letterSpacing:'-0.5px'}}>K21</span>
            </div>
            <div className="hidden sm:block">
              <div style={{fontFamily:'Montserrat,sans-serif',fontWeight:900,fontSize:12,color:'#ffffff',lineHeight:1,letterSpacing:'-0.03em'}}>TEAM</div>
            </div>
          </div>

          {/* Profile switcher — centered */}
          <div className="flex gap-1.5 mx-auto items-center">
            {visibleProfiles.map(p => (
              <button key={p.id} onClick={() => switchProfile(p.id)}
                className="px-3.5 py-1.5 text-xs font-bold transition-all"
                style={{
                  borderRadius: 30,
                  background: profile===p.id ? '#ffffff' : 'transparent',
                  color: profile===p.id ? '#000000' : 'rgba(255,255,255,0.4)',
                  border: profile===p.id ? '1px solid transparent' : '1px solid rgba(255,255,255,0.12)',
                }}>
                {p.label}
              </button>
            ))}
          </div>

          {/* Right: sync + role + logout */}
          <div className="flex items-center gap-2.5 flex-shrink-0 w-28 justify-end">
            <SyncDot state={syncState}/>
            <span className="pill text-xs" style={{borderRadius:30, background:currentUser?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.06)', color:currentUser?'#ffffff':'rgba(148,163,184,1)'}}>{currentUser ? currentUser.name.split(' ')[0] : 'Gast'}</span>
            <button onClick={logout} title="Abmelden" className="transition-all opacity-50 hover:opacity-100" style={{color:'#ffffff'}}><SI p={IC.logout} size={14}/></button>
          </div>
        </div>

        {/* ── Row 2: Navigation tabs (centered) ── */}
        <div style={{borderTop:'1px solid rgba(255,255,255,0.06)'}}>
          <div className="max-w-4xl mx-auto px-4 py-2 flex justify-center">
            <nav className="flex gap-1 flex-wrap justify-center">
              {TABS.map(t => (
                <button key={t.id} onClick={() => setPage(t.id)}
                  className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold transition-all"
                  style={{
                    borderRadius: 30,
                    background: page===t.id ? '#ffffff' : 'transparent',
                    color: page===t.id ? '#000000' : 'rgba(255,255,255,0.4)',
                    border: page===t.id ? '1px solid transparent' : '1px solid rgba(255,255,255,0.08)',
                  }}>
                  <SI p={t.icon} size={12}/><span className="hidden sm:inline">{t.label}</span>
                </button>
              ))}
            </nav>
          </div>
        </div>
      </header>
      <main className="max-w-4xl mx-auto px-4 py-6 pb-16">
        {page==='dienstplan'    && <DienstplanView ma={fullMa} onChange={canEdit?updateMa:null} onTausch={currentUser?updateMa:null} toast={toast} allowedGroups={allowedGroups} currentUser={currentUser}/>}
        {page==='personen'      && <PersonenView   ma={fullMa} onChange={p.edit?updateSharedMa:null} toast={toast} profile={profile} allowedGroups={allowedGroups}/>}
        {page==='gruppen'       && <GruppenView    ma={fullMa} onChange={canEdit?updateMa:null} onChangeShared={canEdit?updateSharedMa:null} toast={toast} allowedGroups={allowedGroups}/>}
        {page==='vorlagen'      && <VorlagenView   ma={fullMa} onChange={canEdit?updateMa:null} toast={toast}/>}
        {page==='statistik'     && <StatistikView  ma={fullMa}/>}
        {page==='einstellungen' && canSettings  && <EinstellungenView ma={fullMa} onChange={updateMa} onChangeShared={updateSharedMa} toast={toast} profile={profile}/>}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
